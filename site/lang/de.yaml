notes: 'German / Deutsch. ASCII-folded: the retail font is printable ASCII only (docs/formats/dialog-font.md), so accents are folded. FILLED: the whole SCUS name-table layer (items + their effect descriptions, magic, Tactical Arts, accessory passives + descriptions) and the recurring system-message layer (confirmation prompts, container and passage messages, shop closers) - the lines a player sees constantly, in every scene. SKELETON: the bulk NPC / story dialog corpus is not filled; those lines are left untouched and stay in the source language. Proper nouns (Seru and Ra-Seru names, characters, places) are deliberately not translated. Same-size in-place patching: every string fits the byte budget of the string it replaces.'

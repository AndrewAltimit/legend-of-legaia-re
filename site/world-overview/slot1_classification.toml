# Per-kingdom classification of slot-1 TMDs that the MAN placement table
# doesn't pin at a world coordinate. Drives the "show unplaced slot-1 TMDs"
# layout on /world-overview/. Pure UI hint - runtime correctness is unaffected.
#
# The MAN table only pins a handful of slots per kingdom; the rest are
# positioned by the field-VM at scene-load via the runtime actor lists
# (see scripts/pcsx-redux/resolve_actor_tmds.py). Until the disc-side
# actor walk lands (step 1 in the world-overview todo), this TOML lets a
# human author override the canonical-grid fallback with a coarser
# semantic category so the visualisation matches expectations.
#
# Categories (case-sensitive):
#   landmark       Discrete actor-placed landmark (castle, tower, gate,
#                  wall section, generic NPC base). The viewer arranges
#                  these in a row south of the kingdom bounds, sorted by
#                  pack slot.
#   ground_tile    Bulk terrain mesh. The runtime tiles these across the
#                  continent via FUN_80043390's overlay-routed dispatch
#                  (see docs/subsystems/world-map.md). The viewer stacks
#                  these at the kingdom centre so the silhouette is
#                  preserved without visually overwhelming landmarks.
#   decoration    Small decorative prop (sign, plant cluster, road
#                  junction). Rendered north of the kingdom bounds.
#   npc_token     Generic character base reused for unnamed actors.
#                  Hidden in the assembled view to reduce noise.
#   unknown       Default. Treated as landmark by the layout engine.
#
# Per-slot fields:
#   class   Required. One of the categories above.
#   note    Optional free-form description from a visual sweep.
#
# Slots not listed here default to "unknown". Slots that the MAN table
# already pins at a world coordinate are drawn at their MAN position and
# this table is ignored for them.
#
# To author from a visual sweep:
#   1. Open /world-overview/ in the asset viewer, load your disc image.
#   2. Switch to the "Mesh inspector" mode and step through each slot.
#   3. Set the class for slots you can identify; leave the rest unknown.
#   4. The viewer reloads the TOML via the build pipeline
#      (`scripts/asset-investigation/extract-world-placements.py`).
#
# Live-RAM signal: scripts/pcsx-redux/resolve_actor_tmds.py extracts
# actor-placed slots from PCSX-Redux save states. Slots that show up in
# site/world-overview-live.json are seeded as "landmark" below.
#
# Visual sweep aid: `python3 scripts/asset-investigation/render-unplaced-tmds.py` writes a
# wireframe contact sheet (iso + top + front) for every unplaced slot to
# /tmp/world-thumbs/<kingdom>_unplaced_pN.png so you can review a kingdom
# end-to-end without driving the live web viewer.


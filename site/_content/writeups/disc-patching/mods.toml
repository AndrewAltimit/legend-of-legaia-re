# Master catalog for the "Patching a sealed disc" write-up series.
#
# This file is the single source of truth for the mod -> technique-tier table
# rendered on writeups/disc-patching/index.html. site/_gen.py reads it and emits
# the grouped HTML table in place of the <!--DISC_PATCHING_TABLE--> placeholder,
# so adding a mod is a one-row edit here, never a hand-maintained table.
#
# Tiers A-F are the sophistication ladder (each gets its own page). G-J are
# *variants* - specializations of a parent tier - shown as a tag on the row.
#
# Fields per [[mod]]:
#   key       stable slug
#   name      display name
#   flag      CLI flag (legaia-rando)
#   tier      A-F primary technique
#   variant   optional G/H/I/J specialization tag ("" if none)
#   target    what + where the edit lands (concise; addresses where pinned)
#   edit      "in-place" (same-size) | "relocate" (variable-length, footprint-bounded)
#   gap       true if it consumes the shared SCUS rodata gap (composition-relevant)
#   status    "shipped" | "planned"
#   test      disc oracle test (crates/rando/tests/*), or ""
#   notes     optional one-liner

# ---------------------------------------------------------------------------
# Technique tiers (the ladder). `published` gates whether the table links to
# the tier's page - flip to true as each page lands so the link-check stays green.
# ---------------------------------------------------------------------------

[[tier]]
id = "A"
title = "Static-table overwrites"
page = "a-static-tables.html"
published = true
summary = "Same-size byte edits to a fixed table in SCUS or a raw overlay. No compression, no relocation - but reverse-engineered to the exact field."

[[tier]]
id = "B"
title = "Editing inside LZS"
page = "b-lzs-slots.html"
published = true
summary = "The value lives in a compressed slot: decompress, mutate, re-pack (one-step lazy matching, about as tight as Sony's - not tighter), zero-pad back to the fixed slot so nothing downstream moves."

[[tier]]
id = "C"
title = "Rewriting field-VM bytecode"
page = "c-field-vm-operands.html"
published = true
summary = "The data is bytecode - rewrite an opcode's inline operand and recompress the per-scene MAN within its original footprint budget. Needs an opcode-aware walk to find sites safely."

[[tier]]
id = "D"
title = "Variable-length relocation"
page = "d-man-relocation.html"
published = true
summary = "When an edit must change a byte count: rebuild the decompressed MAN, fix every internal offset / table / delta, keep it inside the asset's footprint."

[[tier]]
id = "E"
title = "Code injection via the rodata gap"
page = "e-rodata-gap-code.html"
published = true
summary = "Behavior the game can't express as data: detour an existing routine into hand-assembled MIPS parked in a reclaimed all-zero region of the executable."

[[tier]]
id = "F"
title = "Overlay dead-region injection"
page = "f-overlay-dead-region.html"
published = true
summary = "Host hand-assembled code inside a resident overlay's reference-free dead space - so a whole new screen or system costs nothing and never competes for the shared rodata gap."

# ---------------------------------------------------------------------------
# Variant specializations (shown as tags, not ladder rungs).
# ---------------------------------------------------------------------------


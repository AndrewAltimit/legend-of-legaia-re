# Static overlay map.
#
# PROT entry -> overlay-window load base + identity, for the static
# overlay-extraction pipeline (`asset overlay ...`; see
# docs/tooling/static-overlay-pipeline.md). This COMPLEMENTS the dynamic
# save-state captures (docs/tooling/overlay-capture.md) -- it does not replace
# them: static extraction solves overlay IDENTITY + reproducibility, but
# runtime VALUES (gp[0x754], watchpoint results, ctx[+0x274]) still need live
# probes.
#
# `fingerprint_sha256` is the sha256 of the as-loaded overlay bytes (the
# `read_entry` footprint) -- a disc-derived hash, no Sony bytes. `asset overlay
# verify` re-extracts from the user's PROT.DAT and asserts the hash reproduces.
# `asset overlay generate` regenerates rows (base recovered statically from the
# overlay's own call graph; fingerprint hashed from the extracted bytes).
#
# `base_va` is recovered STATICALLY from the overlay's internal jal call graph
# (see static_overlay::recover_base) and cross-checked against known function
# addresses + (where a save state captures the overlay resident) the live RAM
# image. Do NOT assume an overlay shares another's base. The recovery + a
# function-signature byte-search corrected a historical label: the options/menu
# overlay is **PROT 0899** at base 0x801CE818 (its `FUN_801CF650` equip
# aggregator lands at base+0xe38; 101/139 menu-dump functions align; jal-recovery
# agrees, 30 votes), NOT PROT 0896. PROT 0896 (CDNAME `bat_back_dat`) stays out
# of this map: its widely-cited base 0x801C5818 (60 whole-file votes) is an
# OVER-READ ARTIFACT -- the file carries the field overlay's bytes from +0x9000
# (consecutive entries' footprints over-read), and that code's self-consistency
# at 0x801CE818 fixes the whole-file recovery to 0x801CE818 - 0x9000 by
# construction; head-only recovery yields no landslide, so 0896's true link
# base is unrecovered. The "0896 = mode-24 OTHER overlay" hypothesis is also
# REFUTED by a live mode-24 entry capture (Baka Fighter): the SCUS-resident
# OTHER INIT streams the per-minigame overlay directly into slot A and 0896's
# bytes appear nowhere in RAM across the entry window or any parked library
# state (probe scripts/pcsx-redux/autorun_minigame_overlay_capture.lua +
# overlay_residency.py; see open-rev-eng-threads.md).
# PROT 0899 and the field overlay (0897) are
# VA-ALIAS siblings in slot A (both base 0x801CE818, resident at different times):
# 0x801CF650 is a "Give" string in 0897 but the equip aggregator in 0899 -- the
# exact aliasing this pipeline exists to disambiguate.
#
# eligibility:
#   verified  - RAM byte-matched against a resident save-state image: the base
#               is RAM-confirmed and the .text+.rodata prefix
#               (`clean_copy_bytes`) is byte-identical.
#   static    - extracted + base statically recovered + cross-checked against
#               known function addresses, but not RAM-prefix-verified (e.g. a
#               data-section-first overlay whose live capture has runtime-mutated
#               globals, so the clean region is not a single prefix).
#   ineligible- runtime-relocated/constructed; keep on the dynamic path.
#
# base_source (how base_va was determined; gates the jal-recovery test):
#   jal       - recovered from the overlay's own internal jal call graph
#               (default; the reproducibility test asserts the recovery agrees).
#   capture   - pinned by byte-matching a resident RAM image (anchor / region).
#   cross_ref - taken from another pinned RE result in-tree (e.g. the summon
#               link base). For sparse / timeshared-buffer overlays.
#
# anchor_va (optional): a known function VA that must land on a function
#   prologue (`addiu sp, sp, -X`) at base_va, i.e. as_loaded[anchor_va -
#   base_va] is a prologue. A capture-free, disc-reproducible cross-check of the
#   load base -- decisive for rows whose base did NOT come from jal-recovery
#   (the reproducibility test skips the jal assertion for those, so the anchor
#   keeps the base claim non-vacuous). The slot-A minigame siblings use a
#   documented minigame function (a pinned in-tree RE result) as the anchor.


base_va = 0x801CE818
form = "raw"
clean_copy_bytes = 0x28800
eligibility = "verified"
fingerprint_sha256 = "35a7beaa3bf9c08df3069f263c41550d51282805f5159d116ba55c333bceab88"
notes = "Battle / battle-action overlay. Per-actor state machine FUN_801E295C (base+0x14144), battle main dispatcher FUN_801D0748, effect VM cluster FUN_801DE914/801DFDF8/801E0088. RAM-matched vs a live battle save: code-first layout, .text+.rodata (0x28800 of 0x29800 bytes) byte-identical, only the trailing 0x1000-byte .bss diverges. Base recovered statically (44 corroborating call targets)."


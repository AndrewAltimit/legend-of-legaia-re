# --- Slot-B overlays (the second swappable overlay slot, *DAT_80010390; link
#     base 0x801F69D8, summon_overlay::SUMMON_OVERLAY_LINK_BASE). These are the
#     player-summon / effect / minigame-data blobs from the 0900..0969 PROT
#     cluster. They TIMESHARE one buffer, so a save state catches a MIX of two
#     overlays -- there is no clean whole-overlay RAM prefix, and most have too
#     sparse an internal jal call graph to triangulate. base_va here is sourced
#     from a capture anchor / a cross-referenced RE result (base_source), not
#     jal-recovery. The cluster is HETEROGENEOUS: it interleaves summon stagers
#     (0905 Gimard, ...) with Disco King dance-song overlays (0907 "Hell's
#     Music", 0924, 0927, 0957) and other minigame data, so the historical
#     contiguous "summon 0905..=0915" range is over-broad -- only entries with a
#     pinned identity are listed here. ---


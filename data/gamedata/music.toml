# Music-track disambiguation: every in-game BGM cue across its four naming
# spaces. A single track has up to four names depending on where you read it:
#
#   - `id`              internal debug sound-test identifier (M01, M14A, ...)
#   - `debug_title_*`   the short Japanese working title in the debug menu,
#                       describing the scene the track was WRITTEN for
#   - `context`         where the cue is actually HEARD in-game
#   - `ost_title_*`     the published soundtrack album title, where one exists
#   - `relocalization`  proposed English title
#
# `index` is the debug sound-test order (0..80). Missing columns are omitted
# (the source leaves them blank). `uncertain = true` marks the entries the
# source flags as guesses (the trailing test/placeholder files).
#
# Source: Henrique Stanke Scandelari (Stann0x, github.com/Stann0xus). Factual
# short labels only - transcribed from the game's own debug sound test and the
# published OST listing - in the same curated-reference spirit as the other
# tables here. No Sony-owned bytes (sequence/sample data) are reproduced.
# Companion prose + provenance: docs/reference/music-tracks.md.


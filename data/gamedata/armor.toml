# Armor table: body armor / helmet / shoes.
#
# `slot` = the equipment slot ("armor" / "helmet" / "shoes").
# `udf` = upper defense factor (used by power bytes 0x16-0x1A and 0x0C-0x10).
# `ldf` = lower defense factor (used by power bytes 0x1B-0x1F and 0x11-0x15).
# `equip` is one of: Vahn / Noa / Gala / None (None = quest-restricted -
#   the War God Plate is "Equipped On: None" in the walkthrough; we

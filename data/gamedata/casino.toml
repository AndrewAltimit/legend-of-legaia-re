# ---- Muscle Dome courses ----
#
# Each course is a fixed enemy sequence with a flat entry fee + clear reward
# in coins. `restrictions` captures the equipment / item / magic gating
# enforced at course entry. `[[muscle_dome_enemy]]` rows under each course
# carry element + level tags where the game annotates them.

[[muscle_dome_course]]
key = "beginner"
name = "Beginner"
entry_fee = 100
reward_coins = 818
restrictions = ["No equipment", "No items"]
allowed = ["Magic", "Accessories"]
enemies = [
    "Red Piura",
    "Skeleton",
    "Drake Ghost",
    "Caruban",
    "Gola Gola",
    "Zeto",
    "Viguro Lv2",
    "Xain",
]

[[muscle_dome_enemy]]
course = "beginner"
name = "Gola Gola"
element = "Fire"

[[muscle_dome_enemy]]
course = "beginner"
name = "Viguro Lv2"
element = "Thunder"

[[muscle_dome_course]]
key = "expert"
name = "Expert"
entry_fee = 100
reward_coins = 1532
restrictions = ["No equipment", "No items"]
allowed = ["Magic", "Accessories"]
enemies = [
    "Black Piura",
    "High Gomboo",
    "Dark Ogre",
    "Gold Bison",
    "Ironman",
    "Caruban",
    "Aluru",
    "Xain",
]

[[muscle_dome_enemy]]
course = "expert"
name = "Aluru"
element = "Light"

[[muscle_dome_course]]
key = "master"
name = "Master"
entry_fee = 100
reward_coins = 13856
reward_first_clear = "war_god_icon"
reward_first_clear_requires = "Jette must be defeated in Absolute Fortress before the War God Icon is awarded."
restrictions = ["No equipment", "No items", "No magic"]
allowed = ["Accessories"]
enemies = [
    "Ironman",
    "Viguro Lv2",
    "Gold Bison",
    "Caruban",
    "Zeto",
    "Berserker",
    "Xain",
    "Dohati",
    "Lu Delilas",

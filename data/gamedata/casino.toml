name = "Chicken King"
trigger = "Run from the first battle in all three Muscle Dome difficulty levels."
reward = "chicken_king"
notes = "Reward is the Chicken King accessory."

# ---- Baka Fighter ----
#
# Rock-paper-scissors variant: each round shows a button sequence the
# player must reproduce on the controller. Complete all 14 rounds to
# claim the coin reward.

[baka_fighter_meta]
reward_coins = 460
rounds = 14
rules = "Reproduce the on-screen button sequence under a time pressure - like rock-paper-scissors with life meters."

[[baka_fighter]]
round = 1
buttons = ["Square"]

[[baka_fighter]]
round = 2
buttons = ["X"]

[[baka_fighter]]
round = 3
buttons = ["O"]

[[baka_fighter]]
round = 4
buttons = ["Square", "X"]

[[baka_fighter]]
round = 5
buttons = ["O", "O", "O", "X", "X", "X"]

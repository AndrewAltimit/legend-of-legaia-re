# Casino prizes + Muscle Dome courses.
#
# Two prize-exchange tables (Vidna casino + Sol Tower Muscle Dome counter),
# three Muscle Dome arena courses (Beginner / Expert / Master), the Baka
# Fighter rock-paper-scissors minigame round table, and the Muscle Paradise
# "Chicken King" easter egg.
#

# ---- Muscle Dome courses ----
#
# Each course is a fixed enemy sequence with a flat entry fee + clear reward
# in coins. `restrictions` captures the equipment / item / magic gating
# enforced at course entry. The per-round roster lives in
# `[[muscle_dome_round]]` below; per-enemy stats in `[[muscle_dome_boss]]`.

[[muscle_dome_course]]
key = "beginner"
name = "Beginner"
entry_fee = 100
reward_coins = 818
restrictions = ["No equipment", "No items"]
allowed = ["Magic", "Accessories"]
enemies = [
    "Red Piura",
    "Skeleton",
    "Drake Ghost",
    "Caruban",
    "Gola Gola",
    "Zeto",
    "Viguro Lv2",

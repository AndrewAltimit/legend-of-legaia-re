# Tactical Arts: per-character arts with command sequences and AP costs.
#
# `command` is the player-facing input scheme as printed in the walkthrough.
# Tokens: "Arms", "Ra-Seru", "High", "Low".
# `directions` is the raw direction-byte sequence that ends up in the on-disc
# Art Record (`crates/art` parser, +0x00 prefix). Mapping:
#
#   Vahn / Gala: Arms = L (1)  Ra-Seru = R (2)  High = U (4)  Low = D (3)
#   Noa:         Arms = R (2)  Ra-Seru = L (1)  High = U (4)  Low = D (3)
#
# Noa is left-handed - her Arms is the *right* button (`> < ^ v` in the older
# walkthrough notation). Same animation, mirrored input.
#
# `kind` is one of: regular, hyper, super, miracle.
# `action_constant` (when set) is the byte value 0x1B..=0x32 the action queue
# stores; cross-checked against `crates/art/src/tables.rs`.

[[arts]]
character = "Vahn"
name = "Hyper Elbow"
kind = "regular"
ap = 18
command = ["Arms", "Ra-Seru", "High"]
directions = [1, 2, 4]
action_constant = 0x29


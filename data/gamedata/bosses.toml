# Boss-fight summary. One entry per Meth962-cataloged boss battle (B0001
# through B0014 plus the Lapis optional fight and key Muscle Dome rounds).
#
# Per-enemy stat columns (`hp`, `atk`, `udf`, ...) live in `enemies.toml`
# - see entries with `boss = true` for the same names. This file adds the
# *fight-specific* layer the enemy table doesn't capture:
#
#   - `meth_id`             - B0001..B0014 / s0005 boss ID from the FAQ.
#   - `attacks`             - list of `{name, mp}` for the boss's named
#                             special moves (the FAQ "Attacks:" line).
#                             Regular auto-attacks aren't enumerated.
#   - `exp_reward` / `gold_reward` - per-victory awards from the FAQ
#                             "Rewards:" line.
#   - `item_reward`         - item key (resolves through `items.toml`)
#                             dropped on victory; `None` if none.
#   - `recommended_level`   - the FAQ's suggested party level range
#                             ("6-7", "27", "34" etc.).
#
# `hp_min` / `hp_max` are retained for the older Muscle Dome rows where
# the walkthrough only gives an HP estimate (no full stat block). Main-
# story bosses with a full stat block in `enemies.toml` set both fields
# from the FAQ canonical HP (Sise_Neg's Japanese-book lift, per v1.07).
#
# Source: Meth962, "Legend of Legaia 100% Walkthrough" (GameFAQs FAQ
# 53721), v1.11; HP values verified against v1.07 Sise_Neg correction.


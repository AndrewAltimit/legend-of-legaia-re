# Items: consumables + key items.
#
# `key` is a stable string identifier used by `shops.toml`, `casino.toml`,
# `fishing.toml`, and tests. snake_case version of the name; consistent
# with the inventory item-modifier slot bytes once those get pinned by
# the `cheats` crate.
#
# `category` partitions:
#   "consumable"      - usable in/out of battle (healing, doors, elixirs)
#   "permanent_stat"  - permanent stat upgrade (waters)
#   "key"             - quest-progression key item
#   "art_book"        - teaches a Hyper Art (non-stackable)
#   "fishing_lure"    - bait/lure
#   "minigame"        - card / pass / membership

[[item]]
key = "healing_leaf"
name = "Healing Leaf"
category = "consumable"
price = 100
effect = "Restores 200 HP."

[[item]]
key = "healing_shroom"
name = "Healing Shroom"
category = "consumable"
price = 60
# Disc-corrected: the SCUS item table gives Healing Shroom the same effect
# subtype (0) as the Healing Leaf, and its on-disc description reads "Recover
# 200HP. Ally." The earlier "60" conflated the 60-gold price with the amount.
effect = "Restores 200 HP."


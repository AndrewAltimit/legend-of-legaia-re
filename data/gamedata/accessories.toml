# Accessories. Many fall into structured effect classes that can be
# pinned by the existing battle-formula reverse engineering: HP-percent
# bumps, MP-percent bumps, AP modifiers, encounter-rate, status nullifies,
# elemental-defense bumps, etc. Where a numeric percentage is documented,
# `effect_class` + `effect_value` carry the structured form; the free-text
# `effect` is always populated for display.
#
# `effect_class` values used (informal taxonomy, not retail):
#   hp_max_pct, mp_max_pct, ap_accrual_pct, mp_cost_pct, ap_cost_pct,
#   ap_freeze_100, attack_pct, udf_pct, ldf_pct, defense_pct, speed_pct,
#   intelligence_pct, agility_pct, hp_per_step, mp_per_step,
#   hp_per_turn, mp_per_turn, revive_once, art_power_pct,
#   xp_pct, gold_pct, item_drop_chance, seru_absorb_chance,
#   first_attack, last_attack, encounter_pct, ambush_def_pct,
#   ambush_off_pct, escape_chance, escape_def_pct, escape_block,
#   counter_chance, ignore_defense, double_attack, berserk,
#   protect_status, elemental_def, all_status_def, all_elemental_def,
#   summon_seru


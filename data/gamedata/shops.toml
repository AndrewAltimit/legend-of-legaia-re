# Per-town shop inventories.
#
# Each `[[shop]]` is one merchant; one town can have multiple shops.
# `town` matches the canonical town label used by CDNAME scene blocks
# (Rim Elm, Hunter's Spring, Drake Castle, Biron Monastery, Wind Cave,
# Jeremi, Vidna, Octam, Underground Octam, Ratayu, Karisto Station,
# Sol, Buma, Usha Research, Soren Camp, Conkram).
#
# `phase` (optional) distinguishes pre-/post-mist or quest-gated stock
# variants (e.g. Biron Monastery's shop after the mist clears unlocks
# additional weapons).
#
# `inventory` is an ordered list of item keys; each key resolves through
# items.toml / weapons.toml / armor.toml / accessories.toml. The
# `gamedata-tool resolve-shops` CLI joins those tables and prints the
# full priced inventory.
#
# Item keys with a `*` in the original walkthrough indicate "new in this
# town" - kept here as `featured = ["item_key", ...]`.


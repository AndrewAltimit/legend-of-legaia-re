town = "Rim Elm"
name = "Variety Shop"
inventory = [
    "hunter_clothes",
    "scarlet_jewel",
    "azure_jewel",
    "survival_knife",
    "warrior_seal",
    "warrior_boots",
    "cure_amulet",
    "healing_leaf",
    "antidote",
    "door_of_light",
]
featured = ["hunter_clothes", "scarlet_jewel", "azure_jewel"]


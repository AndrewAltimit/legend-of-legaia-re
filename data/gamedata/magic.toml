# Spells: 21 Seru spells (level-1, learned from Seru) + 8 Ra-Seru summons
# (egg-derived). Element + MP cost + display attack name + target shape.
#
# `family` distinguishes:
#   "seru"     - elemental Seru spells gained by absorbing matching Seru
#                in battle (with Ivory Book to boost rate). Per-level
#                variants (Lv2/Lv3) exist for higher-mist enemies; this
#                table only covers the canonical names.
#   "ra-seru"  - egg-derived character-bound summons. Each costs 200-255 MP
#                and is gated by completing a side quest (Zalan converts
#                the egg into a Talisman accessory).
#
# `target` is the AoE shape:
#   single_enemy / all_enemies / single_ally / all_allies / self
#
# Sources: walkthrough magic-chart sections cross-validated; element
# spelling normalised to lowercase ("light" not "Light").


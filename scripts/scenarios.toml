# Unified save-state scenario manifest.
#
# Single source of truth for save-state labelled scenarios. Each
# [[scenarios]] block maps one investigation label to per-emulator
# save-state paths + mednafen-specific overlay/watchpoint fields used
# by the `mednafen-state` toolkit.
#
# Consumers:
#   - `mednafen-state` CLI + `scripts/mednafen/{auto-capture,state-walk}.sh`
#     (overlay-slice + watchpoint diff workflow, mednafen mc{0..9}).
#   - `scripts/pcsx-redux/run_probe.sh --scenario <label>` (resolves
#     `pcsx_redux_sstate` for the probe runner).
#   - `scripts/manage-states.py` (fingerprints / validates that each
#     emulator's save state hasn't drifted from the committed manifest).
#
# Per-scenario fields (all but slot+label+description are optional):
#   slot                       u8     mednafen .mc{0..9} slot index
#   label                      str    short investigation handle
#   description                str    human-readable purpose
#   topics                     list   free-text labels
#   diff_against               list   sister-slot indices for diff sweep
#   pcsx_redux_sstate          path   PCSX-Redux .sstate location ($HOME / ~ expanded at use time)
#   duckstation_sav            path   Duckstation .sav location
#   phase                      str    boot/title/menu/field/battle/world_map/cutscene
#   expected_game_mode         u8     _DAT_8007B83C value at scenario start
#   expected_active_scene      str    CDNAME label (e.g. "map01")
#   ram_fingerprint_sha256     hex    sha256 of first 64 KiB main RAM after settle
#   backup_fingerprint         hex    sha256 of an IMMUTABLE copy stashed in
#                                     saves/library/<emulator>/<fp>.<ext>. Live
#                                     emulator slots (SCUS94254.sstateN, mc{N})
#                                     get overwritten the next time you save, so
#                                     a scenario worth keeping must be backed up.
#                                     When set, manage-states.py + run_probe.sh
#                                     resolve THIS copy in preference to the live
#                                     path. The library is gitignored (Sony RAM);
#                                     this fingerprint is the committed pointer.
#   [scenarios.overlay_slice]  block  mednafen overlay-slice range
#   [[scenarios.watchpoints]]  block  mednafen diff watchpoint regions
#
# Adding a scenario:
#   1. Capture the state in an emulator (mednafen mc{N} / PCSX-Redux sstateN).
#   2. Back it up so it survives a slot overwrite, and record the pointer:
#        scripts/manage-states.py backup pcsx-redux <path> --label <label>
#      (copies to saves/library/, sets backup_fingerprint on the scenario).
#   3. Add/extend the [[scenarios]] block here with label / phase / scene.
#   4. (mednafen only) `manage-states.py fingerprint <label>` for the RAM
#      fingerprint; `manage-states.py library` lists what's backed up.
#   5. Commit (the manifest only - the save bytes stay local + gitignored).
#
# See `docs/tooling/mednafen-automation.md` for the diff-sweep workflow
# and `docs/tooling/pcsx-redux-automation.md` for the probe workflow.
#
# ## Current corpus rotation
#
# This rotation captures the **per-STR FMV trigger corpus**: nine save
# states taken right before each FMV begins playing, one per
# `_DAT_8007BA78` value (`fmv_id ∈ 0..=8`). Slot mapping (debug-menu
# driven, all from active scene `map01`):
#
#   mc2 → STR 0 (fmv_id 0)    mc3 → ROTATED (keikoku_chest_preload; was STR 1 / fmv_id 1)
#   mc4 → STR 2 (fmv_id 2)    mc5 → ROTATED (title_screen_new_game)
#   mc6 → ROTATED (v0.1 slice C+, dialogue-accept; was STR 4 / fmv_id 4)
#   mc7 → ROTATED (v0.1 slice C; was fmv_id 5)
#   mc8 → ROTATED (v0.1 slice E, post-battle; was fmv_id 6)
#   mc9 → STR 7 (fmv_id 7)
#   mc0 → ROTATED (v0.1 slice D; was fmv_id 8)
#
# (mc1 is unrelated to the FMV corpus in this rotation.)
#
# Existing slot-specific tests (encounter trigger, battle init, item-use,
# anim, level-up triplets, FMV-overlay residency) carry slot-fingerprint
# guards (`require_slot_scenes`) and skip-pass when the corpus has been
# rotated to a different shape. They remain in the test suite as
# documentation of the prior captures; the constants they reference are
# still authoritative for the engine layer.

[defaults]
# Filename pattern for the user's mednafen saves. {slot} is replaced with
# the slot index (0..9). The hash is mednafen's per-rom identifier - adjust
# if you're using a different US dump.
filename_pattern = "Legend of Legaia (USA).788de08f9c7e652c51d8d08ee374d055.mc{slot}"
# Default mcs/ directory. Override at runtime via `LEGAIA_MEDNAFEN_DIR`.
# (Left unset here so the manifest is portable.)

# ----------------------------------------------------------------------
# mc0 - v0.1 playthrough oracle anchor D: first frame of running
# battle (Tetsu tutorial fight).
#
# game_mode = 0x15 (BattleMode); active_scene stays "town01" because
# battles run as a scene-mode overlay on top of the loaded field scene,
# not a scene swap. The transitional `BattleInit (0x14)` lasts a single
# frame and is not captured here; mc0 is one frame later, in steady-
# state BattleMode where the battle action SM is ticking.
#
# Anchor in the v0.1 slice taxonomy (see backlog item 1): the
# comparison target for the recorded battle-start frame. The replay's
# `[[expected]]` block (once recorded) will name the frame at which
# the engine must reach scene_mode=Battle / active_scene=town01.
#
# Supersedes the FMV-trigger-corpus `fmv_trigger_str_8` capture that
# previously occupied this slot.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 0
label = "v0_1_battle_first_frame_tetsu"
ram_fingerprint_sha256 = "a6272a82f24bdee953e4f8dc19caa8df7621556e618d9bc9af7bc88712ad6f59"
description = "v0.1 slice anchor D: first frame inside the Tetsu tutorial battle (BattleMode running)"
topics = ["v0.1 slice", "battle init", "Tetsu tutorial", "BattleMode", "town01"]
phase = "battle"
# `expected_active_scene` is intentionally unset. `mode_trace_e3`
# treats that field as "engine reaches this scene_mode from a cold
# boot on this scene" -- which this anchor cannot satisfy (the engine
# boots into Title/town01, not Battle/town01). The actual scene under
# the battle IS "town01" with game_mode 0x15 BattleMode; the v0.1
# oracle picks this anchor up via [[expected]] frame comparisons in
# scripts/replays/v0_1_playthrough.toml when the field-VM-to-battle
# handoff exists in-engine.
expected_game_mode = 0x15

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000


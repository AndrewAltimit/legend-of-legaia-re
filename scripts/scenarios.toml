# ----------------------------------------------------------------------
# Boot-to-first-town arc checkpoints (mednafen-side slot not allocated;
# these are primarily PCSX-Redux save-state references for the
# step-by-step launch -> first town reverse-engineering walk).
#
# Each scenario names a stable game state along the boot path. Capture
# the state in PCSX-Redux (Ctrl+F<N>), then add the resulting
# `pcsx_redux_sstate` field below. `manage-states.py list` shows "·"
# when the manifest declares a path but the file is missing, "•" when
# the file exists - so an unfilled checkpoint surfaces as a TODO until
# captured.
#
# The slot field is set to 255 (= sentinel "no mednafen slot allocated")
# so the existing slot-based tests don't accidentally pick these up.
# Allocate a real mednafen mc{0..9} slot if/when a mednafen capture of
# the same state is added.
# ----------------------------------------------------------------------

[[scenarios]]
slot = 255
label = "cold_boot_pre_init"
description = "Save state taken pre-BIOS-init; cold-boot the title overlay LZS decode + countdown trigger from here."
phase = "boot"
pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate7"
topics = ["boot path", "title overlay load", "countdown trigger"]

[[scenarios]]
slot = 255
label = "publisher_logos"
description = "Mid publisher-logo sequence (Prokion / Contrail / SCEA / WARNING). init.pak TIMs visible in VRAM; PROT 0895 has been LZS-decoded into the staging buffer."
phase = "boot"
# pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate3"   # uncomment after capture
topics = ["boot path", "init.pak", "publisher_logos"]

[[scenarios]]
slot = 255
label = "title_attract"
description = "Title screen idle - countdown ticking; main TITLE TIM uploaded to VRAM; tick function FUN_801DD35C running."
phase = "title"
# pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate4"   # uncomment after capture
topics = ["title overlay", "countdown trigger", "attract"]

[[scenarios]]
slot = 255
label = "title_menu_idle"
description = "Title menu visible (NEW GAME / CONTINUE). The user has interrupted the attract countdown but not yet pressed X; menu-glyph atlas at 0x80106478 is live; sub-mode VM in title-overlay tick is on the menu branch."
phase = "title"
pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate8"
topics = ["title overlay", "title menu", "menu glyph atlas"]

[[scenarios]]
slot = 255
label = "save_select_idle"
description = "Save-slot select screen open (CONTINUE pressed). Menu overlay 0896 paged in; FUN_801DC6B4 driving the save-screen SM."
phase = "menu"
# pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate5"   # uncomment after capture
topics = ["save screen", "menu overlay"]

# ----------------------------------------------------------------------
# NEW GAME flow: title menu -> intro cutscene A -> Rim Elm zoom-in ->
# Vahn walks out of house -> name input UI -> intro cutscene B ->
# free-roam first town. Each is a stable hold point for capture.
# ----------------------------------------------------------------------

[[scenarios]]
slot = 255
label = "new_game_cutscene_intro_a"
description = "First in-game (engine-rendered, NOT STR-video) cutscene after the player picks NEW GAME. The cutscene is the engine-side opening narrative leading into Rim Elm."
phase = "cutscene"
# pcsx_redux_sstate = "..."   # uncomment after capture
topics = ["new game", "in-engine cutscene", "intro"]

[[scenarios]]
slot = 255
label = "rim_elm_zoom_intro"
description = "Special 3D camera view zooming in on Vahn's house in Rim Elm; in-engine cinematic, not a regular field scene. Distinct camera path / actor scripting from interactive Rim Elm."
phase = "field"
# pcsx_redux_sstate = "..."   # uncomment after capture
topics = ["new game", "Rim Elm intro", "cinematic camera"]

[[scenarios]]
slot = 255
label = "vahn_walks_out"
description = "Scripted Vahn animation: walks out of his house at the start of the intro sequence. Actor VM driving a fixed motion path."
phase = "field"
# pcsx_redux_sstate = "..."   # uncomment after capture
topics = ["new game", "scripted actor motion", "intro"]

[[scenarios]]
slot = 255
label = "name_input_ui"
description = "Name-entry UI open (default 'Vahn'). Distinct menu overlay; text-entry SM with character grid + cursor."
phase = "menu"
# pcsx_redux_sstate = "..."   # uncomment after capture
topics = ["new game", "name input", "menu overlay"]

[[scenarios]]
slot = 255
label = "new_game_cutscene_intro_b"
description = "Second in-game cutscene immediately after name confirmation; final lead-in to free-roam Rim Elm."
phase = "cutscene"
# pcsx_redux_sstate = "..."   # uncomment after capture
topics = ["new game", "in-engine cutscene", "intro"]

[[scenarios]]
slot = 255
label = "first_town_interactive"
description = "Rim Elm free-roam after the full NEW GAME intro completes (or CONTINUE drops the player here from a near-start save). Dialog VM idle, player input live. End state of the boot-to-town walk."
phase = "field"
expected_active_scene = "town01"
# pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate9"   # uncomment after capture
topics = ["field", "town01", "Rim Elm", "interactive"]

# ----------------------------------------------------------------------
# CONTINUE flow: an alternate path from save_select_idle that skips
# the NEW GAME intros and drops the player at whatever save state they
# loaded. field_load_first_town captures the loader frame; from there
# the player is already inside first_town_interactive (or wherever).
# ----------------------------------------------------------------------

[[scenarios]]
slot = 255
label = "field_load_first_town"
description = "Mid-transition to the first field scene via either NEW GAME (after name input) or CONTINUE. FUN_8001F7C0 scene-asset loader executing; field-pack bytes streaming into _DAT_8007B8D0."
phase = "field"
# pcsx_redux_sstate = "$HOME/Tools/pcsx-redux/SCUS94254.sstate6"   # uncomment after capture
topics = ["field load", "scene asset loader", "town01"]

# ----------------------------------------------------------------------
# Seru-capture (spell learn) before/after pair, captured during the Rim
# Elm Gimard fight. `before` is the frame just prior to the capture; `after`
# is during the "captured!" banner. Diffing the two pins the persistent
# spell-learn write into the character record: ONLY 3 bytes change in the
# whole 4-record character table, all in Vahn's record (base 0x80084708):
#   +0x13C  00 -> 01    spell-list count 0 -> 1
#   +0x13D  00 -> 0x81  spell-id array[0] = 0x81 (Gimard's spell)
#   +0x161  00 -> 01    spell-level array[0] = 1
# This validates legaia_save::CharacterRecord::spell_list (count @ +0x13C,
# ids @ +0x13D, levels @ +0x161) against retail, and shows a story-Seru
# capture is an IMMEDIATE grant (no capture-points accumulation in the
# record) at spell level 1. Real spell ids (0x81) sit far above the
# clean-room SpellCatalog approximations. See
# capture_observations::seru_capture.
# ----------------------------------------------------------------------


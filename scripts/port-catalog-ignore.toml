# Catalog scope-ignore list for `scripts/port-catalog.py`.
#
# Lists Ghidra-traced addresses that are NOT engine-port sites. The clean-room
# port maps the named clusters to Rust stdlib / wgpu / cpal / direct-API shims
# rather than line-by-line porting, so they should not contribute to the
# `--missing-ports` worklist.
#
# Format: per-category section, `addr = "reason"` rows.
# Address must be lowercase 8-hex-digit in the SCUS / overlay code range.
# The reason is human-readable and shows up in catalog drill-down output.
#
# Categories are organisational only - the tool treats all entries the same.
# Provenance for each entry lives in `docs/reference/functions.md` and the
# audio / save-screen subsystem docs.


# PSX BIOS table dispatchers + syscall thunks. Statically linked PsyQ kernel
# glue. Engine maps the surrounding logic to native equivalents (kernel events
# -> std::sync, FlushCache -> no-op on a non-MIPS host, etc.).
[bios]
"80056658" = "TestEvent BIOS thunk (jr 0xB0, t1=0x0B)"
"80056678" = "EnterCriticalSection (syscall(0), a0=1)"
"80056688" = "ExitCriticalSection (syscall(0), a0=2)"
"80056698" = "B-vector thunk (li t2,0xB0; jr t2) - one of nine byte-identical linker copies"
"800566a8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566b8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566c8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566d8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566e8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566f8" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056708" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056718" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056738" = "A-vector thunk (jr 0xA0) - libapi BIOS dispatcher"
"80056748" = "strncmp (BIOS A0 0x18)"
"80056768" = "strlen (BIOS A0 0x1B)"
"80057014" = "rand (BIOS A0 0x2E)"
"8005acd8" = "GPU_cw (BIOS A0 0x49)"
"8005ace8" = "A-vector thunk (jr 0xA0)"
"8005bbe8" = "FlushCache (BIOS A0 0x44)"
"8005fd68" = "BIOS B0 0x5B (card init)"
"8005fd78" = "ChangeClearRCnt (BIOS C0 0x0A)"
"8006b844" = "WaitEvent BIOS thunk (jr 0xB0, t1=0x0A)"
"8006d7a4" = "BIOS C0 thunk (li t2,0xC0; jr t2; li t1,0x3) - ChangeThreadSubFunction"
"8006ee14" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee24" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee34" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee6c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x4E)"
"8006ee7c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x50)"


# libc / PsyQ runtime glue. Each maps to a Rust stdlib equivalent.
[libc]
"80017888" = "malloc wrapper (alloc-count++, calls FUN_8002b468 best-fit allocator, on null increments OOM-size sum and prints 'malloc_err_size %d')"
"80017b94" = "free wrapper (alloc-count--, on null prints 'free_err', calls FUN_8002b584 underlying free)"
"800567b8" = "printf-class formatter (handles %d %x %o %s %f); writes into a static buffer"
"80056b18" = "printf-class formatter (sister of 800567b8)"
"80057024" = "memmove (overlap-safe direction-aware copy)"
"8005acac" = "memset"
"8005e540" = "memcpy (forward-only byte copy)"
"8005fccc" = "VSync wait spin (frame-budget gated)"
"8005ff04" = "irq_mask_swap16 (atomic swap on the 16-bit IRQ mask)"
"80060a04" = "BREAK 0x105 debug trap"


# libgte primitives. The engine emits GTE-equivalent matrix and projection
# math directly in `crates/engine-render`; the retail wrappers are not
# carried over.
[libgte]
"8005b7c0" = "SetRotMatrix (setCopControlWord(2, 0xD800, x))"
"8005b7cc" = "SetTransMatrix (setCopControlWord(2, 0xE000, x))"
"8005adb8" = "Fixed-point bit-rotation / arc helper (85-instr ladder)"
"8005af0c" = "isqrt-style normalise (wraps 8005ba1c)"
"8005ba1c" = "GTE sqrt / normalise (mtc2 0xF000 / mfc2 0xF800)"
"8005ba68" = "GTE 3-point transform helper (RTPT)"
"8005b038" = "GTE RTPS (perspective-transform-single) vertex-batch loop (cop2 0x198003D in a per-vertex stride-8 loop)"
"8005bb48" = "InitGeom - exception-handler table install + FlushCache"


# libcd primitives and the ISO9660 / streaming-read stack above them.
# The engine reads PROT.DAT through `legaia-iso` + `legaia-prot` directly.
[libcd]
"8005a78c" = "Pad / SIO init (SIO MMIO + RX/TX buffer clear)"
"8005abd0" = "Pad-protocol-phase handshake (digital-pad protocol selector)"
"8005bd70" = "getLoc-equivalent state-buffer getter (returns &DAT_800793c8)"
"8005befc" = "CdControl wrapper (FUN_8005befc(2,...) issues CdlSetloc)"
"8005c2c4" = "CdDiskReady (wraps 8005d9a0)"
"8005c328" = "LBA -> BCD-MSF converter"
"8005c42c" = "BCD-MSF -> LBA converter (((m*60 + s)*75 + f) - 150)"
"8005c4ac" = "libcd internal poll/state target (CdSync recurses through here)"
"8005ccb4" = "CdSync (179-instr poll loop)"
"8005d9a0" = "CdControl_raw / CD-DMA-channel-3 synchronous read primitive"
"8005dbb4" = "ISO9660 directory lookup"
"8005dea0" = "Directory parser (caches up to 128 entries at 0x801C4BEC)"
"8005e180" = "Directory-entry lookup by ID"
"8005e228" = "File loader (reads sectors from a directory entry)"
"8005e4d4" = "Synchronous LBA-based file reader (high-level open-then-read)"
"8005e574" = "CD sector-reader state machine / streaming-read per-IRQ callback"
"8005e788" = "Streaming-read starter (registers 8005e574 as IRQ callback)"
"8005e9a4" = "Public streaming-read API (sector_count, dest_buffer, mode_flags)"


# libgs / libgpu primitives. The clean-room renderer in `engine-render` emits
# its own GP0 / OT / draw-env machinery; the retail PsyQ wrappers below are
# 1:1 PsyQ entry points that wrap a vtable dispatch + dev-string printf, plus
# a couple of inline addPrim-shape helpers Sony's build emitted as real
# functions rather than macros (presumably to save code size given call counts
# in the 100s).
[libgs]
"8003d2c4" = "addPrim / linkPrim (OT-linker primitive; swap low-24 preserve high-8). Inlined function, not a PsyQ library entry."
"80057c44" = "ResetGraph (vtable dispatch + dev-string printf wrapper)"
"80057fec" = "GetGraphDebug (returns DAT_80078d54)"
"8005800c" = "DrawSyncCallback"
"80058068" = "SetDispMask"
"80058104" = "DrawSync"
"80058170" = "Internal RECT validator (debug-mode bounds check + printf)"
"80058298" = "ClearImage (vtable dispatch + dev-string printf wrapper)"
"800583c8" = "LoadImage (vtable dispatch + dev-string printf wrapper)"
"8005842c" = "StoreImage (vtable dispatch + dev-string printf wrapper)"
"80058490" = "MoveImage (vtable dispatch + dev-string printf wrapper)"
"8005860c" = "ClearOTagR"
"80058704" = "DrawOTag"
"80058778" = "PutDrawEnv"
"8005887c" = "DrawOTagEnv"
"800589d0" = "PutDispEnv"
"80059bd4" = "LoadImage2 / MoveImage internal (DMA over GPU MMIO ports DAT_80078e24/E28)"
"80059c00" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"
"80059de4" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"


# libetc / libcomb (VSync, frame-pacing) plus SCUS-resident dev-instrumentation
# helpers (in-game debug-string formatter, dev path-based file reader). The
# engine uses Rust's logging stack (tracing / env_logger) and ISO9660 directly;
# none of these have engine equivalents.
[libetc]
"8001a068" = "in-game dev-string formatter / on-screen log printer. Reads format string, writes RGB 0x808080 cell, %-escape walker. Called via 8001a09c-style wrapper that takes (fmt, args...) and pushes a text primitive."
"8003e6bc" = "dev host-FS reader: (path, dest) -> fopen + fseek/SEEK_END for size + fread + zero-pad to 0x800 sector. Calls libapi 800608f0/80060920/80060944/80060910. The retail dual-mode loader's debug branch; clean-room engine reads from disc via ISO9660 only."
"8005fb84" = "VSync(N) handler - wraps 8005fccc with frame-counter math"


# libapi file API + device-vtable trampoline. These back the dev branch's
# fopen / fseek / fread / fclose path; the engine uses std::fs.
[libapi]
"800608e0" = "libapi fopen (kernel-call wrapper around BIOS A0 table)"
"800608f0" = "libapi file-API leaf (fopen / fseek / fread / fclose cluster)"
"80060910" = "libapi file-API leaf"
"80060920" = "libapi file-API leaf"
"80060944" = "libapi chunk reader (loops over 80060a04 BREAK 0x105 boundary)"
"8005fd88" = "libapi device-vtable trampoline (slot +0xC of PTR_PTR_8007A860)"



# Proposed additions to `scripts/ci/port-catalog-ignore.toml`.
#
# Generated by `scripts/ghidra-analysis/classify-worklist.py`. Every row is
# a worklist address that is not a distinct portable function entry. The
# reason restates the mechanical evidence read out of the Ghidra dump.
# `docs/tooling/worklist-classification.md` documents what each class means
# and which false positives a reviewer should spot-check.
#
# VA_ALIASED and UNCERTAIN rows are deliberately absent: an aliased VA is
# more work than one port site, not less, and UNCERTAIN needs a human.
#
# Merge into the main ignore list after review - do not consume directly.

[worklist_duplicate]
"80062310" = "DUPLICATE: 12-instruction stream identical modulo relocation to 8006ef18"

[worklist_interior]
"801ef9b4" = "INTERIOR: dump is a citation stub for 801ef6e0"

[worklist_phantom]
"8002b92c" = "PHANTOM: only dump body is a 2-instruction stub"
"8003f084" = "PHANTOM: only dump body is a 2-instruction stub"
"801ecc00" = "PHANTOM: only dump body is a 0-instruction stub"

# Game-side actor-sound orchestration over libsnd / libspu. Unlike the [libsnd]
# / [libspu] entries above (which are PsyQ SsAPI / SPU library entry points),
# these are SCUS-resident glue that bind/unbind an actor's voice slot by
# reading actor-struct fields (+0x6 pan, +0x8 active, +0xa bound sequence id)
# and dispatching straight into the already-ignored libsnd/libspu shims
# (80064370 SsSeqRewind, 80061e94 SsSeqClose, 8002657c/8002614c -> 800643c4 /
# 80062a0c / 80064890 vol+pan setters). The clean-room engine-audio owns its
# own sequencer + software-SPU voice pool, so the per-actor voice lifecycle has
# no separate clean-room semantic to port. (Documented in
# `docs/reference/functions.md`.)
[actor_sound_glue]
"800266e0" = "Actor sound-source teardown: pan-reset (8002657c) + libsnd SsSeqRewind (80064370) on the actor's bound sequence id. Game-side libsnd glue."
"80026520" = "Actor sound-source release: VSync (8005fb84) + libsnd SsSeqRewind/SsSeqClose (80064370 / 80061e94), fully closing the actor's voice slot. Game-side libsnd glue."
"80026740" = "Actor sound-source pan-reset + voice-stop: pan-reset (8002657c) + libsnd voice-stop (8006282c). Lightweight detach; game-side libsnd glue."
"80026478" = "Actor sound-source attach / re-pan: CD/reverb attrs (80062a0c) + libsnd pause/resume (80062880) + directional re-pan (8002657c). Activation harness; game-side libsnd/libspu glue."
"8002657c" = "Directional-pan helper: on a changed actor pan byte (+0x6) re-applies master volume (800643c4) + CD/reverb (80062a0c) + voice vol/pan (80064890). Pure libspu/libsnd glue, no game logic."
"8002614c" = "Audio-context volume re-apply on state change (gp+0x800 edge): master volume + CD/reverb reset, then per-sequence volume re-apply across up to 4 sequencer slots (80064890 x4). Pure libsnd/libspu glue."
"80035bd0" = "SFX cue overwrite-slot variant (the 'overwrite current head' path). Cue-play is ported as engine-audio SfxScheduler::enqueue (// PORT: FUN_80035B50) + classify_cue (// PORT: FUN_8004FCC8); the ring overwrite-vs-advance distinction is deliberately not modelled, so this variant is subsumed by the FUN_80035B50 port. see ghidra/scripts/funcs/80035bd0.txt"


# Retail CD-streaming / boot-orchestration plumbing. The engine loads assets
# clean-room through the legaia_asset PROT index + MemoryVfs and owns its own
# scene/boot lifecycle, so the retail async-load state machines and dual-mode
# (ISO9660-path vs PROT-TOC) file plumbing have no port site. Game-logic
# residue inside each is ported separately and named in the reason.
"80026410" = "Actor sound-source bind / open - the acquire half of the family: gated on the field/dual-mode gate _DAT_8007B868 == 0 and the actor being inactive (actor[+0x8] == 0), it opens a slot via SsSeqOpen (80062340, already listed under [libsnd]) on actor[+0x0] / actor[+0xC], raises the active flag, latches the handle into actor[+0xa] and pokes the pan byte actor[+0x6] = 0xFFFF so the next 8002657c re-applies the mix. Same actor struct and same libsnd shims as the listed 800266e0 / 80026520 / 80026740 / 80026478; engine-audio owns its own sequencer and voice pool. see ghidra/scripts/funcs/80026410.txt"
"80018f94" = "Per-voice SPU state poll over the 0x800915D8 footstep/positional voice table: queries voice status through the libspu helpers 8006ca7c / 8006cb3c / 8006cdb0 / 8006ce30, then sets the footstep-active flag DAT_8007B79C and the per-voice trigger byte. Game-side libspu glue; the cadence that consumes the flag is ported separately as engine-audio FootstepCadence (PORT: FUN_80018db0), and the engine-audio voice pool subsumes the per-voice lifecycle. see ghidra/scripts/funcs/80018f94.txt"
[asset_load_plumbing]
"8001fc00" = "Dual-mode streaming file loader: retail branch strcat's a 'sound\\'-prefixed path (tables 0x8007B38C/0x8007B31C) into the by-path reader 8003e9c0; dev branch resolves via the PROT TOC (8003e8a8) + seek/read (8003e964/8003e800); maintains the gp+0x708 byte cursor (>>0xb sector conversion). The engine reads by PROT index; the BGM-id->slot mapping its callers feed in is ported as SceneHost::bgm_seq_bytes. see ghidra/scripts/funcs/8001fc00.txt"
"80019794" = "Scene-transition asset-load sequencer: 5-state machine over _DAT_8007b9c8 (CD read-wait poll 8003de7c -> capture-archive load 8003eae4 -> prev-op gate 8003f2b8), returns busy until done; the op-0x36 SCENE_FADE bit-15-clear sub-path. Stage 8003de7c is ported (engine-core cd_dma read_wait_poll); the wrapper is host-owned scene-load orchestration behind the scene_fade host hook. see ghidra/scripts/funcs/80019794.txt"

"8005becc" = "libcd completion-callback swap-setter: loads the callback pointer at DAT_800793AC, stores the new a0, returns the previous (the CdReadSyncCallback-family slot; sibling of the already-listed 8005bee4 setter for DAT_800793B0). Engine reads PROT.DAT through legaia-iso/legaia-prot, no libcd callback slots"
"8005be8c" = "CdSync wrapper: 8-instruction tail-call to 8005ca34 (the CdSync/CdReady drive-status poll - s_CD_sync / s_CD_timeout / CdlSync diagnostics, drains the CD result registers). Engine reads PROT.DAT through legaia-iso/legaia-prot, no CD-drive transport"
"8003d53c" = "CD-XA streaming-clip start: arms a streamed XA-ADPCM read off the clip MSF table (0x801C6ED8) through the libcd transport (8005c42c msf_to_lba, 8005be8c CdSync, 8005becc callback-swap, 8005c034 CdControl). The CD-drive half is out of clean-room scope - the engine decodes XA buffers (legaia-xa) and plays them through its own mixer, not a CD transport. see ghidra/scripts/funcs/8003d53c.txt"
"8003ed04" = "CD-XA streaming-clip stop: teardown counterpart of 8003d53c. Clears the libcd completion callback (8005becc) and issues the drive Pause/Stop commands (8005c160 / 8005c034) by mode. CD transport only, no game logic; sibling of the already-listed clip-path shim 8003ee7c. see ghidra/scripts/funcs/8003ed04.txt"
"8003eae4" = "CD-XA streaming-clip start by table index (simpler sibling of 8003d53c): when no clip is armed, stops the in-flight read (8003ed04 / 8003ee7c), looks up the 8-byte clip entry in the MSF table 0x801C6ED8, sets the drive read location via 8005c160, and issues CdControl 0x15 (8005c034). CD transport only; the engine decodes XA buffers (legaia-xa) through its own mixer. see ghidra/scripts/funcs/8003eae4.txt"


# libgs / libgpu primitives. The clean-room renderer in `engine-render` emits
# its own GP0 / OT / draw-env machinery; the retail PsyQ wrappers below are
# 1:1 PsyQ entry points that wrap a vtable dispatch + dev-string printf, plus
# a couple of inline addPrim-shape helpers Sony's build emitted as real
# functions rather than macros (presumably to save code size given call counts
# in the 100s).
"8005c160" = "libcd CdControl issue-with-retry wrapper. Issues a CD command via FUN_8005cf80 up to 3 times (saving/restoring the libcd busy state DAT_800793ac and the per-command word DAT_80079324[cmd] between tries) then polls the completion via FUN_8005ca34; returns success. Pure libcd transport with no game-specific semantic; the clean-room engine reads sectors through the CdDmaHost trait and plays decoded XA through its own mixer, so this is already REF-listed as out-of-scope in crates/engine-core/src/cd_dma.rs. see ghidra/scripts/funcs/8005c160.txt"
"8005ca34" = "CdSync (libcd): polls the CD IRQ status (8005fedc) with a VSync-based timeout, prints sync/timeout diagnostics on overrun, drains pending CD results and dispatches the ready / data-ready callbacks. The poll loop 8005be8c tail-calls and 8005c160 completes through; engine reads PROT.DAT via legaia-iso/legaia-prot, no CD-drive poll. see ghidra/scripts/funcs/8005ca34.txt"
"8005cf80" = "CdControl / CdControlB (libcd): writes a CD command + parameter bytes to the drive command/param registers, then (blocking form) reuses the CdSync poll loop to await completion and read back the result. The drive-issue primitive the 8005c034 / 8005c160 retry wrappers call; engine issues no PSX CD commands. see ghidra/scripts/funcs/8005cf80.txt"
"8005fedc" = "Leaf accessor returning the 16-bit CD status/IRQ word (*0x800797da); polled by CdSync (8005ca34) and CdControl (8005cf80). libcd internal; no engine equivalent. see ghidra/scripts/funcs/8005fedc.txt"
"8005beac" = "CdSync(mode, result) pass-through wrapper: 8 instructions, `addiu sp,-0x18; sw ra; jal 0x8005CCB4; nop; lw ra; addiu sp; jr ra` - neither a0 nor a1 is touched, so both register arguments reach the already-listed CdSync body 8005ccb4 unchanged. (Its decompiled C drops both arguments - the 'dropped register arguments' artifact; the disassembly is what settles it.) The drive-status delivery tail of the streaming sync FUN_8005EA84; engine reads PROT.DAT via legaia-iso/legaia-prot. see ghidra/scripts/funcs/8005beac.txt"

# Added by the port-wiring wave.
"8005be0c" = "libcd callback swap-setter: 6 instructions, `v0 = DAT_800793B8; DAT_800793B8 = a0; jr ra` - get-and-set of one driver callback pointer, byte-identical in shape to the already-listed 8005bee4 / 8005becc. Named in docs/subsystems/boot.md as one half of the FUN_8005BE0C / FUN_8005BE8C sync bracket. ..."
"8005dab0" = "libcd response dispatcher: loops on the interrupt-cause read 8005c4ac until it returns 0, dispatching cause bit 0x4 to the data-ready callback DAT_800793B0 and bit 0x2 to the completion callback DAT_800793AC, then restores the saved command byte at 0x80079689. Its entire body is drive-interrupt p..."
"8005eb50" = "libstr destination-callback swap-setter: 6 instructions, `v0 = DAT_800796C0; DAT_800796C0 = a0; jr ra`. Same get-and-set idiom as 8005be0c, on the streaming path's callback slot; the engine feeds legaia-mdec / legaia-xa from its own sector reader with no callback vector. see ghidra/scripts/funcs/..."
[libgs]
"8002035c" = "graphics teardown: frees double-buffer env handles gp+0x6d8.. + FntClose-style"
"8003d2c4" = "addPrim / linkPrim (OT-linker primitive; swap low-24 preserve high-8). Inlined function, not a PsyQ library entry."

"8003daa8" = "CD load-kick / completion driver. Bumps the load counters gp+0x8E8 / gp+0x964, swaps the libcd completion callbacks (8005bee4 / 8005becc), converts the current BCD MSF to an LBA (8005c42c) into gp+0x8C8, and drives CdControl (8005c034) with VSync waits (8005fb84) until the queued read completes -..."
"8003e9c0" = "Named-resource open helper. Copies the caller's name string into a scratch record with the BIOS strncpy thunk 80056758, resolves it through the libapi file-API leaves 800608f0 / 80060920 / 80060944 / 80060910, and on a miss (-1) bumps the fail counter _DAT_8007B86E and re-copies the name for the ..."


# SCUS routines whose entire body sits behind the master debug-menu gate

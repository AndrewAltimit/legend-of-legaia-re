# Added by the port-worklist closeout. Complete function bodies - real
# prologue, real epilogue - whose every store lands in their own stack frame,
# so they have no caller-visible effect. The retail compiler kept the frame
# after the only consumer of the locals was optimised away.
[worklist_noop_frame]
"801d1cd4" = "Frame-local no-op, not a portable routine. Ten instructions in the field-to-battle transition overlay (PROT 0979): `addiu sp,sp,-0x10`, six `sh` stores into sp+0x0/0x2/0x4/0x8/0xa/0xc (a (0,0,0x7d0) vector and a zero vector), then `jr ra; addiu sp,sp,0x10`. The frame pointer is never taken, no argument register is read, nothing is returned - the whole body is dead on exit. Confirmed from the disassembly, not the C (the C renders it as a bare `return;`). see ghidra/scripts/funcs/overlay_field_battle_intro_801d1cd4.txt"
# Slot-A minigame overlays (PROT 0971..0980, link base 0x801CE818): the 2D
# primitive builders. Each row's body assembles one GP0 packet family into the
# scratchpad prim arena at *(0x1F80039C..0x1F8003A0) and links it with the OT
# insert 0x8003D2C4 or the sprite emitter 0x80036888 - packet geometry only,
# with no game state read or written beyond the descriptor table it copies
# from. The engine draws these screens from its own draw-list builders
# (engine-ui) against the same descriptor tables (`legaia_asset::baka_opponents`
# for the duel HUD, `legaia_asset::minigame_slot_scene` for the cabinet), so
# the packet layer has no port site of its own.
[worklist_prim_builder]
"801d079c" = "Slot-machine bet-lamp strip: three 5-word 0x14-byte rects at y=0x84 stepping x by 0x10 from 0x230, cell 0x10 square, clut 0x7A8D, shaded 0x80 when *(0x801D3C9C) bit 0 is set and 0x90 otherwise, lit only while the lamp index is below the bet count *(0x801D3CB0); then one libgpu fill through 80059010. Every store lands in the prim arena and is linked with 8003d2c4. see ghidra/scripts/funcs/overlay_slot_machine_801d079c.txt"
"801d0e1c" = "Slot-machine cabinet frame: builds 0x14-byte flat rect packets (tag 0x04000000) from stack SVECTORs projected through 8003d368 and links each with 8003d2c4; the only non-packet stores are the loop's own stack scratch. see ghidra/scripts/funcs/overlay_slot_machine_801d0e1c.txt"
"801d08e4" = "Slot-machine cabinet panel emitter: 334 instructions that walk the quad table at 0x801D3D00 emitting 0x28-byte POLY_GT4 packets (tag 0x09000000, tpage 0x2C808080) over the 0x230 x 0x120 cabinet rect, each linked with 8003d2c4. No reel or payout state is read - the packet corners come from the table and the stack SVECTORs. see ghidra/scripts/funcs/overlay_slot_machine_801d08e4.txt"
"801d2914" = "Slot-machine decimal number drawer: clamps the value at 99999, then per digit builds a 0x28-byte POLY_FT4 (tpage 0x2E00 + *(0x8007B7A4), u = digit*0x10 + 0x40/0x50, cell 0x10x0xC) walking right to left and links it with 8003d2c4. Digit extraction is the standard 0x66666667 divide-by-10; the port's UI number drawing is engine-ui text. see ghidra/scripts/funcs/overlay_slot_machine_801d2914.txt"
"801d2aa4" = "Slot-machine payout-table renderer: walks the 5-row symbol table at 0x801D3784, emitting three 0x28-byte quads per row (u/v paged from the symbol byte) and the row's payout through 801d32c8; every store is a packet field. see ghidra/scripts/funcs/overlay_slot_machine_801d2aa4.txt"
"801d2cc0" = "Slot-machine sprite emitter: reads a 20-byte descriptor from 0x801D347C, scales each of the six colour bytes by the caller's brightness (mult/sra 8), derives the quad half-extents from +0x0A/+0x0B through two 0x1000-shift multiplies, and links a 0x34-byte POLY_GT4. Same descriptor family the port parses as `legaia_asset::minigame_slot_scene`. see ghidra/scripts/funcs/overlay_slot_machine_801d2cc0.txt"
"801d30f8" = "Slot-machine 14-glyph caption strip: sets the text-kind byte 0x80073F20 = 0xC and emits the string-pointer array at 0x801D34B8 through the sprite emitter 80036888, x stepping 0xD per glyph. see ghidra/scripts/funcs/overlay_slot_machine_801d30f8.txt"
"801d317c" = "Slot-machine payline bar: one 0x28-byte POLY_GT4 (tpage 0x2C808080, clut 0x7B43, extent 0xA8 x 0x30, corner shades 0xA0/0xD0) linked with 8003d2c4. see ghidra/scripts/funcs/overlay_slot_machine_801d317c.txt"
"801d32c8" = "Slot-machine payout-digit quad, sibling of 801d317c: same 0x28-byte POLY_GT4 shape with the u origin paged by `digit << 4` and clut 0x7B42. see ghidra/scripts/funcs/overlay_slot_machine_801d32c8.txt"
"801d6480" = "Baka Fighter white/black gradient bar: one 0x24-byte POLY_G4 (corner RGB 0xFF/0xFF/0x00/0x00, code 0x3A101010) plus a libgpu fill via 80059010, both linked into the OT bucket the 5th argument selects. see ghidra/scripts/funcs/overlay_baka_fighter_801d6480.txt"
"801d6770" = "Baka Fighter flat quad: one 0x18-byte POLY_F4 (code 0x28101010) spanning (x, y)..(x+w, y+h) into the caller-selected OT bucket. see ghidra/scripts/funcs/overlay_baka_fighter_801d6770.txt"
"801d6cbc" = "Baka Fighter help-screen chrome: text kind 0x80073F20 = 0xC, eleven string pointers from 0x801D7134 through the sprite emitter 80036888 at a 0xD line pitch, then the 0xF0 x 0x8F window frame through the shared box dispatcher 8002C69C. The port draws help text through engine-ui. see ghidra/scripts/funcs/overlay_baka_fighter_801d6cbc.txt"
"801d7c84" = "Fishing sub-screen icon row: reads up to four ids from the word array *(0x801D9114) at index `row*8 + i`, stops on -1, and emits each through the sprite emitter 80036888 out of the 0x28-stride descriptor array at 0x801D81A4, x stepping 0x10 per icon. see ghidra/scripts/funcs/overlay_fishing_801d7c84.txt"
"801d24ec" = "Fishing venue backdrop: stamps the two GTE camera records at 0x8007BF44/0x8007BFB8, pushes the rotation trio through 800172c0 / 8003d1ec / 8003d368, then emits the gradient quad strip. Camera-and-packet only; the port's camera is `engine-core::camera`. see ghidra/scripts/funcs/overlay_fishing_801d24ec.txt"
# Slot-B world-map render overlay (PROT 0901, link base 0x801F69D8): same
# packet-only shape as the slot-A rows above.
"801f73e4" = "World-map top-view band strip: zeroes the camera roll global 0x8007B792 (saving it into s5) and restores it on exit, pushes the camera through 800172c0 / 8003d1ec / 8003d368, then loops five times emitting a 0x14-byte flat rect (tag 0x04000000) per band into the scratchpad prim arena at *(0x1F8003A0) - each screen-clipped against the 0x140-wide, 0x80-high draw area with the extent shrunk rather than the packet dropped - and links each with 8003d2c4, closing with one 0x98 SetDrawMode fill through 80059010 and a final link. No band count, colour or geometry is read from game state: the tint endpoints come from literals (0x00808080 / 0x00404040 + 0x64000000) selected by 8003ce64, and the row pitch is `i << 7`. The engine draws the world-map sky/band layer from engine-render's own draw list. Body resolves to world_map_render(901) at its mapped base. see ghidra/scripts/funcs/overlay_world_map_top_ext_wm_ext_dispatcher_caller_helper_801f73e4.txt"

# Same overlay family, the 3D half: GTE matrix push / RotTrans / mesh submit
# wrappers. Each pushes a matrix with 8005B268, transforms through 8003D344 or
# 8003D368, submits with the shared mesh renderer 0x80043390. The two Baka Fighter rows also push and
# pop a matrix with 8005B268 / 8005B308. The port renders minigame geometry through `engine-render`'s own
# TMD path, so these wrappers model nothing the engine does not already own.
[worklist_mesh_submit]
"801d6bb8" = "Baka Fighter stage-prop draw: matrix push, RotTrans of the caller's transform, a texture-window record built on the stack (0x00808080 or 0x0080A0C0 tint by the flag argument, 0x0707 mask, 0x100 or 0x400 selector) staged through 80028158, then two mesh submits at *(0x8007B85C)+0x62400 / +0x6240C. see ghidra/scripts/funcs/overlay_baka_fighter_801d6bb8.txt"
"801d6d60" = "Baka Fighter billboard draw: matrix push (8005B268), RotTrans (8003D344), an `SZ < 0x2711` depth reject, texture bind through 8004629C from the actor's `+0x02` id, then one mesh submit at the scene-mesh table 0x8007C018 indexed by *(0x8007B6F8), offset +0xC. see ghidra/scripts/funcs/overlay_baka_fighter_801d6d60.txt"
"801d1c5c" = "Fishing scene-object draw: matrix load/pop through 8003D1A4 / 8003D254, RotTrans (8003D344) plus the 8003D368 project, CLUT / tpage / texture binds through 800461A4 / 8004629C / 8004638C, then one submit into the shared mesh renderer 0x80043390. see ghidra/scripts/funcs/overlay_fishing_801d1c5c.txt"
"801d67bc" = "Fishing actor draw callback: gates on the actor's `+0x72` size word, biases the OT head by -0x14 when the actor's `+0x10` carries bit 0x80800000, loads the matrix at 0x8007BF10 (8003D1A4), binds texture / CLUT / tpage from the actor's `+0x24/+0x26/+0x28` (8004629C / 800461A4 / 8004638C), then transforms and submits through 8003D20C / 8003D368 / 0x80043390. Transform-and-submit only. see ghidra/scripts/funcs/overlay_fishing_801d67bc.txt"

# Structural rows from the same band.
[worklist_minigame_structural]
"801d84b4" = "PADDING, not a routine: the body is inter-function alignment `nop` - 17 of them in the fishing/dance/debug-menu/slot-machine images (PROT 0972's own content ends at 0x801D9818, just past this VA) and 32 with one stray `sllv zero,zero,zero` in the baka-fighter image. No prologue, no `jr ra`. The one dump that resolves an entry here (the field overlay's) headers `entry=801d8308`, i.e. interior. see ghidra/scripts/funcs/overlay_fishing_801d84b4.txt"
"801d13c4" = "NO-OP: the whole 9-instruction body is `v1 = 0; a0 = 0x801D3CC0; while (v1 < 3) v1 += 1; jr ra`. The address it materialises is never used and the loop has no body, so the routine has no observable effect. It sits immediately above the documented payout evaluator 801d13e8. see ghidra/scripts/funcs/overlay_slot_machine_801d13c4.txt"
"801d0230" = "INTERIOR of FUN_801D0100, verified against the disc bytes rather than the dump: disassembling PROT 0972 at 0x801CE818 gives a 172-instruction body at 0x801D0100 spanning 688 bytes, i.e. 0x801D0100..0x801D03B0, which contains this VA - and the dump at 801d0230 opens `lw a0,-0x6f10(s0)` reading a live s0 with no prologue and closes by restoring s0..s7/ra from a 0x48-byte frame it never builds. The debug-menu image the dump is labelled with does not own these bytes either: PROT 0971's own content stops at file +0x1800 (VA 0x801D0018). docs/reference/functions.md lists it as an entry; port FUN_801D0100 instead."
"801d7964" = "PRIM BUILDER: unpacks two 24-bit RGB arguments into six halfwords of a 0x20-byte stack record, appends four caller words, and posts it with the fill-primitive poster 0x80024E80. No state read or written outside that record. see ghidra/scripts/funcs/overlay_fishing_801d7964.txt"
"801cfe98" = "THIN TRAMPOLINE WRAPPER: the whole 9-instruction body is `a1 = a0; FUN_8005FDE8(0, a1)`, forwarding into the already-ignored libapi device-vtable trampoline 8005fde8 (slot +0x4). Direct sibling of the already-listed 8005c2e4, which is the same shape with selector 3. see ghidra/scripts/funcs/overlay_debug_menu_801cfe98.txt"

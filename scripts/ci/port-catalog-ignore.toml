"801df6b8" = "Damage-number popup renderer: extracts base-10 digits of ctx[+0x83C] with the 0x66666667 divide-by-10 magic, indexes the digit glyph atlas, and builds one 0x09-code sprite quad per digit into the OT, ramp-scaling by the per-slot timer ctx[+0x85C]; projects through 800195A8 and links via AddPrim 8..."

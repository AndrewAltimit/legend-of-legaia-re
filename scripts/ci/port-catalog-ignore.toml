# engine uses Rust's logging stack (tracing / env_logger) and ISO9660 directly;
# none of these have engine equivalents.
"80017aac" = "Full-screen VRAM readback: DrawSync (80058104) then StoreImage (8005842c) of a w x 240 rect, sizing a w*480+0xC descriptor that is handed to the retail-stripped empty stub 8003e7f0. The dev screen-dump path; the engine captures frames off the wgpu surface. see ghidra/scripts/funcs/80017aac.txt"
"80017dd4" = "Tile-window render pass, sibling of the listed 80017ec8: seeds the scroll-origin scratchpad words _DAT_1F8003F8/FA, calls the region-attribute refresh 800180ec (the genuine game-logic half, which stays in the worklist), then walks a 32x32 cell window emitting each cell through 8002b96c - itself an empty retail-stripped stub. The real tile draw is the engine's wgpu field/board background path. see ghidra/scripts/funcs/80017dd4.txt"
"8001d184" = "GTE matrix-composition thunk: PushMatrix (8005b268), control-word restore from 0x1F8003A8 (8003d1a4), RotMatrixZ/Y/X over the object angles at +0x28/+0x26/+0x24 then the camera angles at +0xC/+0xA/+0x8, control-word save to 0x1F800334 (8003d20c), SetLightMatrix (8005b648), PopMatrix (8005b308). Eleven libgte calls and no game state of its own; the engine composes transforms with glam and lights in the wgpu shader. see ghidra/scripts/funcs/8001d184.txt"
"8001f690" = "Ordering-table allocator: allocates 1<<depth entries twice through the malloc wrapper 80017888 into the DISPENV pair at +0x70 / +0xE4, publishes the depth to the scratchpad, then ClearOTagR (8005860c) on both. The OT half of the already-listed packet/OT allocator 8001e3b8. see ghidra/scripts/funcs/8001f690.txt"
# STR/FMV overlay (PROT 0970) MDEC hardware layer. The clean-room decoder in
# crates/mdec is a software VLC -> IDCT -> BT.601 pipeline over a byte buffer;
# it never touches the MDEC command/status registers or DMA channels 0/1, so
# the three routines below have no port site. Their non-hardware siblings ARE
# ported (docs/subsystems/cutscene.md maps FUN_801CF098/8B0/988/A14/D84/EBC/56C
# onto mdec::str_player), which is what makes this a boundary and not a gap.
"801cffdc" = "MDEC command + DMA-0 upload: waits out the in-FIFO through 801d0100, ORs 0x88 into the MDEC control word (*(0x801D0E98)), points DMA-0 MADR at src+4 and BCR at ((len>>5)<<16)|0x20, writes src[0] to the MDEC command register (*(0x801D0E90)) and kicks CHCR 0x01000201. Pure MMIO/DMA; the engine's software MDEC consumes the same code stream from memory. see ghidra/scripts/funcs/overlay_str_fmv_0x801CFFDC.txt"
"801cfee0" = "MDEC reset (`MDEC_rest:bad option(%d)`): option 0 writes 0x80000000 then 0x60000000 to the MDEC control register, zeroes the DMA-0/DMA-1 register pointers and uploads the two 0x20-word quant/IDCT tables through 801cffdc; option 1 is the same reset without the table upload; any other option only prints. Hardware reset of a chip the clean-room decoder does not model. see ghidra/scripts/funcs/overlay_str_fmv_0x801CFEE0.txt"
"801d0248" = "MDEC sync-timeout diagnostic: two printf calls (800567a8) dumping the MDEC status word plus the DMA-0/DMA-1 channel and FIFO bits, called only from the two spin waiters 801d0100 / 801d0198 when their 0x100000-iteration budget runs out. Dev instrumentation over registers the engine has none of. see ghidra/scripts/funcs/overlay_str_fmv_0x801D0248.txt"


# Constant-address / global-buffer accessors: two- or three-instruction
# functions whose entire body is `lui v0, HI; (jr ra;) addiu v0, v0, LO` -
# they return the address of a fixed PSX-RAM global and nothing else. The
# clean-room engine replaces raw global pointers with typed Rust fields, so
# there is no function body to port (the callers' intent - e.g. walking the
# returned buffer as a CDNAME char* - is modelled where the caller is ported).
"8003adcc" = "Interior +0x20 of FUN_8003ADAC: the dump resolves the entry to 8003adac, and 8003adcc is that function's `sw s1,0x34(sp)` prologue register-save promoted to a fake FUN_ entry. see ghidra/scripts/funcs/8003adcc.txt"
"8003d38c" = "Ghidra split of the neighbouring GTE projector: the dump reports `size=1 bytes, 0 instructions` and the decompiled body is entirely `in_at`/`in_v0`/`in_v1` unaffected registers (an RTPT sequence belonging to the enclosing function). No body of its own to port. see ghidra/scripts/funcs/8003d38c.txt"

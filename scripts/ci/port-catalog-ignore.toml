# Catalog scope-ignore list for `scripts/ci/port-catalog.py`.
#
# Lists Ghidra-traced addresses that are NOT engine-port sites. The clean-room
# port maps the named clusters to Rust stdlib / wgpu / cpal / direct-API shims
# rather than line-by-line porting, so they should not contribute to the
# `--missing-ports` worklist.
#
# Format: per-category section, `addr = "reason"` rows.
# Address must be lowercase 8-hex-digit in the SCUS / overlay code range.
# The reason is human-readable and shows up in catalog drill-down output.
#
# Categories are organisational only - the tool treats all entries the same.
# Provenance for each entry lives in `docs/reference/functions.md` and the
# audio / save-screen subsystem docs.


# PSX BIOS table dispatchers + syscall thunks. Statically linked PsyQ kernel
# glue. Engine maps the surrounding logic to native equivalents (kernel events
# -> std::sync, FlushCache -> no-op on a non-MIPS host, etc.).
[bios]
"8006efd0" = "BIOS handler installer via B(0x56)"
"80056608" = "LoadAndExecute (BIOS A0 0x51) - li t2,0xA0; jr t2; li t1,0x51"
"80056628" = "_bu_init (BIOS A0 0x71) - li t2,0xA0; jr t2; li t1,0x71"
"80056648" = "OpenEvent BIOS thunk (jr 0xB0, t1=0x09)"
"80056658" = "TestEvent BIOS thunk (jr 0xB0, t1=0x0B)"
"80056678" = "EnterCriticalSection (syscall(0), a0=1)"
"80056688" = "ExitCriticalSection (syscall(0), a0=2)"
"80056698" = "B-vector thunk (li t2,0xB0; jr t2) - one of nine byte-identical linker copies"
"800566a8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566b8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566c8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566d8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566e8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566f8" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056708" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056718" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056728" = "strcat (BIOS A0 0x15) - li t2,0xA0; jr t2; li t1,0x15"
"80056738" = "strcmp (BIOS A0 0x17) - li t2,0xA0; jr t2; li t1,0x17"
"80056748" = "strncmp (BIOS A0 0x18)"
"80056758" = "strncpy (BIOS A0 0x19) - li t2,0xA0; jr t2; li t1,0x19"
"80056768" = "strlen (BIOS A0 0x1B)"
"80056788" = "memset (BIOS A0 0x2B) - li t2,0xA0; jr t2; li t1,0x2B"
"80056798" = "srand (BIOS A0 0x2F) - li t2,0xA0; jr t2; li t1,0x2F"
"800567a8" = "printf BIOS thunk (BIOS A0 0x3F) - li t2,0xA0; jr t2; li t1,0x3F"
"80057014" = "rand (BIOS A0 0x2E)"
"8005acd8" = "GPU_cw (BIOS A0 0x49)"
"8005ace8" = "A-vector thunk (jr 0xA0)"
"8005bbe8" = "FlushCache (BIOS A0 0x44)"
"8005fd68" = "BIOS B0 0x5B (card init)"
"8005fd78" = "ChangeClearRCnt (BIOS C0 0x0A)"
"8006b844" = "WaitEvent BIOS thunk (jr 0xB0, t1=0x0A)"
"8006d7a4" = "BIOS C0 thunk (li t2,0xC0; jr t2; li t1,0x3) - ChangeThreadSubFunction"
"8006ee14" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee24" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee34" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee6c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x4E)"
"8006ee7c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x50)"
"8006ef68" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x4C). One of the SPU-voice-init B0 thunks called in sequence by 8006ef18 (libspu init)"
"8006f088" = "SPU-voice-init B0 thunk (EnterCriticalSection + B0 0x57 + swap of 5 dwords DAT_8006F058.. <-> SPU voice block +0x9C8 + FlushCache). Sibling of 8006ef68 in the 8006ef18 init trio; BIOS/libspu glue, no game state"
"8006f118" = "SPU-voice-init B0 thunk (EnterCriticalSection + B0 0x56 + symmetric dword swap at voice block +0x18 / -0xE80). Sibling of 8006ef68/8006f088 in the 8006ef18 init trio; BIOS/libspu glue, no game state"


# libc / PsyQ runtime glue. Each maps to a Rust stdlib equivalent.
[libc]
"8005f994" = "u32 block-copy loop (memcpy of param_3 words), no game state"
"8001a6a4" = "memset (fill dst[0..n]=byte)"
"80017888" = "malloc wrapper (alloc-count++, calls FUN_8002b468 best-fit allocator, on null increments OOM-size sum and prints 'malloc_err_size %d')"
"8002b468" = "best-fit heap allocator under the 80017888 malloc wrapper (free-list walk + block split, no game state); Rust-side allocation replaces the arena wholesale"
"80017b94" = "free wrapper (alloc-count--, on null prints 'free_err', calls FUN_8002b584 underlying free)"
"800567b8" = "printf-class formatter (handles %d %x %o %s %f); writes into a static buffer"
"80056b18" = "printf-class formatter (sister of 800567b8)"
"80057024" = "memmove (overlap-safe direction-aware copy)"
"8005acac" = "memset"
"8005e540" = "memcpy (forward-only byte copy)"
"8003ca78" = "encoding-aware strcpy for Legaia dialog text: copies src->dst treating a 0xC0-class lead byte ((b & 0xf0) == 0xc0) plus its trailing byte as one 2-byte glyph/control unit; NUL-terminates. No GPU/OT/GTE; engine builds text via legaia-font layout"
"8003cac4" = "encoding-aware strcat for Legaia dialog text: scans dst to the first byte <= 0x1e (counting 0xC0-class pairs as one unit) then appends src via the same copy loop as 8003ca78. No GPU/OT/GTE"
"8005fccc" = "VSync wait spin (frame-budget gated)"
"8005ff04" = "irq_mask_swap16 (atomic swap on the 16-bit IRQ mask)"
"80060a04" = "BREAK 0x105 debug trap"
"8002b688" = "Heap block-list size summer: walks the circular block list rooted at *(gp+0x840)+0xc and sums each node's size field (+0x8), returning the total. PsyQ/libc heap bookkeeping (free/used total over the game heap); engine uses the Rust allocator. Surfaced running every field frame by the playthrough gap-set trace. see ghidra/scripts/funcs/8002b688.txt"
"8002b3d4" = "InitHeap (PsyQ/libc): builds a circular doubly-linked free-list of param1 blocks of the given size at the heap head gp+0x840. The allocator init behind the 80017888 malloc wrapper; engine uses the Rust allocator. see ghidra/scripts/funcs/8002b3d4.txt"
"8002b584" = "Heap free with neighbor coalescing (PsyQ/libc free-shape): returns a block to the gp+0x840 free-list, coalescing the forward + backward adjacent free neighbors. The underlying free the 80017b94 free wrapper calls; engine uses the Rust allocator. see ghidra/scripts/funcs/8002b584.txt"

# Added by the port-wiring wave.
"8005de80" = "12-byte filename equality test: loads two pointers, tail-calls the BIOS strncmp thunk 80056748 (A0 0x18) with n=12 and returns `result == 0`. The ISO9660 directory-entry name match; the engine compares names with Rust str/slice equality through legaia_iso::iso9660. see ghidra/scripts/funcs/8005de..."


# libgte primitives. The engine emits GTE-equivalent matrix and projection
# math directly in `crates/engine-render`; the retail wrappers are not
# carried over.
[libgte]
"8001b73c" = "GTE RTPT perspective transform (cop2 0x280030, lwc2/swc2) + on-screen bounds clip test"
"8001c204" = "GTE matrix/rotation setup + object camera transform (RotMatrix-style helpers)"
"8005ba38" = "libgte cop2 coordinate-transform wrapper (setCopReg(2)/copFunction(2,0x180001)/getCopReg; dump is C-only but cop2 op sequence is unambiguous)"
"8005b618" = "GTE rotation-matrix loader: five ctc2 of a 5-word block into COP2 control regs 0x0/0x800/0x1000/0x1800/0x2000 (the R11..R33 rotation-matrix region). Sibling of 8005b7c0 SetRotMatrix; engine emits rotation via glam Mat3/Mat4"
"8005b7c0" = "SetRotMatrix (setCopControlWord(2, 0xD800, x))"
"8005b7cc" = "SetTransMatrix (setCopControlWord(2, 0xE000, x))"
"8005adb8" = "Fixed-point bit-rotation / arc helper (85-instr ladder)"
"8005af0c" = "isqrt-style normalise (wraps 8005ba1c)"
"8005ba1c" = "GTE sqrt / normalise (mtc2 0xF000 / mfc2 0xF800)"
"8005afb0" = "InitGeom-adjacent GTE control-reg init: enables cop2 in Status, then setCopControlWord(2, 0xE800/0xF000, ..) seeds the GTE projection/ZSF control regs (sibling of 8005bb48 InitGeom). Pure libgte; engine carries projection in Camera"
"8005ba68" = "GTE 3-point transform helper (RTPT)"
"8003d344" = "GTE ApplyMatrix (cop2 0x480012 = MVMVA, rotation x V0 + TR, sf=1): loads VXY0/VZ0 from param_1, reads MAC1..3 back into param_2[0..3] - the view-space transform the billboard projector 800195a8 centers on. Pure COP2 plumbing; engine reproduces it as engine-render gte::rot_trans"
"80026988" = "Euler-angle (x,y,z) -> 3x3 rotation matrix via sin/cos LUTs at DAT_8007B7F8 / DAT_8007B81C; engine uses glam::Mat3::from_euler"
"800460ac" = "GTE NCDS (cop2 0x280030) - 3-iter normal color-depth color single loop; engine emits lighting via wgpu fragment shader"
"800172c0" = "Camera / geometry init (Euler -> matrix via 80026988 + SetGeomScreen/Offset/Translation 8005B648/B3A8/B4B8 + NCLIP 8003D344); pure libgte chain replaced by glam Mat4 + wgpu pipeline"
"8005bb48" = "InitGeom - exception-handler table install + FlushCache"
"8005b7d8" = "SetColorMatrix-family GTE control-word loader (three ctc2 writes: a0<<4 -> 0xA800, a1<<4 -> 0xB000, a2<<4 -> 0xB800 = cop2 control regs 21/22/23, the color/light matrix region); sibling of 8005b7c0 SetRotMatrix / 8005b7cc SetTransMatrix"
"8003d190" = "Zeroes the GTE translation-vector control regs (setCopControlWord(2, 0x2800/0x3000/0x3800, 0) = TRX/TRY/TRZ). libgte translation-clear; engine carries translation in glam. Runs every field frame (playthrough trace). see ghidra/scripts/funcs/8003d190.txt"
"8005b268" = "PushMatrix (libgte): when the 0x280-frame stack (SP global DAT_80079010) has room, snapshots the GTE rotation (cfc2 0x0..0x2000) + translation (0x2800..0x3800) control words into a 0x20-byte frame and bumps SP; else prints a stack-overflow string. Push half of the already-listed 8005b308 PopMatrix; engine uses a glam transform stack. see ghidra/scripts/funcs/8005b268.txt"
"8005b4b8" = "libgte matrix-translation setter: copies a 3-word translation vector (param2[0..2]) into a MATRIX struct's t[] slot (+0x14..0x1c) and returns it. Engine sets the glam Mat4 translation column. see ghidra/scripts/funcs/8005b4b8.txt"
"8005b4e8" = "ScaleMatrix (libgte): multiplies the packed i16 rows of a 3x3 MATRIX by a 3-element scale vector in 1.12 fixed point (>>12), returns the matrix. Engine scales via glam. see ghidra/scripts/funcs/8005b4e8.txt"
"8005b648" = "SetLightMatrix (libgte): loads five words from a MATRIX into the GTE light-matrix control regs (setCopControlWord(2, 0x4000/0x4800/0x5000/0x5800/0x6000)); distinct from the 8005b7d8 color-matrix loader (regs 21-23). Engine computes lighting in the wgpu shader. see ghidra/scripts/funcs/8005b648.txt"
"8003d1ec" = "SetTransMatrix-by-vector (libgte): loads a 3-word translation vector (param[0..2]) into the GTE translation control regs (setCopControlWord(2, 0x2800/0x3000/0x3800, ..) = TRX/TRY/TRZ). The load sibling of the 8003d190 translation-clear; engine carries translation in glam. see ghidra/scripts/funcs/8003d1ec.txt"
"8005b678" = "SetColorMatrix (libgte): loads five words from a MATRIX into the GTE color-matrix control regs (setCopControlWord(2, 0x8000/0x8800/0x9000/0x9800/0xa000) = cop2 control regs 16-20); the LCM sibling of the 8005b648 light-matrix loader (regs 8-12). Engine computes color/lighting in the wgpu shader. see ghidra/scripts/funcs/8005b678.txt"
"8005b158" = "MulMatrix0 (libgte): 3x MVMVA (RT.V0) streaming m1 columns through V0 - 3x3 matrix multiply, clobbers RT. No static caller, absent from every runtime hot profile (render paths issue cop2 inline); link residue. Engine multiplies via glam. see ghidra/scripts/funcs/8005b158.txt"
"8005b6f8" = "libgte vertex staging: lwc2 V0/V1/V2 from three SVECTOR ptrs (the load half of an RTPT). No static caller; link residue. see ghidra/scripts/funcs/8005b6f8.txt"
"8005b760" = "libgte SZ staging: mtc2 SZ0..SZ3 from the four args (the load half of an AVSZ4). No static caller; link residue. see ghidra/scripts/funcs/8005b760.txt"
"8005b828" = "libgte colour-matrix transform (MVMVA 0x04DA412, LCM.IR+BK, lm=1): vec3 -> lit colour - the lighting second stage as a standalone op. No static caller; link residue. Engine lights in the shader. see ghidra/scripts/funcs/8005b828.txt"
"8005b850" = "DpqColorLight (libgte, DCPL 0x0680029): IR vec + RGB + IR0 -> depth-cued lit RGB2. No static caller; link residue. see ghidra/scripts/funcs/8005b850.txt"
"8005b878" = "DpqColor3 (libgte, DPCT 0x0F8002A): RGB0..2 + IR0 -> three depth-cued colours. No static caller; link residue. see ghidra/scripts/funcs/8005b878.txt"
"8005b8b4" = "Intpl (libgte, INTPL 0x0980011): far-colour interpolate IR vec + IR0 -> RGB2. No static caller; link residue. see ghidra/scripts/funcs/8005b8b4.txt"
"8005b8d8" = "Square12 (libgte, SQR sf=1): component-wise square of IR1..3 into MAC1..3. No static caller; link residue. see ghidra/scripts/funcs/8005b8d8.txt"
"8005b900" = "Square0 (libgte, SQR sf=0): sibling of 8005b8d8 without the >>12. No static caller; link residue. see ghidra/scripts/funcs/8005b900.txt"
"8005b928" = "AverageZ3 (libgte, AVSZ3 0x158002D): three SZ values in via mtc2, averaged OTZ out. No static caller; link residue (the render paths issue AVSZ inline). see ghidra/scripts/funcs/8005b928.txt"
"8005b948" = "AverageZ4 (libgte, AVSZ4 0x168002E): four SZ values in, averaged OTZ out. No static caller; link residue. see ghidra/scripts/funcs/8005b948.txt"
"8005b96c" = "OuterProduct12 (libgte, OP sf=1): saves RT ctrl regs, installs the operand vector as the D1/D2/D3 diagonal, cross-products against IR, restores RT. No static caller; link residue. Engine crosses via glam. see ghidra/scripts/funcs/8005b96c.txt"
"8005b9c4" = "OuterProduct0 (libgte, OP sf=0): sibling of 8005b96c without the >>12. No static caller; link residue. see ghidra/scripts/funcs/8005b9c4.txt"
"8003d300" = "AverageZ3 clone in the billboard/OT module band (second link copy of 8005b928). No static caller; link residue. see ghidra/scripts/funcs/8003d300.txt"
"8003d320" = "AverageZ4-with-ZSF4 variant (ctc2 cr30 from the fifth arg, then AVSZ4); second link copy of the 8005b948 shape. No static caller; link residue. see ghidra/scripts/funcs/8003d320.txt"
"8003d388" = "RotTransPers3-shaped RTPT wrapper (cmd 0x0280030): three SVECTOR ptrs in, three packed-SXY out ptrs, returns IR3. Ghidra splits the entry as 8003d388/8003d38c; one body. No static caller; the engine projects via Camera. see ghidra/scripts/funcs/8003d388.txt"
"80046190" = "Far-colour read-back getter: cfc2 cr21 (RFC) returned. Trivial libgte-class accessor; engine carries far colour in its own depth-cue state. see ghidra/scripts/funcs/80046190.txt"
"8003d20c" = "GTE control-word save: 8x cfc2 of COP2 control regs 0x0000..0x3800 (rotation/light matrix region) into param_1[0..7]. Save counterpart of 8003d1a4 (restore) / 8003d178 (identity reset); brackets the billboard projector 800195a8. Engine emits GTE-equivalent matrices via glam/wgpu"
"8003d368" = "GTE RTPS single-vertex projector (libgte RotTransPers family): loads one vector from param_1 into COP2 data regs 0/1 (VXY0/VZ0), runs cop2 0x180001 = RTPS, writes the projected screen XY (data reg 15, SXYP) to param_2, returns data reg 11 (IR3). The single-vertex sibling of the 8005bac8 quad projector (RotTransPers4), which runs this same 0x180001 RTPS on its 4th vector; pure COP2 plumbing reproduced by gte.rs rtps. Called by the slot machine's payline projector FUN_801d3380 (see docs/subsystems/minigame-slot-machine.md). see ghidra/scripts/funcs/8003d368.txt"
"8005bac8" = "GTE quad projector (RotTransPers4): cop2 0x280030 = RTPT on V0/V1/V2 then cop2 0x180001 = RTPS on the 4th vector, writes SXY0..2 + the 4th SXY + IR0 into the out-pointers, ORs both FLAG reads into the flag out, returns SZ3>>2. The projection half of the billboard projector 800195a8 (ported as engine-render billboard::project_billboard); pure COP2 plumbing reproduced by gte.rs rtpt/rtps"
"8005b3a8" = "RotMatrix-family matrix-vector product: loads rotation matrix into COP2 control regs 0x0000-0x2000, runs three cop2 0x486012 ops feeding IR data regs, reads MAC1/2/3, repacks into the MATRIX. Sibling cited in the 800172c0 geometry chain; engine emits via glam Mat3/Mat4"
"8005b6a8" = "SetTransMatrix translation-vector loader: three ctc2 of param+0x14/0x18/0x1c into COP2 control regs 0x2800/0x3000/0x3800 (TRX/TRY/TRZ). Parallels 8005b7cc SetTransMatrix; engine emits translation via glam"
"8005b308" = "PopMatrix (GTE matrix-stack pop): decrements 0x20-stride SP global DAT_80079010 (underflow -> printf), reloads rotation matrix (ctc2 ctrl 0x0000-0x2000) + translation vector (0x2800/0x3000/0x3800) from the popped frame. libgte stack bookkeeping; engine uses a glam transform stack"
"8003d1a4" = "GTE control-word restore: 8x ctc2 of an 8-word array into COP2 control regs 0x0000..0x3800 (rotation/light matrix region). The restore counterpart explicitly named by the 8003d20c (save) entry above; brackets the billboard projector 800195a8. Engine emits GTE-equivalent matrices via glam/wgpu"
"8003d254" = "SetGeomScreen (GTE H / projection-plane-distance write): single `ctc2 a0, 0xD000; jr ra`. Engine carries the focal length as Camera::h (crates/engine-render::gte) and projects through the wgpu pipeline; no GTE COP2 path"
"8003d178" = "GTE rotation-matrix identity reset: ctc2 0x1000 (=1.0) into COP2 control regs 0x0000/0x1000/0x2000 (R11/R22/R33), 0 into 0x0800/0x1800 (off-diagonals) AND 0 into 0x2800/0x3000/0x3800 (TRX/TRY/TRZ - the translation is cleared too, which is why the billboard projector's corner pass is a pure perspective divide). The identity-reset third of the save (8003d20c) / restore (8003d1a4) GTE control-word trio; engine uses glam::Mat3::IDENTITY"
"8005b818" = "SetGeomScreen (libgte): `ctc2 a0, 0xD000; jr ra` writes the GTE H/projection-plane-distance control reg. The PsyQ-library copy of the same one-liner the game-side 8003d254 inlines; engine carries focal length as Camera::h"
"8005b7f8" = "SetGeomOffset (libgte): writes OFX/OFY (a0<<16 -> cop2 ctrl 0xC000, a1<<16 -> 0xC800). Engine applies the screen-space offset via the wgpu viewport / Camera projection"
"8005b0b8" = "GTE leading-zero-count bit converter (texture/color bit packing): setCopReg(2,0xF000) / getCopReg(2,0xF800) = GTE LZCS/LZCR normalise-shift. Sibling of the already-listed 8005ba1c GTE sqrt/normalise; engine does bit packing in plain Rust"


# libcd primitives and the ISO9660 / streaming-read stack above them.
# The engine reads PROT.DAT through `legaia-iso` + `legaia-prot` directly.
"8005acf8" = "GTE depth-cue coefficient setter: computes `(-a0 * 64) / a1` and loads it into COP2 control register 27 (DQA) via FUN_8005B7C0 (`ctc2 a0,0xd800`), then the fixed literal 0x1400000 into control register 28 (DQB) via FUN_8005B7CC (`ctc2 a0,0xe000`). Pure libgte register setup; the port programs its own depth cue. see ghidra/scripts/funcs/8005acf8.txt"
"8005ad54" = "Sibling of 8005ACF8 with the screen-height constant baked as 320 rather than 64 (`a0*5 << 6`, negated, divided by a1): the same DQA / DQB control-register pair via FUN_8005B7C0 / FUN_8005B7CC and the same 0x1400000 DQB literal. see ghidra/scripts/funcs/8005ad54.txt"

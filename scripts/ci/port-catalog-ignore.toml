"8001a068" = "in-game dev-string formatter / on-screen log printer. Reads format string, writes RGB 0x808080 cell, %-escape walker. Called via 8001a09c-style wrapper that takes (fmt, args...) and pushes a text primitive."
"8001aa68" = "fixed-cell debug-string drawer: (str, x, y) -> per-glyph sprite into the scratchpad OT at _DAT_1F8003A0, source cell chosen by character class (digits/upper/lower/punct). The dev/CONFIG-test-screen monospaced text path (sibling of the 8001a068 formatter); the clean-room engine renders text via the proportional legaia-font atlas instead."
"8001ad38" = "low-level fixed-cell sprite-glyph emitter: pushes one sprite prim (tag 0x3000000, color 0x74808080) into the scratchpad OT _DAT_1F8003A0 + linkPrim 8003d2c4. The per-glyph primitive behind the dev monospaced text path 8001aa68"
"80017d98" = "draws one fixed-cell dev-font glyph (cell u=0x50, v=0xf8) at signed (x,y) via 8001ad38; thin wrapper in the 8001aa68 dev/CONFIG monospaced text family. Engine renders text via legaia-font"
"8003e6bc" = "dev host-FS reader: (path, dest) -> fopen + fseek/SEEK_END for size + fread + zero-pad to 0x800 sector. Calls libapi 800608f0/80060920/80060944/80060910. The retail dual-mode loader's debug branch; clean-room engine reads from disc via ISO9660 only."
"8005fb84" = "VSync(N) handler - wraps 8005fccc with frame-counter math"
"800173bc" = "Debug profiler / timing HUD: when the debug bit (gp+0x3b8 & 2) is set, prints scene / camera / map / fog / TMD readouts via the dev-string formatter 8001a068 and draws captured VSync timestamps (gp+0x3a8/0x3ac/0x428) as digit sprites (8001abc8). Dev instrumentation gated off in retail; engine uses tracing / a debug overlay. see ghidra/scripts/funcs/800173bc.txt"
"800178f0" = "Profiling checkpoint: captures a VSync timestamp (8005fb84(1)) into gp+0x428, later rendered by the debug HUD 800173bc. Dev instrumentation; engine uses tracing spans. see ghidra/scripts/funcs/800178f0.txt"
"8001a89c" = "Per-frame reset of a profiling counter pair (gp+0x664/0x668 := 0x10). Dev-instrumentation bookkeeping behind the 800173bc debug HUD; no engine equivalent. see ghidra/scripts/funcs/8001a89c.txt"
"8001abc8" = "Debug-HUD decimal-number drawer: renders an integer right-to-left as textured digit-sprite primitives (digit = value%10, leading '-' for negatives) into the scratchpad OT cursor. The number-drawing half of the 800173bc profiler HUD; engine renders text via the legaia-font overlay. see ghidra/scripts/funcs/8001abc8.txt"
"800188c8" = "Dev pad-driven debug readout HUD (314 instructions, the largest member of the 800173bc dev-text family). Its first two instructions load _DAT_8007B98C and `beq v0,zero,0x80018D9C` straight to the epilogue - so on the retail leg (_DAT_8007B98C == 0, the same leg FUN_80025CB4 documents) the entire body is a no-op. Inside, a second gate on the debug bit `_DAT_8007B6D0 & 2` guards the readouts, and the only three call targets in the whole function are the already-listed dev-text emitters 8001aa68 / 8001a068 / 8001abc8. Its u16 arg is a pad mask (bits 0x20 / 0x10 nudge the on-screen cursor at 0x8007B792 by +-0x14). Engine uses tracing + its own debug overlay. see ghidra/scripts/funcs/800188c8.txt"



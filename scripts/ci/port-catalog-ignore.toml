# prelude; calling "into" the label just supplies the PC delta and falls
# through to the dispatcher tail. The catalogue lives in
# `docs/subsystems/script-vm.md#intra-function-label-catalogue`. The engine
# port models each label's PC delta directly inside its dispatcher (see
# `crates/engine-vm/src/field.rs`), so there is no separate function to port.
"8003ee7c" = "libspu SPU common-attr / reverb-depth setter shim used by the CD-XA clip path. Thin two-call wrapper: FUN_800643c4(0, depth, depth) (SpuSetCommonAttr-style master/reverb-depth set from the s16 arg) then FUN_80062a0c(0,0,1) (CD/reverb attribute apply). No game logic; REF-listed as out-of-scope in crates/engine-core/src/cd_dma.rs. see ghidra/scripts/funcs/8003ee7c.txt"
"8006a7c8" = "SpuSetReverbVol-shape 3-mode wrapper (mode 0 = clear, 1 = OR, 8 = write) over the SPU voice-attribute halfword table at DAT_8007AF40, or the shadow copy at 0x801CE390 when DAT_8007AF38 & 1, also ORing the dirty mask DAT_8007AB04. Reverb lives in the clean-room SPU. see ghidra/scripts/funcs/8006a7c8.txt"

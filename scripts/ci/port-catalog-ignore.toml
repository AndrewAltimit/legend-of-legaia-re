"801e733c" = "Two-field value panel draw (PROT 0897, 67 instructions), the sibling of 801e71d0: two fields formatted out of the selection context 0x8007B450 through 8003cbf8, drawn stacked by 8003cd00 (second +0xF in Y), then the cursor 8002b994. Stores only the ink global 0x8007B454 and the two format buffers."

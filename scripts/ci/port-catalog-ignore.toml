# The `overlay_0896_*` dump family (both the bare `overlay_0896_<addr>` files
# and the `overlay_0896_bat_back_dat_<addr>` ones) is imported at base
# 0x801C0000, below the 0x801CE818 slot-A floor, so every VA it prints is a
# phantom. Its true content chain is measurable off the extracted images:
# `0896_bat_back_dat.BIN[0x9000:] == 0897_xxx_dat.BIN[0:]` and
# `0897_xxx_dat.BIN[0x25000:] == 0898_xxx_dat.BIN[0:]`, both byte-exact, so
# PROT 0896's own content is only its first 0x9000 bytes. Re-keying is
# therefore: file = printed - 0x801C0000; file >= 0x9000 is field(0897) at
# printed + 0x5818; file >= 0x2E000 is battle_action(0898) at printed
# - 0x1F7E8. The rows below name the re-keyed VA and were each checked by
# disassembling the extracted image there and matching the dump's opening
# instruction stream. NB this is a DIFFERENT delta from the 0x167E8 used by
# the 0x801C0000-based PROT 0897 import; applying that one to an 0896 dump
# lands 0x9000 short.

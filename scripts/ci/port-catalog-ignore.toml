# SCUS-resident CD / libcd transport shims. Same boundary the `[libcd]` table
# above draws, reached one layer up: these are the game-side wrappers whose
# whole body is drive commands, sector pumps and ISO9660 path work. The engine
# reads PROT.DAT and the named files through legaia-iso / legaia-prot and plays
# decoded XA through its own mixer, so there is no CD transport to port to.
[cd_transport_shims]
"8003ef14" = "Field-buffer per-sector data-ready callback. `(ready_code)`: on code 1 it reads 3 words of the arrived sector into a stack CdlLOC (8005c2c4), converts the BCD MSF to an LBA (8005c42c) and compares it against the expected sector sequence gp+0x8c8; on a match it bumps the sequence, DMAs 0x200 words (2048 bytes) to the destination cursor gp+0x940, advances that cursor by 0x800 and decrements the remaining-sector count gp+0x968. Any mismatch, or exhausting the count, clears the libcd completion callback (8005bee4) and issues CdControl 9 (8005c034); the mismatch leg additionally pushes the timeout gp+0x964 out by 0x3e8 and sets gp+0x968 = -1. Pure sector transport - the buffer layout it fills (collision grid, object map, field-pack) is documented in docs/reference/functions.md and docs/subsystems/field-locomotion.md, and the engine assembles it from legaia-iso reads. see ghidra/scripts/funcs/8003ef14.txt"
"8003efe8" = "Boot-time PROT.DAT TOC open. 15 instructions: clears gp+0x984 and gp+0x8bc, emits one dev string (800567a8) and tail-calls the by-name file opener 8003e4e8(\"PROT.DAT\", 1), which fills the in-RAM TOC at 0x801C70F0. The engine parses that TOC with legaia-prot straight off the disc image. Sibling of 8003f08c, which does the same open behind a drive reset. see ghidra/scripts/funcs/8003efe8.txt"
"8003f024" = "libcd init. CdInit (8005bc28), VSync(3) (8005fb84), then a retry loop issuing CdlSetmode with mode byte 0xC8 (Speed|RT|SF) from the mode block 0x8007BBC0 via 8005befc until it succeeds, a second VSync(3), and two timing constants (gp+0x94c = 0x3DE, gp+0x8cc = 0x430). No game state. see ghidra/scripts/funcs/8003f024.txt"
"8003f08c" = "Drive reset + PROT.DAT TOC reload. `(skip)`: non-zero returns immediately. Otherwise sets mode byte 5, issues two CdControl commands through the retry wrapper 8005c160, swaps the completion callback (8005be0c), polls via 8005be8c against the result block 0x8007BC10, then repeats 8003efe8's clear-two-globals + dev-string + 8003e4e8(\"PROT.DAT\", 1) open. Drive transport plus a TOC read the engine does with legaia-prot. see ghidra/scripts/funcs/8003f08c.txt"
"8003ee00" = "Streamed-XA clip abort. Calls the clip-path shim 8003ee7c(0), clears the clip window gp+0x910 / gp+0x928, and when a clip was playing (gp+0x908 != 0) clears the play state and - only in game mode 3 - restores the audio-state byte 0x8007B648 (0x80 when 0x8007BA3C is set, otherwise 0 alongside clearing 0x8007BA98). The abort leg of the already-listed clip family 8003d53c / 8003eae4 / 8003ed04; the engine decodes XA buffers through legaia-xa and its own mixer. see ghidra/scripts/funcs/8003ee00.txt"
"8003d764" = "Streamed-XA drive sequencer. An 11-state ring on gp+0x928 dispatched through the jump table at 0x800111C4, walking CdlSeekL -> Setmode 0xC8 -> Setloc -> Setfilter (file 1, channel gp+0x954, filter struct 0x8007BBC0) -> ReadS, advancing one state per successful CdControl (8005c034) and unwinding on failure; the end-of-clip leg converts the current BCD MSF to an LBA (8005c42c), compares it against the end LBA gp+0x974 and stops the clip via 8003ee7c / 8003ee00. Every state is a drive command. see ghidra/scripts/funcs/8003d764.txt"
"8003d3c4" = "CdReadFile by ISO9660 path. `(path, dst)`: builds \"<vol>:<path>\" through the string helper 80056728, uppercases the result in place (bytes in `a-z` get -0x20), looks the name up with CdSearchFile (8005dbb4), issues CdlSetloc from the returned entry (8005befc), starts the read of `(size + 0x7FF) >> 11` sectors in 2048-byte mode (8005e9a4) and spins on CdReadSync (8005ea84) with a VSync per poll; the whole lookup+read retries up to 10000 times, counting failures into 0x8007B86E / 0x8007B904. The engine resolves paths with legaia_iso::iso9660::find_file_in_image. see ghidra/scripts/funcs/8003d3c4.txt"
"8005eb68" = "libstr streaming-read start. `(mode)`: issues CdlSetmode with the low byte of `mode` (8005befc), and when the CdlModeStream bit 0x100 is set records the real-time bit 0x20 into 0x801CD208 (0 when RT is on, 1 when off) and installs the two libcd completion callbacks 0x8006ECD4 / 0x8006EBFC (8005c2e4 / 8005bee4), then issues CdlReadS (0x1B). The PsyQ streaming half of the FMV / XA path; the engine feeds legaia-mdec and legaia-xa from its own sector reader. see ghidra/scripts/funcs/8005eb68.txt"
"8003e104" = "Monster sound-bank transport. `(monster_idx, unused, dst)`: bounds-checks `monster_idx` against the count word at 0x801C8984, then reads the LBA pair `tbl[idx+2]`/`tbl[idx+3]` out of the running-LBA array based at 0x801C8980 (4-byte stride; entry `i` spans `lba[i]..lba[i+1]`, so the length is the difference) and converts both ends through 8005c42c / 8005c328 into the CdlLOC at 0x8007BC5C. The retail leg (_DAT_8007B8C2 != 0) stops any in-flight read and hands the sector count / destination to the async kick 8003f128 - already modelled by the CdDmaHost trait in crates/engine-core/src/cd_dma.rs; the dev leg opens `h:\\mpack\\monster.snd` over the PsyQ host filesystem (800608f0 / 80060920 / 80060944 / 80060910) and zero-fills any short read. Transport on both legs. see ghidra/scripts/funcs/8003e104.txt"


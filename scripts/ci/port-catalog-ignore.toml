"801e2ee4" = "Menu GPU-primitive emitter: same shape as 801e2dc4 - packet built in the 0x1F800314 pool from a menu-overlay geometry table, AddPrim 8003D2C4 the only call. see ghidra/scripts/funcs/overlay_menu_801e2ee4.txt"

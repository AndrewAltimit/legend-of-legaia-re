"80048310" = "Weapon / effect swept-trail builder. Its whole output is geometry: it walks the 16-slot per-actor frame ring at actor[+0x68], decodes each slot through the monster-anim decoder 8004998c, and calls the quad-strip emitter 800485bc twice per trail (outline then base) over a 0..N colour gradient. Only two `jal` targets in 171 instructions, both render; no simulation state is written. see ghidra/scripts/funcs/80048310.txt"

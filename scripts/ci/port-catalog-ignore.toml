# Catalog scope-ignore list for `scripts/ci/port-catalog.py`.
#
# Lists Ghidra-traced addresses that are NOT engine-port sites. The clean-room
# port maps the named clusters to Rust stdlib / wgpu / cpal / direct-API shims
# rather than line-by-line porting, so they should not contribute to the
# `--missing-ports` worklist.
#
# Format: per-category section, `addr = "reason"` rows.
# Address must be lowercase 8-hex-digit in the SCUS / overlay code range.
# The reason is human-readable and shows up in catalog drill-down output.
#
# Categories are organisational only - the tool treats all entries the same.
# Provenance for each entry lives in `docs/reference/functions.md` and the
# audio / save-screen subsystem docs.


# PSX BIOS table dispatchers + syscall thunks. Statically linked PsyQ kernel
# glue. Engine maps the surrounding logic to native equivalents (kernel events
# -> std::sync, FlushCache -> no-op on a non-MIPS host, etc.).
[bios]
"80056608" = "LoadAndExecute (BIOS A0 0x51) - li t2,0xA0; jr t2; li t1,0x51"
"80056628" = "_bu_init (BIOS A0 0x71) - li t2,0xA0; jr t2; li t1,0x71"
"80056648" = "OpenEvent BIOS thunk (jr 0xB0, t1=0x09)"
"80056658" = "TestEvent BIOS thunk (jr 0xB0, t1=0x0B)"
"80056678" = "EnterCriticalSection (syscall(0), a0=1)"
"80056688" = "ExitCriticalSection (syscall(0), a0=2)"
"80056698" = "B-vector thunk (li t2,0xB0; jr t2) - one of nine byte-identical linker copies"
"800566a8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566b8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566c8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566d8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566e8" = "B-vector thunk (li t2,0xB0; jr t2)"
"800566f8" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056708" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056718" = "B-vector thunk (li t2,0xB0; jr t2)"
"80056728" = "strcat (BIOS A0 0x15) - li t2,0xA0; jr t2; li t1,0x15"
"80056738" = "strcmp (BIOS A0 0x17) - li t2,0xA0; jr t2; li t1,0x17"
"80056748" = "strncmp (BIOS A0 0x18)"
"80056758" = "strncpy (BIOS A0 0x19) - li t2,0xA0; jr t2; li t1,0x19"
"80056768" = "strlen (BIOS A0 0x1B)"
"80056788" = "memset (BIOS A0 0x2B) - li t2,0xA0; jr t2; li t1,0x2B"
"80056798" = "srand (BIOS A0 0x2F) - li t2,0xA0; jr t2; li t1,0x2F"
"800567a8" = "printf BIOS thunk (BIOS A0 0x3F) - li t2,0xA0; jr t2; li t1,0x3F"
"80057014" = "rand (BIOS A0 0x2E)"
"8005acd8" = "GPU_cw (BIOS A0 0x49)"
"8005ace8" = "A-vector thunk (jr 0xA0)"
"8005bbe8" = "FlushCache (BIOS A0 0x44)"
"8005fd68" = "BIOS B0 0x5B (card init)"
"8005fd78" = "ChangeClearRCnt (BIOS C0 0x0A)"
"8006b844" = "WaitEvent BIOS thunk (jr 0xB0, t1=0x0A)"
"8006d7a4" = "BIOS C0 thunk (li t2,0xC0; jr t2; li t1,0x3) - ChangeThreadSubFunction"
"8006ee14" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee24" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee34" = "B-vector thunk (li t2,0xB0; jr t2) - menu/text helper cluster"
"8006ee6c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x4E)"
"8006ee7c" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x50)"
"8006ef68" = "B-vector thunk (li t2,0xB0; jr t2; li t1,0x4C). One of the SPU-voice-init B0 thunks called in sequence by 8006ef18 (libspu init)"
"8006f088" = "SPU-voice-init B0 thunk (EnterCriticalSection + B0 0x57 + swap of 5 dwords DAT_8006F058.. <-> SPU voice block +0x9C8 + FlushCache). Sibling of 8006ef68 in the 8006ef18 init trio; BIOS/libspu glue, no game state"
"8006f118" = "SPU-voice-init B0 thunk (EnterCriticalSection + B0 0x56 + symmetric dword swap at voice block +0x18 / -0xE80). Sibling of 8006ef68/8006f088 in the 8006ef18 init trio; BIOS/libspu glue, no game state"


# libc / PsyQ runtime glue. Each maps to a Rust stdlib equivalent.
[libc]
"80017888" = "malloc wrapper (alloc-count++, calls FUN_8002b468 best-fit allocator, on null increments OOM-size sum and prints 'malloc_err_size %d')"
"80017b94" = "free wrapper (alloc-count--, on null prints 'free_err', calls FUN_8002b584 underlying free)"
"800567b8" = "printf-class formatter (handles %d %x %o %s %f); writes into a static buffer"
"80056b18" = "printf-class formatter (sister of 800567b8)"
"80057024" = "memmove (overlap-safe direction-aware copy)"
"8005acac" = "memset"
"8005e540" = "memcpy (forward-only byte copy)"
"8003ca78" = "encoding-aware strcpy for Legaia dialog text: copies src->dst treating a 0xC0-class lead byte ((b & 0xf0) == 0xc0) plus its trailing byte as one 2-byte glyph/control unit; NUL-terminates. No GPU/OT/GTE; engine builds text via legaia-font layout"
"8003cac4" = "encoding-aware strcat for Legaia dialog text: scans dst to the first byte <= 0x1e (counting 0xC0-class pairs as one unit) then appends src via the same copy loop as 8003ca78. No GPU/OT/GTE"
"8005fccc" = "VSync wait spin (frame-budget gated)"
"8005ff04" = "irq_mask_swap16 (atomic swap on the 16-bit IRQ mask)"
"80060a04" = "BREAK 0x105 debug trap"


# libgte primitives. The engine emits GTE-equivalent matrix and projection
# math directly in `crates/engine-render`; the retail wrappers are not
# carried over.
[libgte]
"8005b618" = "GTE rotation-matrix loader: five ctc2 of a 5-word block into COP2 control regs 0x0/0x800/0x1000/0x1800/0x2000 (the R11..R33 rotation-matrix region). Sibling of 8005b7c0 SetRotMatrix; engine emits rotation via glam Mat3/Mat4"
"8005b7c0" = "SetRotMatrix (setCopControlWord(2, 0xD800, x))"
"8005b7cc" = "SetTransMatrix (setCopControlWord(2, 0xE000, x))"
"8005adb8" = "Fixed-point bit-rotation / arc helper (85-instr ladder)"
"8005af0c" = "isqrt-style normalise (wraps 8005ba1c)"
"8005ba1c" = "GTE sqrt / normalise (mtc2 0xF000 / mfc2 0xF800)"
"8005afb0" = "InitGeom-adjacent GTE control-reg init: enables cop2 in Status, then setCopControlWord(2, 0xE800/0xF000, ..) seeds the GTE projection/ZSF control regs (sibling of 8005bb48 InitGeom). Pure libgte; engine carries projection in Camera"
"8005ba68" = "GTE 3-point transform helper (RTPT)"
"8005b038" = "GTE RTPS (perspective-transform-single) vertex-batch loop (cop2 0x198003D in a per-vertex stride-8 loop)"
"8003d344" = "GTE ApplyMatrix (cop2 0x480012 = MVMVA, rotation x V0 + TR, sf=1): loads VXY0/VZ0 from param_1, reads MAC1..3 back into param_2[0..3] - the view-space transform the billboard projector 800195a8 centers on. Pure COP2 plumbing; engine reproduces it as engine-render gte::rot_trans"
"80026988" = "Euler-angle (x,y,z) -> 3x3 rotation matrix via sin/cos LUTs at DAT_8007B7F8 / DAT_8007B81C; engine uses glam::Mat3::from_euler"
"800460ac" = "GTE NCDS (cop2 0x280030) - 3-iter normal color-depth color single loop; engine emits lighting via wgpu fragment shader"
"800172c0" = "Camera / geometry init (Euler -> matrix via 80026988 + SetGeomScreen/Offset/Translation 8005B648/B3A8/B4B8 + NCLIP 8003D344); pure libgte chain replaced by glam Mat4 + wgpu pipeline"
"8005bb48" = "InitGeom - exception-handler table install + FlushCache"
"8005b7d8" = "SetColorMatrix-family GTE control-word loader (three ctc2 writes: a0<<4 -> 0xA800, a1<<4 -> 0xB000, a2<<4 -> 0xB800 = cop2 control regs 21/22/23, the color/light matrix region); sibling of 8005b7c0 SetRotMatrix / 8005b7cc SetTransMatrix"
"8003d20c" = "GTE control-word save: 8x cfc2 of COP2 control regs 0x0000..0x3800 (rotation/light matrix region) into param_1[0..7]. Save counterpart of 8003d1a4 (restore) / 8003d178 (identity reset); brackets the billboard projector 800195a8. Engine emits GTE-equivalent matrices via glam/wgpu"
"8003d368" = "GTE DPCS (cop2 0x180001) depth-cue-color-single wrapper: loads RGB from param_1, reads back reg 0x0F + ORGB (reg 0x16) into param_2. Sibling of 8003d344 NCLIP / 800460ac NCDS; engine emits depth-cue/lighting via wgpu fragment shader"
"8005bac8" = "GTE quad projector (RotTransPers4): cop2 0x280030 = RTPT on V0/V1/V2 then cop2 0x180001 = RTPS on the 4th vector, writes SXY0..2 + the 4th SXY + IR0 into the out-pointers, ORs both FLAG reads into the flag out, returns SZ3>>2. The projection half of the billboard projector 800195a8 (ported as engine-render billboard::project_billboard); pure COP2 plumbing reproduced by gte.rs rtpt/rtps"
"8005b3a8" = "RotMatrix-family matrix-vector product: loads rotation matrix into COP2 control regs 0x0000-0x2000, runs three cop2 0x486012 ops feeding IR data regs, reads MAC1/2/3, repacks into the MATRIX. Sibling cited in the 800172c0 geometry chain; engine emits via glam Mat3/Mat4"
"8005b6a8" = "SetTransMatrix translation-vector loader: three ctc2 of param+0x14/0x18/0x1c into COP2 control regs 0x2800/0x3000/0x3800 (TRX/TRY/TRZ). Parallels 8005b7cc SetTransMatrix; engine emits translation via glam"
"8005b308" = "PopMatrix (GTE matrix-stack pop): decrements 0x20-stride SP global DAT_80079010 (underflow -> printf), reloads rotation matrix (ctc2 ctrl 0x0000-0x2000) + translation vector (0x2800/0x3000/0x3800) from the popped frame. libgte stack bookkeeping; engine uses a glam transform stack"
"8003d1a4" = "GTE control-word restore: 8x ctc2 of an 8-word array into COP2 control regs 0x0000..0x3800 (rotation/light matrix region). The restore counterpart explicitly named by the 8003d20c (save) entry above; brackets the billboard projector 800195a8. Engine emits GTE-equivalent matrices via glam/wgpu"
"8003d254" = "SetGeomScreen (GTE H / projection-plane-distance write): single `ctc2 a0, 0xD000; jr ra`. Engine carries the focal length as Camera::h (crates/engine-render::gte) and projects through the wgpu pipeline; no GTE COP2 path"
"8003d178" = "GTE rotation-matrix identity reset: ctc2 0x1000 (=1.0) into COP2 control regs 0x0000/0x1000/0x2000 (R11/R22/R33), 0 into 0x0800/0x1800 (off-diagonals) AND 0 into 0x2800/0x3000/0x3800 (TRX/TRY/TRZ - the translation is cleared too, which is why the billboard projector's corner pass is a pure perspective divide). The identity-reset third of the save (8003d20c) / restore (8003d1a4) GTE control-word trio; engine uses glam::Mat3::IDENTITY"
"8005b818" = "SetGeomScreen (libgte): `ctc2 a0, 0xD000; jr ra` writes the GTE H/projection-plane-distance control reg. The PsyQ-library copy of the same one-liner the game-side 8003d254 inlines; engine carries focal length as Camera::h"
"8005b7f8" = "SetGeomOffset (libgte): writes OFX/OFY (a0<<16 -> cop2 ctrl 0xC000, a1<<16 -> 0xC800). Engine applies the screen-space offset via the wgpu viewport / Camera projection"
"8005b0b8" = "GTE leading-zero-count bit converter (texture/color bit packing): setCopReg(2,0xF000) / getCopReg(2,0xF800) = GTE LZCS/LZCR normalise-shift. Sibling of the already-listed 8005ba1c GTE sqrt/normalise; engine does bit packing in plain Rust"


# libcd primitives and the ISO9660 / streaming-read stack above them.
# The engine reads PROT.DAT through `legaia-iso` + `legaia-prot` directly.
[libcd]
"8005a78c" = "Pad / SIO init (SIO MMIO + RX/TX buffer clear)"
"8005abd0" = "Pad-protocol-phase handshake (digital-pad protocol selector)"
"8005bd70" = "getLoc-equivalent state-buffer getter (returns &DAT_800793c8)"
"8005befc" = "CdControl wrapper (FUN_8005befc(2,...) issues CdlSetloc)"
"8005c2c4" = "CdDiskReady (wraps 8005d9a0)"
"8005c328" = "LBA -> BCD-MSF converter"
"8005c42c" = "BCD-MSF -> LBA converter (((m*60 + s)*75 + f) - 150)"
"8005bee4" = "CdReadCallback-style setter: swaps the libcd completion-callback pointer DAT_800793b0, returns the previous value"
"8005c034" = "libcd CdControl retry wrapper: 3-attempt loop around FUN_8005cf80, manages the callback slot DAT_800793ac"
"8005c4ac" = "libcd internal poll/state target (CdSync recurses through here)"
"8005ccb4" = "CdSync (179-instr poll loop)"
"8005d9a0" = "CdControl_raw / CD-DMA-channel-3 synchronous read primitive"
"8005dbb4" = "ISO9660 directory lookup"
"8005dea0" = "Directory parser (caches up to 128 entries at 0x801C4BEC)"
"8005e180" = "Directory-entry lookup by ID"
"8005e228" = "File loader (reads sectors from a directory entry)"
"8005e4d4" = "Synchronous LBA-based file reader (high-level open-then-read)"
"8005e574" = "CD sector-reader state machine / streaming-read per-IRQ callback"
"8005e788" = "Streaming-read starter (registers 8005e574 as IRQ callback)"
"8005e9a4" = "Public streaming-read API (sector_count, dest_buffer, mode_flags)"
"8005becc" = "libcd completion-callback swap-setter: loads the callback pointer at DAT_800793AC, stores the new a0, returns the previous (the CdReadSyncCallback-family slot; sibling of the already-listed 8005bee4 setter for DAT_800793B0). Engine reads PROT.DAT through legaia-iso/legaia-prot, no libcd callback slots"
"8005be8c" = "CdSync wrapper: 8-instruction tail-call to 8005ca34 (the CdSync/CdReady drive-status poll - s_CD_sync / s_CD_timeout / CdlSync diagnostics, drains the CD result registers). Engine reads PROT.DAT through legaia-iso/legaia-prot, no CD-drive transport"
"8003d53c" = "CD-XA streaming-clip start: arms a streamed XA-ADPCM read off the clip MSF table (0x801C6ED8) through the libcd transport (8005c42c msf_to_lba, 8005be8c CdSync, 8005becc callback-swap, 8005c034 CdControl). The CD-drive half is out of clean-room scope - the engine decodes XA buffers (legaia-xa) and plays them through its own mixer, not a CD transport. see ghidra/scripts/funcs/8003d53c.txt"
"8003ed04" = "CD-XA streaming-clip stop: teardown counterpart of 8003d53c. Clears the libcd completion callback (8005becc) and issues the drive Pause/Stop commands (8005c160 / 8005c034) by mode. CD transport only, no game logic; sibling of the already-listed clip-path shim 8003ee7c. see ghidra/scripts/funcs/8003ed04.txt"
"8003eae4" = "CD-XA streaming-clip start by table index (simpler sibling of 8003d53c): when no clip is armed, stops the in-flight read (8003ed04 / 8003ee7c), looks up the 8-byte clip entry in the MSF table 0x801C6ED8, sets the drive read location via 8005c160, and issues CdControl 0x15 (8005c034). CD transport only; the engine decodes XA buffers (legaia-xa) through its own mixer. see ghidra/scripts/funcs/8003eae4.txt"


# libgs / libgpu primitives. The clean-room renderer in `engine-render` emits
# its own GP0 / OT / draw-env machinery; the retail PsyQ wrappers below are
# 1:1 PsyQ entry points that wrap a vtable dispatch + dev-string printf, plus
# a couple of inline addPrim-shape helpers Sony's build emitted as real
# functions rather than macros (presumably to save code size given call counts
# in the 100s).
"8005c160" = "libcd CdControl issue-with-retry wrapper. Issues a CD command via FUN_8005cf80 up to 3 times (saving/restoring the libcd busy state DAT_800793ac and the per-command word DAT_80079324[cmd] between tries) then polls the completion via FUN_8005ca34; returns success. Pure libcd transport with no game-specific semantic; the clean-room engine reads sectors through the CdDmaHost trait and plays decoded XA through its own mixer, so this is already REF-listed as out-of-scope in crates/engine-core/src/cd_dma.rs. see ghidra/scripts/funcs/8005c160.txt"
[libgs]
"8003d2c4" = "addPrim / linkPrim (OT-linker primitive; swap low-24 preserve high-8). Inlined function, not a PsyQ library entry."
"80059010" = "SetDrawMode primitive constructor: fills a DR_MODE primitive (GP0 0xE1 texture-page word via 80059510, GP0 0xE2 texture-window word via 80059744). 1:1 PsyQ libgpu shape; engine-render emits its own GP0 draw-mode / tpage state"
"80057c44" = "ResetGraph (vtable dispatch + dev-string printf wrapper)"
"80057fec" = "GetGraphDebug (returns DAT_80078d54)"
"8005800c" = "DrawSyncCallback"
"80058068" = "SetDispMask"
"80058104" = "DrawSync"
"80058170" = "Internal RECT validator (debug-mode bounds check + printf)"
"80058298" = "ClearImage (vtable dispatch + dev-string printf wrapper)"
"800583c8" = "LoadImage (vtable dispatch + dev-string printf wrapper)"
"8005842c" = "StoreImage (vtable dispatch + dev-string printf wrapper)"
"80058490" = "MoveImage (vtable dispatch + dev-string printf wrapper)"
"8005860c" = "ClearOTagR"
"80058704" = "DrawOTag"
"80058778" = "PutDrawEnv"
"8005887c" = "DrawOTagEnv"
"800589d0" = "PutDispEnv"
"8005724c" = "SetDefDispEnv-shape env filler: writes the DISPENV struct (xy/wh + GetGraphType via 800608e0); one of the two libgpu env fillers 8001daf8 calls to build the double-buffered DISPENV/DRAWENV. Engine uses a wgpu surface, no DISPENV"
"8005731c" = "SetDefDrawEnv-shape env filler: writes the DRAWENV struct (clip/ofs/zero-fill); the DRAWENV sibling of 8005724c in 8001daf8's double-buffer setup. Engine uses a wgpu render pass, no DRAWENV"
"8005832c" = "ClearImage internal (GPU-queue add via vtable PTR_80078d4c+8, dev-string 'ClearImage'): the lower-level form behind 80058298. PsyQ libgpu; engine clears via wgpu"
"80059bd4" = "LoadImage2 / MoveImage internal (DMA over GPU MMIO ports DAT_80078e24/E28)"
"80059c00" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"
"80059de4" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"
"80059568" = "libgpu OT coordinate-packer (GP0 tag 0xE3 = Drawing Area Top-Left): display-mode-aware clamp + mask/shift of (x,y) into the GP0 area word (returns ... | 0xE3000000). First of the packer trio with 80059634 (0xE4) / 80059700 (0xE5); engine-render emits its own clip via wgpu scissor"
"80059634" = "libgpu OT coordinate-packer (GP0 tag 0xE4 = Drawing Area Bottom-Right): display-mode-aware clamp + mask/shift of (x,y) into the GP0 area word (returns ... | 0xE4000000). Sibling of 80059568 (0xE3) / 80059700 (0xE5); engine-render emits clip via wgpu scissor"
"80059700" = "libgpu OT coordinate-packer (GP0 tag 0xE5 = Drawing Offset): mask/shift of (x,y) into the GP0 offset word (returns ... | 0xE5000000). Sibling of 80059568 (0xE3) / 80059634 (0xE4); engine-render carries the draw offset in the wgpu viewport/Camera"
"80058f1c" = "libgpu DR_AREA primitive builder: fills a draw-env primitive (type byte 2) with the clip top-left via 80059568 (GP0 0xE3) + bottom-right via 80059634 (GP0 0xE4). Sibling of 80058fa0; engine uses a wgpu render pass with no DR_AREA primitive"
"80058fa0" = "libgpu DR_OFFSET primitive builder: fills a draw-env primitive (type byte 2) with the drawing offset via 80059700 (GP0 0xE5). Sibling of 80058f1c; engine carries the draw offset in the wgpu viewport, no DR_OFFSET primitive"
"8005a1c0" = "libgpu GPU command-queue enqueue: when the 0x60-stride ring (0x801C9590) has room, writes {handler, rect/inline-copy, src} into the tail slot (DAT_80078e58), kicks the flusher 8005a4a0; else blocks on GPU status *0x80078e28 & 0x4000000. PsyQ-style GPU command queue; engine-render emits wgpu directly with no GPU command ring"
"8005a4a0" = "libgpu GPU command-queue flusher: drains the 0x60-stride ring (head DAT_80078e5c / tail DAT_80078e58), waits on GPU status *0x80078e28 & 0x4000000, dispatches each entry's handler(entry+4, entry+8). The drain half of the 8005a1c0 enqueuer; engine-render uses wgpu, no GPU command ring"
"8005aa64" = "libgpu GPU timeout watchdog / queue-reset: on timeout prints the 'GPU_timeout que=%d stat=%08x' dev string, resets head/tail and pokes the GP1 reset words *0x80078e28 = 0x2000000 / 0x1000000. Pure libgpu transport watchdog tied to the 8005a1c0/8005a4a0 ring; engine-render uses wgpu"


# SCUS-resident PSX GPU/GTE render-pipeline scaffolding. Unlike the [libgs] /
# [libgte] entries above (which are PsyQ library entry points), these are
# game-side functions that build and drive the PSX ordering-table / packet-pool
# / display-env / software-clip machinery. The clean-room renderer in
# `crates/engine-render` emits a wgpu pipeline with no OT, no packet pool, no
# DISPENV/DRAWENV, and hardware clipping/rasterisation - so the entire concept
# these encode is replaced rather than line-ported. (Each is documented in
# `docs/reference/functions.md`.)
[render_pipeline]
"8001e3b8" = "Primitive-packet buffer + ordering-table allocator (OT = 1<<depth entries, double-buffered packet pool into DISPENV @ 0x8007BF30; malloc via 80017888). engine-render uses a wgpu pipeline with no OT/packet-pool"
"8001daf8" = "Display-environment + GTE screen setup: builds the double-buffered DISPENV/DRAWENV pair (libgpu 8005731c/8005724c), selects 320x240 / 640x480, primes GTE SetGeomScreen/Offset. Engine sets the viewport via the winit surface + Camera::for_viewport"
"80044798" = "Cluster-A primitive off-screen reject test: reads GTE FIFO SXY0/1/2 and rejects a 4-vertex prim when any corner leaves [0,0xF0)x[0,0x140). Engine relies on wgpu viewport/scissor + NDC clipping; no software reject"
"8003c1f8" = "Dialog-font glyph-cell sprite emitter: builds a GP0 0x64 textured-sprite packet (8x12 px, UV u=cell*8+0x50 v=0xD0, CLUT DAT_8007B454+0x7F86) into the scratchpad OT cursor _DAT_1F8003A0, sets the draw mode via the already-listed 80059010 (SetDrawMode), links via 8003D2C4. Engine renders dialog glyphs through the legaia-font atlas overlay, not GP0 cell pushes"
"80024ee4" = "UI panel fill+tile GP0 packet emitter: pushes a fill/clear (0x05xxxxxx tag word) plus a textured-tile move packet (0x2bxxxxxx + 24-bit color) into the scratchpad OT cursor _DAT_1F8003A0, sets the draw mode via 80059010, links via 8003D2C4. Shared box-tile draw primitive across the cutscene/save-UI/fishing/slot/baka overlays; engine draws UI panels through its own text/overlay path with no GP0 submission"
"80017ec8" = "Tile-window background render pass: sets the scroll-origin globals then walks a tile window centred on (cx,cz) emitting one per-cell GP0 textured-sprite packet each (8002b96c, via the 801d7b50 OT setup). The region-attribute refresh it calls (800180ec) is the genuine game-logic half and stays in the worklist; this outer per-frame GP0 tile emission is replaced by the engine's wgpu field/board background path. see ghidra/scripts/funcs/80017ec8.txt"
"8003c11c" = "Generic textured-sprite (GP0 0x64 / SPRT) emitter: reserves a 0x14-byte packet at the scratchpad OT cursor _DAT_1F8003A0, writes the GP0 tag 0x4000000 + color 0x64808080, copies XY/UV+CLUT/WH from its two arg structs, sets the draw mode via 80059010 and links via 8003d2c4 (AddPrim). The sibling of the dialog-font cell emitter 8003c1f8 and the per-digit glyph push the HUD number formatter (80034e4c/80034b78) uses. Engine renders text/sprites through the legaia-font atlas + wgpu overlay, not GP0 SPRT pushes. see ghidra/scripts/funcs/8003c11c.txt"


# libetc / libcomb (VSync, frame-pacing) plus SCUS-resident dev-instrumentation
# helpers (in-game debug-string formatter, dev path-based file reader). The
# engine uses Rust's logging stack (tracing / env_logger) and ISO9660 directly;
# none of these have engine equivalents.
[libetc]
"8001a068" = "in-game dev-string formatter / on-screen log printer. Reads format string, writes RGB 0x808080 cell, %-escape walker. Called via 8001a09c-style wrapper that takes (fmt, args...) and pushes a text primitive."
"8001aa68" = "fixed-cell debug-string drawer: (str, x, y) -> per-glyph sprite into the scratchpad OT at _DAT_1F8003A0, source cell chosen by character class (digits/upper/lower/punct). The dev/CONFIG-test-screen monospaced text path (sibling of the 8001a068 formatter); the clean-room engine renders text via the proportional legaia-font atlas instead."
"8001ad38" = "low-level fixed-cell sprite-glyph emitter: pushes one sprite prim (tag 0x3000000, color 0x74808080) into the scratchpad OT _DAT_1F8003A0 + linkPrim 8003d2c4. The per-glyph primitive behind the dev monospaced text path 8001aa68"
"80017d98" = "draws one fixed-cell dev-font glyph (cell u=0x50, v=0xf8) at signed (x,y) via 8001ad38; thin wrapper in the 8001aa68 dev/CONFIG monospaced text family. Engine renders text via legaia-font"
"8003e6bc" = "dev host-FS reader: (path, dest) -> fopen + fseek/SEEK_END for size + fread + zero-pad to 0x800 sector. Calls libapi 800608f0/80060920/80060944/80060910. The retail dual-mode loader's debug branch; clean-room engine reads from disc via ISO9660 only."
"8005fb84" = "VSync(N) handler - wraps 8005fccc with frame-counter math"


# libapi file API + device-vtable trampoline. These back the dev branch's
# fopen / fseek / fread / fclose path; the engine uses std::fs.
[libapi]
"800608e0" = "libapi fopen (kernel-call wrapper around BIOS A0 table)"
"800608f0" = "libapi file-API leaf (fopen / fseek / fread / fclose cluster)"
"80060910" = "libapi file-API leaf"
"80060920" = "libapi file-API leaf"
"80060944" = "libapi chunk reader (loops over 80060a04 BREAK 0x105 boundary)"
"8005fd88" = "libapi device-vtable trampoline (slot +0xC of PTR_PTR_8007A860)"


# Sony SsAPI sequencer (libsnd). The clean-room `engine-audio::Sequencer`
# replaces this cluster end-to-end; see `docs/subsystems/audio.md`.
[libsnd]
"80061c68" = "_SsSeqGetVar (MIDI varint delta-time decoder)"
"80061d18" = "SsSeqClose (full close - clears bitmap + memsets channels)"
"80061e94" = "SsSeqClose short-arg shim (tail-calls 80061d18)"
"80061edc" = "SsSeqSetVol"
"80064890" = "SsSeqSetVol-style per-voice volume/pan setter: looks up the voice record (DAT_801cd2c0 + id*4); if active dispatches _SsSeqNoteOn (80067e9c), else latches vol/pan into +0x58/+0x5a. The voice-mix setter the already-ignored [actor_sound_glue] helpers call; engine-audio owns its software-SPU voice pool"
"8006206c" = "_SsSetSlideVolume (ramp from->to over N ticks)"
"80062004" = "SsSeqSetVol short-arg shim: sign-extends its two args and tail-calls 80061edc SsSeqSetVol with track=0"
"80064bd0" = "SsVabClose voice-teardown loop: iterates DAT_801ce344 voices, builds a default SpuVoiceAttr (pitch 0x1000, vol 0x80ff, ADSR 0x4000) on stack, broadcasts via 8006c048 (SpuSetVoiceAttr) and resets each per-slot record via 80067480; pure libsnd/libspu, replaced by engine-audio"
"80062340" = "SsSeqOpen (slot-bitmap walk + load)"
"80062410" = "_SsSeqInit (validates magic + reads PPQN / BPM / TPQ)"
"8006275c" = "SsSeqPlay (clears stop/end flags, sets active bit)"
"8006282c" = "SsSeqPlay 1-arg shim"
"80062880" = "Pause/Resume shim (tail-calls 800628f0)"
"800628f0" = "_SsSeqCtrl (Stop / Pause / Resume state core)"
"80062aa0" = "SsSetMVol ([cmd=3, x*0x81, y*0x81] -> SPU cmd dispatcher)"
"800641ec" = "SsSeqRewind / SsSeqReplay"
"80064370" = "SsSeqRewind wrapper: sign-extends its s16 arg and tail-calls 800641ec (SsSeqRewind/SsSeqReplay) with mode 0. Pure SsAPI thunk; replaced by the engine-audio Sequencer"
"80065034" = "SsAPI key-on (called by actor-VM positional SFX emitter)"
"800653c8" = "SsVabClose helper (validates VAB id, calls FUN_80067480)"
"80065440" = "Single-shot SPU command ([cmd=6, p1*0x81, p2*0x81])"
"800657d0" = "Volume-only update (actor-VM positional SFX)"
"80065978" = "_SsVoKeyOnDirect (allocates voice, writes pitch/base note)"
"80065b88" = "SsResetTranspose (zeros transpose base)"
"80066e50" = "_SsPitchFromKey (12-entry pitch table at _DAT_8007A940)"
"80067480" = "SsVabClose helper (per-slot record reset)"
"80067550" = "_SsVoNoteOn (master-vol x velocity x pan square-law mix)"
"80067e9c" = "_SsSeqNoteOn (sequence-driven keyon)"
"800683d8" = "SsVabTransfer (VAB program-attr lookup)"
"800684cc" = "SsVabClose (by VAB-ID search)"
"80068b98" = "SsSeqOpen (slot/track-count bounds-check)"
"80068c5c" = "SsSeq auto-poll on (_DAT_801CE330 = 1)"
"80068c80" = "SsSeqClose (calls SpuFree on resident addr)"
"80068d34" = "SsSeqPlay 1-shot wrapper"
"80068d94" = "SsSepOpen / SEP loader core (988 bytes; 'VAP' magic validate + write to SPU)"
"80069170" = "SsSeqPlayResolved (final play-start stage)"
"80069230" = "Streaming SEP feeder (partial-buffer continuation)"
"80069390" = "SsIsEos (tail-call to 8006bbc8)"
"8006ca7c" = "SsSeqGetStatus"
"8006cb3c" = "SsSeqGetAttr (attr_id switch)"
"8006cdb0" = "SsSeqSetCallback"
"8006ce30" = "SsSeqSetUserData"
"8006d7b4" = "_SsSeqSetUserDataInner"
"8006ddc8" = "SsSeqSetMarkCallback"
"8002630c" = "Game-side VAB-bank upload wrapper (gated on _DAT_8007B868==0): drives the libsnd load sequence SsVabOpenHead (80068d34) -> SsVabTransBody (80069170) / SsVabTransBodyPartly (80069230) -> SsVabClose (80069390), with the literal 'SsVabOpenHead/SsVabTransBody/SsVabTransBodyPartly' dev error strings. Pure SsAPI orchestration; engine loads banks clean-room via legaia-vab + vab_bind"


# libspu primitives + SPU DMA transfer engine. Replaced by clean-room
# software SPU in `engine-audio`.
[libspu]
"800697e0" = "_SpuTransfer outer wrapper (non-DMA CPU copy path)"
"80069b18" = "_spu_t core (4-mode SPU transfer state machine)"
"80069da8" = "SpuWrite (top-level; picks DMA vs CPU copy path)"
"80069e98" = "_SpuSetReg16 (direct SPU register writer)"
"80069ee0" = "_SpuAddrAlign"
"8006a020" = "_spu_a (read direction)"
"8006a04c" = "_spu_a (write direction)"
"8006a078" = "SPU register-settling delay (60-iter busy-wait)"
"8006a158" = "SsSpuMalloc core (block-table allocator)"
"8006a420" = "SpuFree compactor"
"8006a728" = "SpuFree (flips matching addr's high bit, calls compactor)"
"8006a7a4" = "SpuSetReverbVol (3-mode wrapper)"
"8006aa90" = "SpuSetReverbDepth"
"8006ac30" = "SpuMallocCheck"
"8006acbc" = "SpuSetVoiceAttr (mask-driven dispatcher, 1272 bytes)"
"8006b1b4" = "SpuSetReverbModeParam (30-attr reverb commit, regs 0x1C0..0x1FE)"
"8006b6a8" = "SpuSetReverbWorkAreaStart (SPU-RAM zero-fill via 0x400 chunks)"
"8006ba50" = "SpuSetTransferStartAddr"
"8006bab0" = "SpuGetTransferStartAddr"
"8006bb08" = "SpuSetTransferMode"
"8006bb3c" = "SpuWrite (streaming-write continuation)"
"8006bbc8" = "SpuIsTransferCompleted (polls kernel event via TestEvent thunk)"
"8006bc70" = "SpuSetTransferCallback (block flag)"
"8006bc9c" = "SpuIsTransferPaused"
"8006bcb4" = "SpuSetCommonAttr (master vol L/R + reverb regs)"
"8006c048" = "SpuSetVoiceAttr broadcaster (24-voice loop, 1548 bytes)"
"8006c6e4" = "_SsKey2Pitch (two-octave-table pitch math)"
"8006d2ac" = "Audio subsystem init (wraps BIOS C0 thunk in Enter/ExitCriticalSection)"
"8006ef18" = "SPU voice-state init sequence (calls 8006ef68 / 8006f088 / 8006f118 in order)"
"80062a0c" = "SpuSetCommonAttr CD-volume + reverb-depth wrapper: packs a SpuCommonAttr struct (mask 0x200/0x100 = CD vol L/R, 0x2000/0x1000 = reverb depth L/R; field = arg & 0xff) and submits via the already-listed 8006bcb4. Engine models CD/reverb mix at the register level in engine-audio"
"800643c4" = "SpuSetCommonAttr master-volume wrapper: clamps arg <= 0x7f, scales *0x102, packs a SpuCommonAttr struct (mask 0xc0 = master vol L/R, 0xc00 = main vol) and submits via the already-listed 8006bcb4. Engine sets Spu master_left/right directly"


# Intra-function labels inside the field/event script-VM dispatcher
# `FUN_801DE840` that Ghidra promoted to fake `FUN_xxxxxxxx` function names.
# Each entry is really a `j epilogue` target with an `addiu s8, s8, N` PC-delta
# prelude; calling "into" the label just supplies the PC delta and falls
# through to the dispatcher tail. The catalogue lives in
# `docs/subsystems/script-vm.md#intra-function-label-catalogue`. The engine
# port models each label's PC delta directly inside its dispatcher (see
# `crates/engine-vm/src/field.rs`), so there is no separate function to port.
"8003ee7c" = "libspu SPU common-attr / reverb-depth setter shim used by the CD-XA clip path. Thin two-call wrapper: FUN_800643c4(0, depth, depth) (SpuSetCommonAttr-style master/reverb-depth set from the s16 arg) then FUN_80062a0c(0,0,1) (CD/reverb attribute apply). No game logic; REF-listed as out-of-scope in crates/engine-core/src/cd_dma.rs. see ghidra/scripts/funcs/8003ee7c.txt"
[field_vm_labels]
"801e3620" = "FUN_801de840 intra-function label (`code_r0x801e3620`): `param_2 + 4; break;` -> PC += 4"


# Intra-function epilogue-merge labels in OTHER large overlay functions (the
# same Ghidra-promotion pattern as `field_vm_labels`, but inside a different
# enclosing function). Each is a `j`/`bne` target *within* one function that
# Ghidra split into a fake `FUN_xxxxxxxx` entry; never reached by `jal`.
[overlay_epilogue_labels]
"801dbbfc" = "Epilogue-merge label inside FUN_801dba20 (overlay 0897 field locomotion / NPC-movement processor): multiple `j 0x801dbbfc` / `bne ...,0x801dbbfc` targets within FUN_801dba20 merge at the callee-save restore block (`lw ra,0x28(sp); lw s5..s0; jr ra`). Never a `jal` target anywhere in the corpus; no standalone body to port."


# Ghidra phantom leaves: addresses Ghidra promoted to fake `FUN_xxxxxxxx`
# entries that are NOT real call targets - a disassembler split an instruction
# off the head/tail of a genuine function. They are dumped + documented (each
# has a row in `docs/reference/functions.md` recording the mis-attribution) but
# there is nothing to port: the real work lives in the enclosing function. They
# inflate the worklist with phantom citation counts, so they are scoped out
# here. (Distinct from `field_vm_labels`, which are real dispatcher PC-delta
# exit targets - these are not even that.)
[ghidra_phantoms]
"80034b6c" = "One-instruction tail fragment before FUN_80034B78: Ghidra split a `sw param_1, gp[+0x14c]` store (text-row state byte the text-actor tick FUN_80031D00 writes) into a phantom leaf. Not a real call target; an earlier engine REF mis-guessed it a GPU-packet allocator. See docs/reference/functions.md row `80034B6C`."
"8005da40" = "`lui v1, 0x8008` instruction inside FUN_8005D9A0 (the CD-DMA-channel-3 read primitive, itself ignore-listed under [libcd]); Ghidra promotes the intra-function label to a fake FUN_8005DA40. No real function, no `_DAT_800795B4` table. See docs/reference/functions.md row `FUN_8005DA40`."


# Constant-address / global-buffer accessors: two- or three-instruction
# functions whose entire body is `lui v0, HI; (jr ra;) addiu v0, v0, LO` -
# they return the address of a fixed PSX-RAM global and nothing else. The
# clean-room engine replaces raw global pointers with typed Rust fields, so
# there is no function body to port (the callers' intent - e.g. walking the
# returned buffer as a CDNAME char* - is modelled where the caller is ported).
[global_accessors]
"80019788" = "Global-buffer base getter: `lui v0, 0x8009; jr ra; ...` returns the fixed RAM pointer 0x80088758 (callers scan it as a char* for '_'-separator CDNAME names). Engine carries scene/name state as typed Rust fields (active_scene_label etc.); no body to port. See docs/reference/functions.md row 80019788."


# Identity / no-op thunks at addresses outside the PsyQ region. These are
# `jr ra; move v0, a0` two-instruction wrappers that return their input
# verbatim - probably leftover dev scaffolding or placeholder slots in a
# vtable-style dispatch. The engine port inlines what would be the identity
# passthrough; there is nothing to model.
[identity_thunks]
"801e38d0" = "Overlay identity thunk (`jr ra; move v0, a0`). Called by FUN_801DD35C menu dispatcher (`a0 = state[+0x204]`) and the title-overlay tick at `801dd6b0`; the menu / title state code reads the input value back unmodified. See `docs/subsystems/boot.md` lines 216, 228."


# Empty-bodied stubs: functions whose entire body is a prologue/epilogue with no
# side effects (`jr ra; nop`, or `addiu sp,-N; addiu sp,+N; jr ra`). These are
# retail-stripped leaves - dev/debug or alternate-build code paths the linker
# emptied out, leaving an inert entry point that does nothing. There is no
# behavior to port. (The 8002b9xx cluster is the stripped per-tile sprite-emit
# leaf family; cf. FUN_8002B96C, also `jr ra; nop`.)
[noop_stubs]
"8002b93c" = "Empty stub (`jr ra; nop`). Stripped tile-sprite-emit leaf (8002b9xx family)."
"8002b944" = "Empty stub (`jr ra; nop`). Stripped tile-sprite-emit leaf (8002b9xx family)."
"8002b94c" = "Empty stub (`jr ra; nop`). Stripped tile-sprite-emit leaf (8002b9xx family)."
"8002b954" = "Empty stub (`jr ra; nop`). Stripped tile-sprite-emit leaf (8002b9xx family)."
"8003e7f0" = "Empty-bodied stub: `addiu sp,sp,-0x90; addiu sp,sp,0x90; jr ra` - sets up and tears down a stack frame with no body (retail-stripped, near the dev host-FS reader 8003e6bc). Does nothing."


# Game-side actor-sound orchestration over libsnd / libspu. Unlike the [libsnd]
# / [libspu] entries above (which are PsyQ SsAPI / SPU library entry points),
# these are SCUS-resident glue that bind/unbind an actor's voice slot by
# reading actor-struct fields (+0x6 pan, +0x8 active, +0xa bound sequence id)
# and dispatching straight into the already-ignored libsnd/libspu shims
# (80064370 SsSeqRewind, 80061e94 SsSeqClose, 8002657c/8002614c -> 800643c4 /
# 80062a0c / 80064890 vol+pan setters). The clean-room engine-audio owns its
# own sequencer + software-SPU voice pool, so the per-actor voice lifecycle has
# no separate clean-room semantic to port. (Documented in
# `docs/reference/functions.md`.)
[actor_sound_glue]
"800266e0" = "Actor sound-source teardown: pan-reset (8002657c) + libsnd SsSeqRewind (80064370) on the actor's bound sequence id. Game-side libsnd glue."
"80026520" = "Actor sound-source release: VSync (8005fb84) + libsnd SsSeqRewind/SsSeqClose (80064370 / 80061e94), fully closing the actor's voice slot. Game-side libsnd glue."
"80026740" = "Actor sound-source pan-reset + voice-stop: pan-reset (8002657c) + libsnd voice-stop (8006282c). Lightweight detach; game-side libsnd glue."
"80026478" = "Actor sound-source attach / re-pan: CD/reverb attrs (80062a0c) + libsnd pause/resume (80062880) + directional re-pan (8002657c). Activation harness; game-side libsnd/libspu glue."
"8002657c" = "Directional-pan helper: on a changed actor pan byte (+0x6) re-applies master volume (800643c4) + CD/reverb (80062a0c) + voice vol/pan (80064890). Pure libspu/libsnd glue, no game logic."
"8002614c" = "Audio-context volume re-apply on state change (gp+0x800 edge): master volume + CD/reverb reset, then per-sequence volume re-apply across up to 4 sequencer slots (80064890 x4). Pure libsnd/libspu glue."

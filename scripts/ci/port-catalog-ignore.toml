"80059c00" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"
"80059de4" = "Intra-function label inside FUN_80059bd4 (Ghidra-promoted fake entry)"
"80059568" = "libgpu OT coordinate-packer (GP0 tag 0xE3 = Drawing Area Top-Left): display-mode-aware clamp + mask/shift of (x,y) into the GP0 area word (returns ... | 0xE3000000). First of the packer trio with 80059634 (0xE4) / 80059700 (0xE5); engine-render emits its own clip via wgpu scissor"
"80059634" = "libgpu OT coordinate-packer (GP0 tag 0xE4 = Drawing Area Bottom-Right): display-mode-aware clamp + mask/shift of (x,y) into the GP0 area word (returns ... | 0xE4000000). Sibling of 80059568 (0xE3) / 80059700 (0xE5); engine-render emits clip via wgpu scissor"
"80059700" = "libgpu OT coordinate-packer (GP0 tag 0xE5 = Drawing Offset): mask/shift of (x,y) into the GP0 offset word (returns ... | 0xE5000000). Sibling of 80059568 (0xE3) / 80059634 (0xE4); engine-render carries the draw offset in the wgpu viewport/Camera"
"80058f1c" = "libgpu DR_AREA primitive builder: fills a draw-env primitive (type byte 2) with the clip top-left via 80059568 (GP0 0xE3) + bottom-right via 80059634 (GP0 0xE4). Sibling of 80058fa0; engine uses a wgpu render pass with no DR_AREA primitive"
"80058fa0" = "libgpu DR_OFFSET primitive builder: fills a draw-env primitive (type byte 2) with the drawing offset via 80059700 (GP0 0xE5). Sibling of 80058f1c; engine carries the draw offset in the wgpu viewport, no DR_OFFSET primitive"
"8005a1c0" = "libgpu GPU command-queue enqueue: when the 0x60-stride ring (0x801C9590) has room, writes {handler, rect/inline-copy, src} into the tail slot (DAT_80078e58), kicks the flusher 8005a4a0; else blocks on GPU status *0x80078e28 & 0x4000000. PsyQ-style GPU command queue; engine-render emits wgpu directly with no GPU command ring"
"8005a4a0" = "libgpu GPU command-queue flusher: drains the 0x60-stride ring (head DAT_80078e5c / tail DAT_80078e58), waits on GPU status *0x80078e28 & 0x4000000, dispatches each entry's handler(entry+4, entry+8). The drain half of the 8005a1c0 enqueuer; engine-render uses wgpu, no GPU command ring"
"8005aa64" = "libgpu GPU timeout watchdog / queue-reset: on timeout prints the 'GPU_timeout que=%d stat=%08x' dev string, resets head/tail and pokes the GP1 reset words *0x80078e28 = 0x2000000 / 0x1000000. Pure libgpu transport watchdog tied to the 8005a1c0/8005a4a0 ring; engine-render uses wgpu"
"8005aa30" = "libgpu GPU-queue timeout arm: sets the watchdog deadline DAT_80078e6c = VSync()+0xf0 and clears DAT_80078e70. Arms the deadline the 8005aa64 watchdog checks over the 8005a1c0/8005a4a0 command ring; engine-render uses wgpu, no GPU command ring. see ghidra/scripts/funcs/8005aa30.txt"
"80059280" = "libgpu textured-sprite primitive builder: computes screen XY/UV via the OT coordinate-packers (80059568/634/700) and composes the draw-mode (80059510) + texture-window (80059744) words, clamping to VRAM page dims. Sibling of the SetDrawMode constructor 80059010; engine emits sprites via the wgpu overlay. see ghidra/scripts/funcs/80059280.txt"
"80059510" = "libgpu draw-mode (tpage) word composer (GetTPage shape): builds the GP0 0xE1 texture-page word from semi-transparency / texture flags, bit layout selected by the texture-format global DAT_80078d54. Half of what 80059010 (SetDrawMode) fills; engine emits GP0 draw-mode state itself. see ghidra/scripts/funcs/80059510.txt"
"80059744" = "libgpu texture-window word composer: builds the GP0 0xE2 texture-window word from an 8-byte rect descriptor (0 for a null pointer). The other half of what 80059010 (SetDrawMode) fills; engine handles texture windowing in the shader. see ghidra/scripts/funcs/80059744.txt"


# SCUS-resident PSX GPU/GTE render-pipeline scaffolding. Unlike the [libgs] /
# [libgte] entries above (which are PsyQ library entry points), these are
# game-side functions that build and drive the PSX ordering-table / packet-pool
# / display-env / software-clip machinery. The clean-room renderer in
# `crates/engine-render` emits a wgpu pipeline with no OT, no packet pool, no
# DISPENV/DRAWENV, and hardware clipping/rasterisation - so the entire concept
# these encode is replaced rather than line-ported. (Each is documented in
# `docs/reference/functions.md`.)
[render_pipeline]
"8005112c" = "per-actor element-marker draw dispatching into FUN_80048310 GPU emit (port-battle skip)"
"8001763c" = "double-buffer swap + clear-color setup (gp+0x434 flip, GPU env)"
"80019d50" = "CLUT hue-rotate color-cycle builder into GPU prim buffer _DAT_1f8003a0"
"8001a374" = "debug glyph -> GPU SPRT primitive emitter into _DAT_1f8003a0"
"8001c394" = "floor/grid GPU poly emitter (0x9000000 prim) + OT insert"
"8001c93c" = "HUD text/number draw dispatcher over record list (draw-string/draw-number)"
"8001cd68" = "GPU gouraud quad primitive emitter (0x9000000, 10-word prim) + OT insert"
"8001d230" = "VRAM framebuffer/handle setup (fb rects, alloc + register into gp+0x6d8..)"
"8001e1b4" = "per_stage_init asset-buffer alloc + fills 0x80091508 buffer-ptr table + VRAM params"
"80028158" = "procedural effect primitive builder (POLY_FT4 packets, sin/cos + RNG), no game-state"
"80029888" = "TMD mesh renderer GTE RTPT/RTPS + GPU poly emit (FUN_8002735c renderer region)"
"80029dd8" = "TMD per-primitive GTE transform + light/color + GPU packet emit + OT insert"
"8002a5a4" = "GPU quad packet builder (POLY_FT4/F4 codes) into caller packet buffer"
"8002bdc4" = "gradient textured poly-strip emitter (0xc000000 prim) into _DAT_1f8003a0 + OT insert"
"8001e3b8" = "Primitive-packet buffer + ordering-table allocator (OT = 1<<depth entries, double-buffered packet pool into DISPENV @ 0x8007BF30; malloc via 80017888). engine-render uses a wgpu pipeline with no OT/packet-pool"
"8001daf8" = "Display-environment + GTE screen setup: builds the double-buffered DISPENV/DRAWENV pair (libgpu 8005731c/8005724c), selects 320x240 / 640x480, primes GTE SetGeomScreen/Offset. Engine sets the viewport via the winit surface + Camera::for_viewport"
"80044798" = "Cluster-A primitive off-screen reject test: reads GTE FIFO SXY0/1/2 and rejects a 4-vertex prim when any corner leaves [0,0xF0)x[0,0x140). Engine relies on wgpu viewport/scissor + NDC clipping; no software reject"
"8003c1f8" = "Dialog-font glyph-cell sprite emitter: builds a GP0 0x64 textured-sprite packet (8x12 px, UV u=cell*8+0x50 v=0xD0, CLUT DAT_8007B454+0x7F86) into the scratchpad OT cursor _DAT_1F8003A0, sets the draw mode via the already-listed 80059010 (SetDrawMode), links via 8003D2C4. Engine renders dialog glyphs through the legaia-font atlas overlay, not GP0 cell pushes"
"80024ee4" = "UI panel fill+tile GP0 packet emitter: pushes a fill/clear (0x05xxxxxx tag word) plus a textured-tile move packet (0x2bxxxxxx + 24-bit color) into the scratchpad OT cursor _DAT_1F8003A0, sets the draw mode via 80059010, links via 8003D2C4. Shared box-tile draw primitive across the cutscene/save-UI/fishing/slot/baka overlays; engine draws UI panels through its own text/overlay path with no GP0 submission"
"80017ec8" = "Tile-window background render pass: sets the scroll-origin globals then walks a tile window centred on (cx,cz) emitting one per-cell GP0 textured-sprite packet each (8002b96c, via the 801d7b50 OT setup). The region-attribute refresh it calls (800180ec) is the genuine game-logic half and stays in the worklist; this outer per-frame GP0 tile emission is replaced by the engine's wgpu field/board background path. see ghidra/scripts/funcs/80017ec8.txt"
"8003c11c" = "Generic textured-sprite (GP0 0x64 / SPRT) emitter: reserves a 0x14-byte packet at the scratchpad OT cursor _DAT_1F8003A0, writes the GP0 tag 0x4000000 + color 0x64808080, copies XY/UV+CLUT/WH from its two arg structs, sets the draw mode via 80059010 and links via 8003d2c4 (AddPrim). The sibling of the dialog-font cell emitter 8003c1f8 and the per-digit glyph push the HUD number formatter (80034e4c/80034b78) uses. Engine renders text/sprites through the legaia-font atlas + wgpu overlay, not GP0 SPRT pushes. see ghidra/scripts/funcs/8003c11c.txt"
"8003541c" = "Floating-UI text-actor register+draw: produces the gp+0x148 draw-list node + layout dispatch (FUN_80030628) that the tutorial/status text boxes push. The content builders are ported separately (engine-render status/menu draws_for); this draw-list plumbing has no clean-room analogue (same class as the ignored GP0 emitters). see ghidra/scripts/funcs/8003541c.txt"
"8001ce34" = "Dev 3-D line emitter: projects two endpoints via 8003d368 (RTPS) and links a 3-word GP0 line packet (colour DAT_8007B714 + 0x40000000) into OT bucket _DAT_1F8003F4+8. All 12 static callers are the wireframe-box drawer 8001cad8; no retail-path caller in the captured corpus. Dev visualisation; engine debug draws use its own overlay. see ghidra/scripts/funcs/8001ce34.txt"
"8001cad8" = "Dev wireframe-box drawer: emits the 12 edges of an axis-aligned box via 12 calls to 8001ce34. Debug bounding-box/trigger-volume visualisation; zero callers across SCUS + captured overlays. see ghidra/scripts/funcs/8001cad8.txt"
"8001ccfc" = "Dev 2-D line emitter: 3-word GP0 line packet from pre-projected screen coords, caller-supplied command/colour word + OT bucket. Sibling of 8001ce34; zero callers in the captured corpus. see ghidra/scripts/funcs/8001ccfc.txt"
"8001c7a0" = "Dev tiny-digit number drawer: renders a value right-to-left as 4x8 semi-transparent digit sprites (GP0 0x66-family, CLUT 0x7F83) plus a minus glyph; the 4x8 sibling of the ignored debug-HUD digit drawer 8001abc8. Zero callers in the captured corpus. see ghidra/scripts/funcs/8001c7a0.txt"
"8003fabc" = "Out-of-line tail of the 8003f86c OT line-segment emitter: restores s0..s7 from the scratchpad save slots (0x1F800000..0x1C), installs a diag(0x6000) GTE rotation and stages a vector into data regs 5..7; reached only from the hand-scheduled emitter body, not an independent function. see ghidra/scripts/funcs/8003fabc.txt"
"8003f86c" = "OT line-segment emitter proper (the body whose out-of-line tail 8003fabc is already listed): hand-scheduled GP0 line-packet builder off the scratchpad OT cursor _DAT_1F8003A0, reserving 0x28-byte packets and linking into the OT. Engine draws lines through its wgpu overlay; no OT/packet emission. see ghidra/scripts/funcs/8003f86c.txt"
"8003f838" = "Scratchpad packet-id advance: bumps the OT-cursor id word _DAT_1F8002A8 by one 0xC-byte packet and re-folds the halves - GP0 packet bookkeeping for the 8003f86c/8003f3fc emitter family, no game state. see ghidra/scripts/funcs/8003f838.txt"
"8003f3fc" = "Ambient sprite/particle record emitter: clips one 0x18-stride pool record (base DAT_8007B7E0) against the scratch attribute box 0x1F800384..87, view-transforms via 8003d344 (ApplyMatrix) and pushes the GP0 sprite packet; distance bands off record[0] scale the size. The pool WRITERS are the game-logic half and stay in the worklist; this per-record GP0 emission is replaced by the engine's wgpu ambient/effect draw. see ghidra/scripts/funcs/8003f3fc.txt"
"8003f348" = "Ambient sprite/particle pool render pass: per-frame walk of the DAT_8007B7E0 pool (count at +2, active flag +5) calling 8003f3fc per record, GTE state bracketed by 8005b268/8005b308, emitted-count into gp+0x990. Same class as the listed tile-window passes: replaced by the engine's wgpu draw path. see ghidra/scripts/funcs/8003f348.txt"
"80026ce4" = "Display-flip / frame-present driver: sets the clear color + DISPENV swap (8005b7d8/8003d1a4), DrawSync-family waits (8005fb84), the STR-mode (0x15) double packet submit (80059010 + 8003d2c4 AddPrim) with the 80026f50 camera commit, and the per-mode world-map tile-dispatch calls (801f7088 / 801f69d8 - those callees are game logic and stay in the worklist). The engine presents through the wgpu swapchain. see ghidra/scripts/funcs/80026ce4.txt"
"80026f50" = "Camera GTE matrix commit (STR-mode leg of 80026ce4): builds the rotation from the camera angle triple via 80026988, multiplies the DAT_80010B84 template (8005b3a8 MulMatrix), loads translation from DAT_800840B8..C0 and pushes RT/TR to the GTE (8005b618/8005b6a8). Engine builds view matrices in engine-render (Camera); pure COP2 staging. see ghidra/scripts/funcs/80026f50.txt"
"8001d058" = "Display-flip gate wrapper: calls the present driver 80026ce4 only while scratch _DAT_1F800394 bit 8 is set. Frame-loop plumbing around the listed 80026ce4. see ghidra/scripts/funcs/8001d058.txt"
"8001d140" = "Scratchpad-stack render trampoline: swaps SP into the 0x1F8002BC fast-scratch window, jals the per-actor render dispatcher 8001ada4 for the caller's list head, restores SP. Pure R3000 performance idiom around the (documented) render dispatcher; no behaviour of its own. see ghidra/scripts/funcs/8001d140.txt"
"801d99bc" = "Per-actor battle UI-element array teardown: zeroes the 0x28-actor UI-element arrays (+0x1074/+0x11b4/+0x11b7) and calls 800355f0. Frame draw-state reset companion to 800355f0; no engine equivalent (engine holds battle UI state in Rust structs). see ghidra/scripts/funcs/801d99bc.txt"
"8003563c" = "Per-actor record-queue append: appends a 16-byte record into an actor's 8-slot sub-buffer on the gp+0x148 draw/event list (lazy 0x80-byte alloc, hard cap 8). Data-structure plumbing; the reward-resolver semantic it serves is ported in apply_battle_loot. see ghidra/scripts/funcs/8003563c.txt"
"8003adac" = "Scene-entry letterbox/sprite-pair chrome: builds two box/sprite primitives (sizes 0x1E, 0x08) via the panel emitter 80024e80. Host GP0 chrome emission; engine draws scene-entry framing through its own overlay path. see ghidra/scripts/funcs/8003adac.txt"
"800355f0" = "Floating draw-list teardown: drains the gp+0x148 element list, freeing nodes via FUN_800319A8. Pure host data-structure teardown (maps to Rust Drop/clear); no clean-room port site. see ghidra/scripts/funcs/800355f0.txt"
"8004313c" = "Inventory/HUD two-page window-bounds setup: computes the retail 128-slot-per-half inventory panel bounds (gp+0x2D2/0x2D4/0x2D6) gated on party count. The clean-room inventory (crates/save) is a flat model without the paginated struct; engine GIVE_ITEM adds via the inventory accessors. Menu panel-geometry setup, not game logic. see ghidra/scripts/funcs/8004313c.txt"
"8001b964" = "Per-actor skinned-mesh GTE/OT render loop: Euler->matrix (80026988) + camera-relative rotate select, walks the actor's bones decoding each per-(bone,frame) entry and emits the assembled mesh into the OT (80043390/80029888/8002735c). The portable inner unit is ported - BoneTransform::decode carries PORT: FUN_8001BE80 (crates/asset player_anm.rs) and the playhead lives in engine-core field_anim; the loop itself is GTE COP2 register I/O + OT emission replaced by the wgpu pipeline. see ghidra/scripts/funcs/8001b964.txt"


# libetc / libcomb (VSync, frame-pacing) plus SCUS-resident dev-instrumentation

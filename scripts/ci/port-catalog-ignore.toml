# Worklist addresses that are interior to another function, not entries of their
# own. Produced by `scripts/ghidra-analysis/classify-worklist.py`; each reason
# restates the mechanical evidence read out of the Ghidra dump - the dump's own
# `entry=` resolving elsewhere, an explicit mid-function citation stub naming
# its host, another dumped body in the same image disassembling an instruction
# at this exact VA, or the tail-fragment liveness signature (no
# `addiu sp,sp,-N` prologue, plus reads of callee-saved registers and caller
# stack slots the body never writes). A tail fragment ends in its parent's
# epilogue, so `jr ra` in the stream is not evidence of a callable entry.
# See `docs/tooling/worklist-classification.md`.
[worklist_interior]

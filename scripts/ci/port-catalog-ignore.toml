# Intra-function labels inside the field/event script-VM dispatcher
# `FUN_801DE840` that Ghidra promoted to fake `FUN_xxxxxxxx` function names.
# Each entry is really a `j epilogue` target with an `addiu s8, s8, N` PC-delta
# prelude; calling "into" the label just supplies the PC delta and falls
# through to the dispatcher tail. The catalogue lives in
# `docs/subsystems/script-vm.md#intra-function-label-catalogue`. The engine
# port models each label's PC delta directly inside its dispatcher (see
# `crates/engine-vm/src/field.rs`), so there is no separate function to port.
"8003ee7c" = "libspu SPU common-attr / reverb-depth setter shim used by the CD-XA clip path. Thin two-call wrapper: FUN_800643c4(0, depth, depth) (SpuSetCommonAttr-style master/reverb-depth set from the s16 arg) then FUN_80062a0c(0,0,1) (CD/reverb attribute apply). No game logic; REF-listed as out-of-scope in crates/engine-core/src/cd_dma.rs. see ghidra/scripts/funcs/8003ee7c.txt"
"8006a7c8" = "SpuSetReverbVol-shape 3-mode wrapper (mode 0 = clear, 1 = OR, 8 = write) over the SPU voice-attribute halfword table at DAT_8007AF40, or the shadow copy at 0x801CE390 when DAT_8007AF38 & 1, also ORing the dirty mask DAT_8007AB04. Reverb lives in the clean-room SPU. see ghidra/scripts/funcs/8006a7c8.txt"
"80062228" = "libspu voice-block register clear: writes the SPU MMIO region at base 0x1f80_1xxx (two lui a2,0x1f80 poke loops). Hardware register access modelled at value level by the clean-room SPU, never poked. see ghidra/scripts/funcs/80062228.txt"
"800693d8" = "SpuInit core: SPU control-register bring-up + BSS zeroing. engine-audio constructs its Spu directly. see ghidra/scripts/funcs/800693d8.txt"
"8006954c" = "SPU transfer/DMA reset: resets the transfer state block driven by the software SPU in engine-audio. see ghidra/scripts/funcs/8006954c.txt"
"800699ac" = "SPU DMA settle + kick: waits the transfer FIFO then starts the SPU DMA channel. No hardware DMA in the clean-room SPU. see ghidra/scripts/funcs/800699ac.txt"
"8006b854" = "SpuSetKey: writes the SPU KON/KOFF key-on/off registers. engine-audio keys voices in its software SPU voice pool. see ghidra/scripts/funcs/8006b854.txt"
[field_vm_labels]
"801e3620" = "FUN_801de840 intra-function label (`code_r0x801e3620`): `param_2 + 4; break;` -> PC += 4"


# Intra-function epilogue-merge labels in OTHER large overlay functions (the
# same Ghidra-promotion pattern as `field_vm_labels`, but inside a different
# enclosing function). Each is a `j`/`bne` target *within* one function that
# Ghidra split into a fake `FUN_xxxxxxxx` entry; never reached by `jal`.
[overlay_epilogue_labels]
"801dbbfc" = "Epilogue-merge label inside FUN_801dba20 (overlay 0897 field locomotion / NPC-movement processor): multiple `j 0x801dbbfc` / `bne ...,0x801dbbfc` targets within FUN_801dba20 merge at the callee-save restore block (`lw ra,0x28(sp); lw s5..s0; jr ra`). Never a `jal` target anywhere in the corpus; no standalone body to port."


# Ghidra phantom leaves: addresses Ghidra promoted to fake `FUN_xxxxxxxx`
# entries that are NOT real call targets - a disassembler split an instruction
# off the head/tail of a genuine function. They are dumped + documented (each
# has a row in `docs/reference/functions.md` recording the mis-attribution) but
# there is nothing to port: the real work lives in the enclosing function. They
# inflate the worklist with phantom citation counts, so they are scoped out
# here. (Distinct from `field_vm_labels`, which are real dispatcher PC-delta
# exit targets - these are not even that.)
"801d6274" = "Intra-function merge label: 40 B with no prologue, opening `lw v0,0x98(s2)` on an s2 it never sets, and decompiling to unaff_s2 + in_stack_00000010. Zero `jal` sites in the dump corpus; five `j 0x801d6274` targets inside the enclosing 0897 functions. see ghidra/scripts/funcs/overlay_0897_801d6274.txt"
"801d7210" = "Interior address of FUN_801d71f0 (field equip / item-give): the dump's own header resolves entry=801d71f0 with the `addiu sp,sp,-0x20` prologue there, not here. Zero `jal` sites; one `j 0x801d7210`. The real port site is FUN_801D71F0. see ghidra/scripts/funcs/overlay_0897_801d7210.txt"
"801d7b40" = "Intra-function label inside the field per-actor draw helper FUN_801D79E8: a 76 B fragment opening `lw a0,0x20(sp)` against a frame it never establishes, decompiling to in_v0 / unaff_s1 / in_stack_00000020. Zero `jal` sites; two `j 0x801d7b40` targets. see ghidra/scripts/funcs/overlay_0897_801d7b40.txt"
"801db0f0" = "MIPS signed-division overflow guard emitted inline after a `div` (`li at,-0x1; bne v0,at,...`), promoted to a fake entry - the 0897 dump resolves the enclosing entry to 801daba4. Zero `jal` sites; five `j 0x801db0f0` targets inside the enclosing functions. see ghidra/scripts/funcs/overlay_0897_801db0f0.txt"
"801e0b40" = "Tail fragment, not an entry: the 0896 dump opens `lw a0,0x20(sp)` with no `addiu sp,sp,-N` prologue and closes the epilogue of a 0x60-byte frame, decompiling entirely to unaff_s0/s1/s2/s5 plus in_stack_ slots. The number-formatter and text-draw calls it contains belong to the parent. see ghidra/scripts/funcs/overlay_0896_801e0b40.txt"
[ghidra_phantoms]

# one encodes is preserved in docs/reference/functions.md where it is worth
# keeping; what is excluded is a tick path that cannot run on a shipped disc.
[dev_gated_scus]
"800179c0" = "Debug mode-advance chord. First two instructions load _DAT_8007B98C and branch to the epilogue when it is zero, so the whole 59-instruction body is retail-inert. Inside: a hold-repeat countdown at _DAT_8007B890, a pad chord on _DAT_8007B850 (0x900 when _DAT_8007B868 == 0, else 0x100 plus a `pad & 0xF == 0xF` alternative), and a write of mode_table[cur].next - the i16 at +0xA of the 24-byte row at 0x8007078C - into the game-mode global _DAT_8007B83C, with a mode-3 special case that jumps to mode 0x0E when _DAT_8007B8C8 is set. The `next` semantics it encodes are the ported ModeEntry::next, and the geometry is asserted against the ported table in crates/engine-core/src/mode.rs (DEBUG_MODE_ADVANCE_*). Only the chord itself is excluded. see ghidra/scripts/funcs/800179c0.txt"


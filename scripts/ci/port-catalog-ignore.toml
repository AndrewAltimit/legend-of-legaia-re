"801d74b0" = "Fishing centred bar-widget draw, read out of the based PROT 0972 image (0x801CE818 + 0x8C98), where it is a 30-instruction entry: early-out above y 0xF0, stage widget kind 0x44 through 80034b6c, then one call to the bar dispatcher 8002c69c at (cx - w/2 - 2, y + 6). No store of any kind in the body. Direct sibling of the already-listed 801d73b8 (the centred text draw in the same overlay); engine-ui lays fishing widgets out against the legaia-font atlas. NB the overlay_0897 dump at this VA is mid-function - PROT 0897's bytes there have no prologue."

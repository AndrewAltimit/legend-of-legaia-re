# Game-side helpers whose observable behavior is subsumed by an existing
# clean-room port or host model: the function's own body is thin plumbing
# (a list marker, a free-slot wrapper, a record copy) with no separate
# semantic to port. The reason names the Rust site that owns the behavior.
"8001ed60" = "Dev VRAM-integrity self-test: mallocs 0x40000, loads PROT 0x36C (retail through the TOC resolver 8003e8a8, dev through a host path), word-sums the payload into gp+0x6B8 and gp+0x690, records two header sizes, then frees the buffer. The sums have exactly one consumer - FUN_8001E890 compares gp+0x6B8 against a StoreImage read-back of the same VRAM region - and no lasting game state is produced. see ghidra/scripts/funcs/8001ed60.txt"
"80025358" = "Sub-overlay stage sequencer: a 3-state counter over the CD read-wait poll 8003de7c(1), the overlay loader 8003ec70(0x53, 0) and a tick of the loaded overlay's entry, returning busy until staged. The same shape as the listed scene-transition sequencer 80019794; its wait stage is already ported (engine-core cd_dma read_wait_poll) and the staging itself is host-owned scene-load orchestration. see ghidra/scripts/funcs/80025358.txt"
[subsumed_glue]
"8003cf40" = "Actor-list callback-arm marker: walks the live-actor linked list setting state bit 8 (node[+0x10] |= 8) on entry-id match - the op-0x4C nibble-9/nibble-8 register-callback primitive. Modeled by the register-callback host hooks (engine-core vm_hosts op4c_n9_sub_f_register_callback: opening-chain immediate-satisfy, faithful halt otherwise); the literal bit-8 walk has no engine actor-list to mark. see ghidra/scripts/funcs/8003cf40.txt"
"80050ed4" = "Pool-tracked spawn wrapper: scans the 0x60-pointer pool at DAT_801C90F0 for the first null slot, forwards to the part-stager FUN_80021B04, stores the actor ptr. The behavior lives in the stager + the engine's own pools (effect_vm::Pool free-slot scan, engine-core summon staging); kept as the static call-site anchor POOL_SPAWN_HELPER in crates/asset summon_overlay.rs. see ghidra/scripts/funcs/80050ed4.txt"
"801d5718" = "Walkability-grid cell-record copy: copies a 0x18-stride record (fields +0x6/+0xa/+0xc/+0x14) between cells of the grid at _DAT_1F8003EC+0x4000 - the same grid the ported collision system reads (World::field_tile_is_wall / advance_with_collision, PORT: FUN_801cfe4c). Layout corroboration only; the copy itself has no engine consumer. see ghidra/scripts/funcs/overlay_battle_action_801d5718.txt (the 0897 static copy is garbled in this region)"

"801f69d8" = "World-map top-view terrain dispatcher, resident in the based PROT 0901 image (slot B, base 0x801F69D8, so this VA is the overlay's first function). 643 instructions that walk the per-tile visibility scratchpad and emit each tile's mesh through 80043390 with the same GTE/GPU call set as 801f7088. Fully described in docs/formats/world-map-overlay.md; the engine resolves the same tiles through resolve_world_map_terrain_draws and draws them with wgpu."

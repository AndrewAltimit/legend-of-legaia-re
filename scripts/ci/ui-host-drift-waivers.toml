# Waivers for scripts/ci/check-ui-host-drift.py.
#
# Each entry records a shared `engine-ui` draw builder that one host reaches
# and the other does not, plus WHY that is acceptable today. The checker
# validates every waiver against the real source, in both directions:
#
#   * a builder that no longer exists          -> stale waiver, CI fails
#   * a builder now wired on both hosts        -> stale waiver, CI fails
#   * a `web_missing` waiver whose builder is
#     no longer native-only                    -> wrong bucket, CI fails
#   * an empty `reason`                        -> CI fails
#
# So this file cannot quietly become fiction: it only passes while it
# describes the actual state of the two hosts. Closing a gap means deleting
# the waiver, and CI tells you when you forgot.
#
# `kind` is one of:
#   "web_missing" - native calls it, the browser play page does not
#   "orphan"      - neither host calls it

[[waiver]]
builder = "battle_hud_draws_for"
kind = "web_missing"
reason = """
Native draws it: `engine-shell/.../window/hud.rs` calls this for every
`SceneMode::Battle` frame, fed by `window/battle.rs::sync_battle_hud_rows`,
which folds the live actor table into the `BattleHud` model each tick. The
window's own hand-rolled HP rows are gone, so this is the only battle HUD the
native host has - and the retail HP / MP colour law (`hp_bar_color_index` /
`mp_bar_color_index`, FUN_800349EC / FUN_80035EA8) reaches a surface.

The browser play page has no battle host to draw into. It never arms
encounters - none of `tick_encounter`, `arm_scripted_encounter`,
`install_encounter_*` or `drain_encounter_formation` is referenced anywhere in
`crates/web-viewer/src`, and no code path there sets `SceneMode::Battle` - and
it exports no battle render, camera or command-menu path. There is also no
battle HUD in the page's JS: `site/js/play-app.js` mentions battle only in a
comment about Start being inert. Wiring the HUD would draw a readout of state
the page never produces. Closing this is a battle-host job, not a draw-call
one.
"""

[[waiver]]
builder = "encounter_banner_draws_for"
kind = "orphan"
reason = """
Same root cause as the battle HUD, on both sides. The browser page does not
step encounters, so no formation is ever drawn - an ENCOUNTER! banner with no
battle behind it would report a transition the page cannot perform. The native
window reaches battle but announces it through its own event log rather than a
banner, so it does not call this either.
"""

[[waiver]]
builder = "dialog_box_draws_for"
kind = "orphan"
reason = """
The plain typewriter fallback, reached by neither host. The browser page always
runs the field-VM inline dialogue runner and draws the retail reading box
(`crate::play_dialog`, built from `dialog_window_chrome_draws_for` +
`text_draws_for`), so it has no use for a degraded path. On the native side its
only in-tree caller is `dialog_panel_draws_for`, which is itself an orphan (see
below) - so this is the tail of a two-builder chain whose head nothing calls.
Not a missing screen: a missing *fallback*, kept because `--simple-dialogue`
is the documented escape hatch when the retail box misrenders.
"""

[[waiver]]
builder = "dialog_panel_draws_for"
kind = "orphan"
reason = """
The `OwnedDialogPanel` projection, written for the native window but not called
by it - the native dialogue path draws the retail box directly, and this
survives only as the entry point of the `--simple-dialogue` fallback chain
(it delegates to `dialog_box_draws_for`). The browser page builds its box from
its own `DialogSnapshot` at the byte-pinned retail geometry
(`crate::play_dialog::dialog_stage_layout`, REF FUN_801D84D0) because it also
has to place the option picker and the two hand cursors. Closing this means
deciding whether the fallback chain is still wanted; if it is, the native
window has to actually route `--simple-dialogue` through it.
"""

[[waiver]]
builder = "game_over_draws_for"
kind = "web_missing"
reason = """
Unreachable on BOTH hosts, and deliberately so. The native window declares
`BootUiState::GameOver` but never constructs it, because retail's trigger is
not pinned: the action-SM `0x5A` gate detects the wipe, but the battle-exit
selector never reads the wipe cause, and no static mode-0x12 writer exists on
the disc (see docs/subsystems/battle.md § party wipe). Worse, retail's game
over is not a menu at all - PROT 0902 carries one string and one unconditional
exit - so this builder's Continue/Retry/Quit rows are an engine invention.
Wiring either host would commit the port to behaviour nobody has observed.
Close it with a runtime probe, not by picking a trigger.
"""

[[waiver]]
builder = "key_rebind_draws_for"
kind = "orphan"
reason = """
Web-exempt by design, but unreached on native too. The browser page's bindings
are a JS keycode table (`site/js/play-app.js` PAD/BOOT_PAD) owned by the page,
not the engine, and a shared rebind screen would have to write a config the
browser has no place to persist. On native, rebinding today happens through the
`legaia-input.toml` config file and the `legaia-engine config set --binding`
subcommand; the in-engine screen this builder draws is not mounted in the
window's menu tree. Closing it is a native-only job: give the options menu a
rebind entry that opens this screen.
"""

[[waiver]]
builder = "sprite_draws_for"
kind = "orphan"
reason = """
A generic anchor-translate helper for `SpriteRequest` batches, not a screen -
it matches the builder pattern only because it returns `SpriteDraw`. Neither
host routes through it: the browser page emits its quads through
`crate::play_menu::quad_json` after `scale_stage_text_draws`, which already
applies the stage transform this would duplicate, and the native window
translates its sprite batches at the point of use. A helper with no caller is a
delete candidate rather than a screen gap; it is kept only while the sprite
builders that would batch through it (`ap_gauge_sprites` and friends) are
themselves unwired.
"""

[[waiver]]
builder = "ap_gauge_sprites"
kind = "orphan"
reason = """
Not a screen gap and not unreached: this is an interior widget both hosts
already draw, one call deep. `field_menu_icon_sprites_for` (the party info
panel, per member) and `status_screen_draws_for` (the status main panel) both
fold it in, and both of those are `native,web`. The checker only counts
references from the host source roots, so an engine-ui builder that composes
into another engine-ui builder always reads as unused - the same reason
`sprite_draws_for` is waived.

The previous reason here claimed no host drew a gauge and named the native
battle HUD as the intended caller, instructing a future wave to delete the
builder if the HUD landed without it. Both halves were wrong: the gauge was
already reaching both hosts through the menu panels, and the battle HUD
(`battle_hud_draws_for`) draws its AP field as text pips rather than this
atlas widget, so its landing says nothing about this builder either way.
"""

[[waiver]]
builder = "fishing_hud_draws_for"
kind = "web_missing"
reason = """
The browser play page has no fishing host: it exposes no fishing minigame
entry, so there is no session, no cast/reel input path and no point record for
a HUD to read. Wiring the HUD first would draw a readout of state the page

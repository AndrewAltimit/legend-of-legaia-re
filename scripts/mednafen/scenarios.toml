# Mednafen scenario manifest.
#
# Maps each `.mc{0..9}` save state to a labelled scenario with overlay
# slices, watchpoint regions, and downstream artefact paths. Consumed by
# `mednafen-state` (see `crates/mednafen`) and the shell helpers under
# `scripts/mednafen/`.
#
# See `docs/tooling/mednafen-automation.md` for the workflow.

[defaults]
# Filename pattern for the user's mednafen saves. {slot} is replaced with
# the slot index (0..9). The hash is mednafen's per-rom identifier — adjust
# if you're using a different US dump.
filename_pattern = "Legend of Legaia (USA).788de08f9c7e652c51d8d08ee374d055.mc{slot}"
# Default mcs/ directory. Override at runtime via `LEGAIA_MEDNAFEN_DIR`.
# (Left unset here so the manifest is portable.)

# ----------------------------------------------------------------------
# mc0 — Drake Castle (mid-game checkpoint, no transition in flight)
# ----------------------------------------------------------------------
[[scenarios]]
slot = 0
label = "drake_castle"
description = "Drake Castle (steady-state field with full party)"
topics = ["move-table boot path"]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

# Watchpoint hint: confirms that the move-table base pointer is populated
# in steady state. Diff against a fresh-boot state to find what writes
# the field-VM dispatch base.
[[scenarios.watchpoints]]
label = "move_table_base"
start = 0x8007B888
end = 0x8007B89C
hint = "FUN_800204F8 reads from this; populated by boot loader"

[[scenarios.watchpoints]]
label = "move_table_base_alt"
start = 0x8007B840
end = 0x8007B844
hint = "MOVE2 base pointer (alt move table)"

# ----------------------------------------------------------------------
# mc1, mc2, mc3 — three progressive captures of "loading into a new area"
# These are the scene-bundle preamble→slot mapping unblock path.
# Diff mc1↔mc2 to see what got written during the start of the load;
# mc2↔mc3 to see what happened in the second half.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 1
label = "area_load_early"
description = "Loading into a new area — early frame"
topics = ["scene-bundle preamble", "navmesh"]
diff_against = [2, 3]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084580
hint = "Scene-local BGM/sound block layout (FUN_800243F0); pool[+0..+0x40]"

[[scenarios.watchpoints]]
label = "vram_upload_target"
start = 0x801CE800
end = 0x801CE900
hint = "Overlay base region — track which overlay loaded between snapshots"

[[scenarios.watchpoints]]
label = "actor_pool_field"
start = 0x801C9370
end = 0x801C9400
hint = "Battle actor pointer table at FUN_800520F0; also reused by field"

[[scenarios]]
slot = 2
label = "area_load_mid"
description = "Loading into a new area — mid frame"
topics = ["scene-bundle preamble"]
diff_against = [1, 3]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084580
hint = "Should be more populated than mc1 — diff to see the post-init writes"

[[scenarios]]
slot = 3
label = "area_load_late"
description = "Loading into a new area — late frame (almost done)"
topics = ["scene-bundle preamble", "navmesh"]
diff_against = [1, 2]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084580
hint = "Steady-state BGM pool; diff vs mc1 reveals everything scene-init wrote"

[[scenarios.watchpoints]]
label = "navmesh_candidate"
start = 0x80100000
end = 0x80120000
hint = "Suspected per-scene navmesh window; diff mc1→mc3 to see scene-data writes"

# ----------------------------------------------------------------------
# mc4 — Loading into a battle (scene transition into battle SM)
# ----------------------------------------------------------------------
[[scenarios]]
slot = 4
label = "battle_intro"
description = "Loading into a battle (scene-fade into action menu)"
topics = ["actor anim state", "battle stat aggregator"]
diff_against = [5, 6]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "battle_actor_pool"
start = 0x801C9370
end = 0x801C9400
hint = "8-slot battle actor pointer table; populated by FUN_80054CB0 monster init"

[[scenarios.watchpoints]]
label = "ability_bitmask"
start = 0x80074358
end = 0x80074360
hint = "Global ability bitmask written by FUN_80042558 stat aggregator"

# ----------------------------------------------------------------------
# mc5 — Viewing learned arts in battle (Tactical Arts UI open)
# ----------------------------------------------------------------------
[[scenarios]]
slot = 5
label = "battle_arts_view"
description = "Viewing learned arts in battle (TA submenu open)"
topics = ["Arts system", "actor anim state"]
diff_against = [4, 6]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "selected_art_ptr"
start = 0x8007BAC8
end = 0x8007BAD0
hint = "BGM-id slot, but the broader 0x8007BA00..BB00 region carries menu cursor state"

[[scenarios.watchpoints]]
label = "art_record_window"
start = 0x80160E00
end = 0x80161000
hint = "Vahn art records start at 0x80160EFC; diff to see TA-cursor writes"

# ----------------------------------------------------------------------
# mc6 — Performing a somersault on an enemy (animation playing)
# ----------------------------------------------------------------------
[[scenarios]]
slot = 6
label = "battle_anim_strike"
description = "Performing a somersault on an enemy (active animation)"
topics = ["actor anim dispatcher"]
diff_against = [4, 5]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "actor_anim_state"
start = 0x801C9370
end = 0x801C9500
hint = "Actor pointer table + per-actor anim PC at +0x4C; diff vs mc5 reveals which actor is playing what"

[[scenarios.watchpoints]]
label = "anim_dispatch_callback"
start = 0x801C9400
end = 0x801C9700
hint = "Per-actor +0x4C carries the anim dispatch fn pointer; diff mc4→mc6 to find it"

# ----------------------------------------------------------------------
# mc7 — Pre-event: goblin about to steal an item (battle in progress).
#
# Loading mc7 and waiting ~5-10 seconds (no input) plays out: a goblin
# steal animation → magic-rank level-up event (mc8) → character level-up
# event (mc9). This triplet is intended for stat-growth + magic-rank
# work (PRD §2.3 / §4.16).
# ----------------------------------------------------------------------
[[scenarios]]
slot = 7
label = "pre_steal"
description = "Battle frame: goblin about to steal an item from the party"
topics = ["status effects", "item theft", "stat growth"]
diff_against = [8, 9]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "battle_actor_pool"
start = 0x801C9370
end = 0x801C9500
hint = "Battle actor pointer table; per-actor HP/MP at +0x14C"

[[scenarios.watchpoints]]
label = "inventory_table"
start = 0x80120000
end = 0x80140000
hint = "Inventory store; theft writes here. Diff mc7↔mc8 to surface the inventory cell."

[[scenarios.watchpoints]]
label = "story_flags_word"
start = 0x1F800390
end = 0x1F8003A0
hint = "_DAT_1F800394 story flags. Diff to surface in-battle status writes."

# ----------------------------------------------------------------------
# mc8 — Magic level-up event firing
# ----------------------------------------------------------------------
[[scenarios]]
slot = 8
label = "magic_level_up"
description = "Magic-rank level-up banner active"
topics = ["spell rank-up", "stat growth"]
diff_against = [7, 9]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_vahn"
start = 0x80084708
end = 0x80084B1C
hint = "Vahn's character record (stride 0x414). Spell list at +0x13C; spell levels at +0x161."

[[scenarios.watchpoints]]
label = "char_record_noa"
start = 0x80084B1C
end = 0x80084F30
hint = "Noa's character record (stride 0x414)."

[[scenarios.watchpoints]]
label = "char_record_gala"
start = 0x80084F30
end = 0x80085344
hint = "Gala's character record (stride 0x414)."

# ----------------------------------------------------------------------
# mc9 — Character level-up event firing (after mc8)
# ----------------------------------------------------------------------
[[scenarios]]
slot = 9
label = "char_level_up"
description = "Character level-up banner active (after magic-rank up)"
topics = ["stat growth", "level-up curve"]
diff_against = [7, 8]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_vahn"
start = 0x80084708
end = 0x80084B1C
hint = "Vahn's character record. HP/MP at +0x104; stat cap at +0x11A."

[[scenarios.watchpoints]]
label = "char_record_noa"
start = 0x80084B1C
end = 0x80084F30
hint = "Noa's character record (stride 0x414)."

[[scenarios.watchpoints]]
label = "char_record_gala"
start = 0x80084F30
end = 0x80085344
hint = "Gala's character record (stride 0x414)."

[[scenarios.watchpoints]]
label = "stat_growth_lookup_window"
start = 0x80120000
end = 0x80140000
hint = "Per-Seru stat-grant lookup. Diff mc7→mc9 to surface per-character growth values."

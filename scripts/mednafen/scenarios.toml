# Mednafen scenario manifest.
#
# Maps each `.mc{0..9}` save state to a labelled scenario with overlay
# slices, watchpoint regions, and downstream artefact paths. Consumed by
# `mednafen-state` (see `crates/mednafen`) and the shell helpers under
# `scripts/mednafen/`.
#
# See `docs/tooling/mednafen-automation.md` for the workflow.

[defaults]
# Filename pattern for the user's mednafen saves. {slot} is replaced with
# the slot index (0..9). The hash is mednafen's per-rom identifier - adjust
# if you're using a different US dump.
filename_pattern = "Legend of Legaia (USA).788de08f9c7e652c51d8d08ee374d055.mc{slot}"
# Default mcs/ directory. Override at runtime via `LEGAIA_MEDNAFEN_DIR`.
# (Left unset here so the manifest is portable.)

# ----------------------------------------------------------------------
# mc0 - Rim Elm next to the Genesis Tree (CDNAME `town0c`, scene 0x15).
# Regular town residency; useful as a generic "town overlay loaded"
# reference. `town0c` does NOT use the field-pack format; for the
# field-pack save see mc2 (`town01` intro Rim Elm).
# ----------------------------------------------------------------------
[[scenarios]]
slot = 0
label = "town0c_rim_elm_genesis_tree"
description = "Rim Elm next to the Genesis Tree (CDNAME `town0c`, scene 0x15)"
topics = ["town overlay", "scene_bundle", "town residency reference"]
diff_against = [2, 3]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Active scene: index 0x15 (town0c). Diff vs mc2 (town01) to see the field-pack vs non-field-pack town shape difference."

[[scenarios.watchpoints]]
label = "town_overlay_window"
start = 0x801F69D8
end = 0x801F8F02
hint = "9 KB MIPS-overlay slot identified earlier; town overlay populates here."

[[scenarios.watchpoints]]
label = "field_pack_ram_base_pointer"
start = 0x8007B8D0
end = 0x8007B8D4
hint = "_DAT_8007B8D0 = scene-asset load destination + 0x12800. mc0 reads `f0 4d 0b 80` => 0x800B4DF0; field-pack base for town0c is 0x800A25F0 (= 0x800B4DF0 - 0x12800)."

# ----------------------------------------------------------------------
# mc1 - Rim Elm cave (the save-point room). Same CDNAME `town0c` as mc0
# but a different sub-area of the town. Useful for sub-area-internal
# diffs - everything that survives identical CDNAME residency but
# different rooms.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 1
label = "fmv_playback_str_cutscene"
description = "FMV playback in progress (cutscene / MDEC overlay residency)"
topics = ["FMV", "cutscene overlay", "STR file table", "MDEC"]
diff_against = [0, 2]

# Capture the cutscene overlay window. The compact STR-file table sits at
# 0x801CAE40 (24-byte stride, 6 entries: MV1.STR..MV6.STR); the ISO9660-
# shape directory copies sit at 0x801CCA80 (56-byte stride). Path strings
# at 0x801CE810; mid-game FMV-trigger field-scene labels at 0x801CE8AC.
[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Empty during FMV - the cutscene overlay tears the field scene down before STR playback begins."

[[scenarios.watchpoints]]
label = "fmv_compact_table"
start = 0x801CAE40
end = 0x801CAEC8
hint = "6-entry compact STR-file table. Each entry = 24 bytes: name[12] + reserved u32 + BCD MSF + size. Parsed by `legaia_asset::str_fmv_table::parse_entries`."

[[scenarios.watchpoints]]
label = "fmv_iso9660_directory_copies"
start = 0x801CCA80
end = 0x801CCBE0
hint = "ISO9660-shape directory record copies. 56 bytes per entry; publisher tag 'USA' at +0x17 of each."

[[scenarios.watchpoints]]
label = "fmv_mid_game_scene_labels"
start = 0x801CE8AC
end = 0x801CE8E0
hint = "CDNAME labels for mid-game FMV-bearing field scenes: town0b, map01, chitei2, map02, jou, uru2, town0e."

# ----------------------------------------------------------------------
# mc2 - Rim Elm intro (CDNAME `town01`, scene 0x03) — the field-pack
# save. This is the key save for §2.5 field-pack mapping work.
# `town01` is the very-first scripted town in the corpus (entry-point of
# the game) and is the only block whose first three PROT entries
# (0003/0004/0005) match the field-pack magic 0x01059B84.
#
# The active field-pack RAM base for this save is 0x80139530 (computed
# as `_DAT_8007B8D0 - 0x12800` where `_DAT_8007B8D0 = 0x8014BD30` for
# this save). Per-scene base; see `engine_core::capture_observations::field_pack_load`.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 2
label = "town01_intro_rim_elm"
description = "Rim Elm intro (CDNAME `town01`, scene 0x03) - field-pack scene"
topics = ["field-pack RAM layout", "scene asset loader", "town01 block"]
diff_against = [0, 3]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Active scene: index 0x03 (town01). The 8-byte block at +0x54 carries `03 00 00 00` then `00 01 02 03` (sub-PROT-entry list within the town01 block)."

[[scenarios.watchpoints]]
label = "field_pack_ram_region"
start = 0x80139530
end = 0x8014BD30
hint = "Field-pack RAM region for town01 - 75 KB asset bundle loaded by FUN_8001f7c0. Schema slot 0 sits at base+0x60 (= 0x80139590); slot 96 at base+0x16651 (= 0x8014FB81 - hits the trailing zone). Contents at base+0x60 are post-processed GP0 GPU primitive packets, NOT the raw schema-shaped on-disc records."

[[scenarios.watchpoints]]
label = "field_pack_ram_base_pointer"
start = 0x8007B8D0
end = 0x8007B8D4
hint = "_DAT_8007B8D0 - the loader writes `base + 0x12800` here. mc2 reads `30 bd 14 80` => 0x8014BD30; subtract 0x12800 to recover field-pack base = 0x80139530."

[[scenarios.watchpoints]]
label = "asset_descriptor_table_base"
start = 0x8007B85C
end = 0x8007B860
hint = "_DAT_8007B85C - asset descriptor table pointer. Identical across mc2 and mc0 (both = 0x8015CBD0); the descriptor table is statically allocated and indexes into the per-scene field-pack RAM region above."

[[scenarios.watchpoints]]
label = "scene_asset_pool"
start = 0x800C5000
end = 0x80139530
hint = "Heap-resident scene asset pool. mc2 vs mc0 surfaces ~400 KB of differences here - sibling buffers (TIM atlases, primitive scratch, descriptor-driven data) the loader fills before / alongside the field-pack region."

# ----------------------------------------------------------------------
# mc3 - Rim Elm normal entry mid-load (CDNAME `town0c`, scene 0x15)
# captured BETWEEN scene-name flip and field-pack-base flip. The
# scene-bundle pool already says `town0c` but `_DAT_8007B8D0` still
# points to the previous scene's efect.dat base. Diff vs mc2 captures
# the loader's order-of-operations:
#   (1) write new scene name into the bundle pool
#   (2) populate the new field-pack region at the destination base
#   (3) flip the global base pointer last
# Pinned in `engine_core::capture_observations::field_pack_intra_transition`.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 3
label = "town0c_rim_elm_normal_pre_load"
description = "Rim Elm normal entry mid-transition (CDNAME `town0c`, scene 0x15)"
topics = ["intra-transition", "field-pack loader order-of-ops", "town0c"]
diff_against = [0, 2]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084580
hint = "Active scene: town0c (CDNAME at +0x08, +0x18); scene_id 0x55 at +0x00. mc3 has town0c here even though `_DAT_8007B8D0` still reads the OLD town01 base - the loader flips the name first, then populates new RAM, then swaps the global pointer."

[[scenarios.watchpoints]]
label = "field_pack_ram_base_pointer_stale"
start = 0x8007B8D0
end = 0x8007B8D4
hint = "Bit-identical to mc2's `30 bd 14 80` => 0x8014BD30 (old town01 base). The loader has not yet written the new town0c value (would be `f0 4d 0b 80` => 0x800B4DF0). This is the intra-transition signature."

[[scenarios.watchpoints]]
label = "next_field_pack_region_partial"
start = 0x800A25F0
end = 0x800B4DF0
hint = "New town0c field-pack region (matches mc0's pinned base). In mc3 this region is partially populated even though the global base pointer hasn't flipped yet."

[[scenarios.watchpoints]]
label = "previous_field_pack_region_zeroed"
start = 0x80139530
end = 0x8013A000
hint = "Old town01 field-pack region. In mc3 this is zeroed - the loader clears the previous region before populating the new one."

# ----------------------------------------------------------------------
# mc4..mc6: NOA character-level-up triplet (battle scene `map01`).
#
# Each save captures a different frame of Noa's level-up event:
#   mc4 = pre-level-up (battle just won, XP not yet credited)
#   mc5 = record-write frame (record stats + XP + rank counter applied)
#   mc6 = live-copy frame (live in-battle stats applied; HP_max/MP_max
#         /SP_max not yet settled in live copy)
#   mc7 = doubles as Gala-pre AND Noa-settle (HP_max/MP_max/SP_max
#         settled in live copy)
#
# Codified deltas: `engine_core::levelup::observations::noa_mc4_to_mc7`.
# Phase split documented at `engine_core::capture_observations::char_level_up`.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 4
label = "noa_level_up_pre"
description = "Pre-Noa-level-up battle frame (`map01`)"
topics = ["stat growth", "level-up curve", "Noa"]
diff_against = [5, 6, 7]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Active scene: `map01` (battle scene)."

[[scenarios.watchpoints]]
label = "char_record_noa"
start = 0x80084B1C
end = 0x80084F30
hint = "Noa's character record. Pre-event values: cumulative XP 102 at +0x004 (u16 LE), HP_max 0x96 (150) at +0x106 / +0x11C, SP_max 0x38 (56) at +0x10E."

[[scenarios]]
slot = 5
label = "noa_level_up_record_write"
description = "Mid-Noa-level-up: record-stat window written (`map01`)"
topics = ["stat growth", "level-up curve", "Noa", "record write phase"]
diff_against = [4, 6]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_noa_record_window"
start = 0x80084C38
end = 0x80084C4A
hint = "Noa's record stat window at +0x11C..+0x12D (= 0x80084B1C + 0x11C). 9 u16 LE values: HP_max, MP_max, cap=100, six stats. Phase 1 of 3."

[[scenarios.watchpoints]]
label = "char_record_noa_xp_and_rank"
start = 0x80084B20
end = 0x80084B22
hint = "XP at +0x004 (u16 LE). Phase 1 also bumps rank counter at +0x130."

[[scenarios]]
slot = 6
label = "noa_level_up_live_copy"
description = "Mid-Noa-level-up: live in-battle stats copied (`map01`)"
topics = ["stat growth", "level-up curve", "Noa", "live copy phase"]
diff_against = [5, 7]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_noa_live_window"
start = 0x80084C20
end = 0x80084C38
hint = "Noa's live in-battle window at +0x104..+0x11B (HP_cur, HP_max, MP_cur, MP_max, SP_cur, SP_max, six u16 stats). In mc6, HP_cur/MP_cur and the six u16 stats are written; HP_max/MP_max/SP_max are NOT yet settled."

[[scenarios]]
slot = 7
label = "gala_level_up_pre"
description = "Pre-Gala-level-up battle frame (also Noa-settle frame) (`map01`)"
topics = ["stat growth", "level-up curve", "Gala", "Noa settle"]
diff_against = [4, 8, 9]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_noa_settled"
start = 0x80084C22
end = 0x80084C2C
hint = "Noa's live HP_max/MP_max/SP_max at +0x106 / +0x10A / +0x10E (relative to Noa base 0x80084B1C). Settled in mc7."

[[scenarios.watchpoints]]
label = "char_record_gala"
start = 0x80084F30
end = 0x80085344
hint = "Gala's character record. Pre-event values: cumulative XP 140 at +0x004, HP_max 0x00D2 (210) at +0x11C, SP_max 0x35 (53) unchanged across the triplet."

# ----------------------------------------------------------------------
# mc7..mc9: GALA character-level-up pair (battle scene `map01`).
#
#   mc7 = pre-Gala-level-up (also Noa-settle)
#   mc8 = record-write frame (Gala record stats + XP + rank applied)
#   mc9 = live-copy / settle frame (Gala live in-battle stats applied;
#         HP_max/MP_max settle in same frame)
#
# Codified deltas: `engine_core::levelup::observations::gala_mc7_to_mc9`.
# Gala's level-up grants HP/MP/stats but NOT SP_max (Gala uses physical
# Tactical Arts, not Seru magic).
# ----------------------------------------------------------------------
[[scenarios]]
slot = 8
label = "gala_level_up_record_write"
description = "Mid-Gala-level-up: record-stat window written (`map01`)"
topics = ["stat growth", "level-up curve", "Gala", "record write phase"]
diff_against = [7, 9]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_gala_record_window"
start = 0x8008504C
end = 0x8008505E
hint = "Gala's record stat window at +0x11C..+0x12D (= 0x80084F30 + 0x11C). HP_max delta = +44 (0x002C), MP_max delta = +8."

[[scenarios.watchpoints]]
label = "char_record_gala_xp_and_rank"
start = 0x80084F34
end = 0x80084F36
hint = "Gala XP at +0x004 (u16 LE). Phase 1 also bumps rank counter at +0x130."

[[scenarios]]
slot = 9
label = "gala_level_up_settled"
description = "Post-Gala-level-up: live in-battle stats applied (`map01`)"
topics = ["stat growth", "level-up curve", "Gala", "live copy phase"]
diff_against = [7, 8]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "char_record_gala_live_window"
start = 0x80085034
end = 0x8008504C
hint = "Gala's live in-battle window at +0x104..+0x11B (= 0x80084F30 + 0x104). Settled deltas land here in mc9."

[[scenarios.watchpoints]]
label = "char_record_gala_sp_max_unchanged"
start = 0x8008503E
end = 0x80085040
hint = "Gala's SP_max at +0x10E should NOT change across the triplet (Gala uses physical Tactical Arts; level-up grants no SP)."

[[scenarios.watchpoints]]
label = "stat_growth_lookup_window"
start = 0x80120000
end = 0x80140000
hint = "Per-Seru stat-grant lookup region. Captured deltas exposed via `engine_core::levelup::observations::{noa_mc4_to_mc7, gala_mc7_to_mc9}`. The grant table source itself is still capture-blocked - searching this window across the triplets is part of the §2.2 hunt."

# Mednafen scenario manifest.
#
# Maps each `.mc{0..9}` save state to a labelled scenario with overlay
# slices, watchpoint regions, and downstream artefact paths. Consumed by
# `mednafen-state` (see `crates/mednafen`) and the shell helpers under
# `scripts/mednafen/`.
#
# See `docs/tooling/mednafen-automation.md` for the workflow.
#
# ## Current corpus rotation
#
# This rotation captures the **per-STR FMV trigger corpus**: nine save
# states taken right before each FMV begins playing, one per
# `_DAT_8007BA78` value (`fmv_id ∈ 0..=8`). Slot mapping (debug-menu
# driven, all from active scene `map01`):
#
#   mc2 → STR 0 (fmv_id 0)    mc3 → STR 1 (fmv_id 1)
#   mc4 → STR 2 (fmv_id 2)    mc5 → STR 3 (fmv_id 3)
#   mc6 → STR 4 (fmv_id 4)    mc7 → STR 5 (fmv_id 5)
#   mc8 → STR 6 (fmv_id 6)    mc9 → STR 7 (fmv_id 7)
#   mc0 → STR 8 (fmv_id 8)
#
# (mc1 is unrelated to the FMV corpus in this rotation.)
#
# Existing slot-specific tests (encounter trigger, battle init, item-use,
# anim, level-up triplets, FMV-overlay residency) carry slot-fingerprint
# guards (`require_slot_scenes`) and skip-pass when the corpus has been
# rotated to a different shape. They remain in the test suite as
# documentation of the prior captures; the constants they reference are
# still authoritative for the engine layer.

[defaults]
# Filename pattern for the user's mednafen saves. {slot} is replaced with
# the slot index (0..9). The hash is mednafen's per-rom identifier - adjust
# if you're using a different US dump.
filename_pattern = "Legend of Legaia (USA).788de08f9c7e652c51d8d08ee374d055.mc{slot}"
# Default mcs/ directory. Override at runtime via `LEGAIA_MEDNAFEN_DIR`.
# (Left unset here so the manifest is portable.)

# ----------------------------------------------------------------------
# mc0 - per-STR FMV trigger corpus, slot 0 maps to STR 8 (fmv_id 8).
# Active scene = `map01`. Game mode = 0x1A (StrInit). The runtime
# FMV-state slot[8] points at \DATA\MOV.STR;1 (cut path; not on retail
# disc). The save still autoplays the FMV via the str_fmv overlay's
# fallback path, but no actual MV*.STR file is opened.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 0
label = "fmv_trigger_str_8"
description = "Per-STR FMV trigger captured for fmv_id=8 (cut path slot, debug-menu driven)"
topics = ["FMV trigger", "fmv_id 8", "str_fmv overlay", "cut path slot"]
diff_against = [2]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "fmv_id_global"
start = 0x8007BA78
end = 0x8007BA7A
hint = "_DAT_8007BA78 (s16 LE). mc0 reads `08 00` (fmv_id = 8). Set by the FMV-trigger op handler at FUN_801E30E4 from the bytecode operand."

[[scenarios.watchpoints]]
label = "next_game_mode_global"
start = 0x8007B83C
end = 0x8007B83D
hint = "_DAT_8007B83C (u8). 0x1A across the corpus = next-game-mode StrInit. Constant: `cutscene_trigger_corpus::EXPECTED_GAME_MODE`."

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Active scene: `map01` for every save in the FMV corpus. The user-side trigger sequence is debug-menu driven, all from this scene."

# ----------------------------------------------------------------------
# mc1 - unrelated to the FMV corpus in this rotation. Held for legacy
# scenario compatibility - the FMV-overlay residency test guards on the
# overlay's residency signature and skip-passes if absent.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 1
label = "unassigned"
description = "Slot not part of the per-STR FMV corpus; legacy reference"
topics = ["unassigned"]
diff_against = []

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "scene_bundle_pool"
start = 0x80084540
end = 0x80084560
hint = "Active scene-bundle pool. Contents are corpus-rotation specific."

# ----------------------------------------------------------------------
# mc2 - per-STR FMV trigger corpus, slot 2 maps to STR 0 (fmv_id 0).
# fmv_id 0 plays \MOV\MV1.STR;1 (intro logo). This is also the same FMV
# that the title-screen attract loop fires after the idle countdown.
# ----------------------------------------------------------------------
[[scenarios]]
slot = 2
label = "fmv_trigger_str_0"
description = "Per-STR FMV trigger captured for fmv_id=0 → MV1.STR (intro logo)"
topics = ["FMV trigger", "fmv_id 0", "MV1.STR"]
diff_against = [3]

[scenarios.overlay_slice]
start = 0x801C0000
end = 0x80200000

[[scenarios.watchpoints]]
label = "fmv_id_global"
start = 0x8007BA78
end = 0x8007BA7A
hint = "_DAT_8007BA78 = `00 00` (fmv_id = 0)."

[[scenarios.watchpoints]]
label = "next_game_mode_global"
start = 0x8007B83C
end = 0x8007B83D
hint = "_DAT_8007B83C = 0x1A (StrInit)."

[[scenarios.watchpoints]]
label = "field_pack_base_pointer"
start = 0x8007B8D0
end = 0x8007B8D4
hint = "_DAT_8007B8D0 = 0x8014BD30 (= 0x80139530 + 0x12800). map01's field-pack base; constant: `cutscene_trigger_corpus::MAP01_FIELD_PACK_BASE`."

# ----------------------------------------------------------------------

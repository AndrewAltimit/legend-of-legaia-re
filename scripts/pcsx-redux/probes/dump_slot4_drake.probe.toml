# Dump the live slot-4 (world-map kingdom bundle, Drake) RAM region
# from a save state captured at the world-map overview. Byte-equality
# ground truth for the disc-decoded slot4 verification scripts.
#
# Slot-4 base 0x8011A624 is pinned for Drake by the full-RAM signature
# search in dump_full_ram.probe.toml. Sebucus / Karisto have their own
# spec files (size differs).
#
# Migration target: scripts/pcsx-redux/autorun_dump_slot4.lua (kingdom=drake)
#
# No matching scenario in scripts/scenarios.toml yet; pass the save state
# explicitly via `run_probe.sh --sstate /path/to/world_map.sstate`.

capture_frames = 120
output_path    = "slot4_ram_drake.bin"

[dump]
addr = 0x8011A624
size = 32304
